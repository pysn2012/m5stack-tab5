substitutions:
  # 允许显示的字符集。已通过脚本查重去重，确保每个字符只出现一次。
  # 包含原字符集 + 语音助手相关新增字符（语聆思考回复错误唤静醒对话助手你正在到点连接请说或击图标出重试麦克风已计算器）
