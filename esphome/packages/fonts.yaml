  # Montserrat 字体（96px，用于时间显示）
  - file: gfonts://Montserrat@600
    id: montserrat_96
    size: 96
    bpp: 4

  # Montserrat 字体（32px，用于数值显示）
  - file: gfonts://Montserrat@600
    id: montserrat_32
    size: 32
    bpp: 4

  # Noto Sans SC 中文字体（32px）
  - file: gfonts://Noto+Sans+SC
    id: noto_sans_sc_32
    size: 32
    bpp: 4
    glyphs: ${allowed_characters}
    ignore_missing_glyphs: true

  # Noto Sans SC 中文字体（48px，用于语音页面状态文字）
  # 已通过脚本查重去重：原字符集 + 语音助手相关字符（去掉与原字符集重复的"音"字）
  - file: gfonts://Noto+Sans+SC
    id: noto_sans_sc_48
    size: 48
    bpp: 4
    glyphs: "客厅仪表盘系统设置亮度插座弱电书桌音量功耗总室外内预警地址信号运行语聆听思考回复错误静唤醒对话助手你正在中到点连接请说或击图标出了重试麦克风已计算时器"
    ignore_missing_glyphs: true
