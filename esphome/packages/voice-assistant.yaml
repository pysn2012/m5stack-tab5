# ═════════════════════════════════════════════════════════════════
# 语音助手核心配置（适配 LVGL UI 版本）
# 参考: https://github.com/pysn2012/wake-word-voice-assistants
# 唤醒词: "okay nabu"  →  唤醒后可进行语音对话或语音控制
# ═════════════════════════════════════════════════════════════════

# ── 全局变量 ──────────────────────────────────────────────────────
globals:
  # 标记设备是否仍在初始化（HA API 连接成功前为 true）
  - id: init_in_progress
    type: bool
    restore_value: false
    initial_value: "true"
  # 当前语音助手所处的阶段 ID（参考 substitutions 中的 voice_assist_*_phase_id）
  - id: voice_assistant_phase
    type: int
    restore_value: false
    initial_value: ${voice_assist_not_ready_phase_id}
  # 启动语音助手前所在的页面编号（用于结束时自动返回）
  - id: prev_page_num
    type: int
    restore_value: false
    initial_value: "0"
  # 标记：voice_ui_update 脚本中是否需要切换到 voice_page（lambda 不能直接调 LVGL C API 切页，需用 YAML action）
  - id: voice_page_pending
    type: bool
    restore_value: false
    initial_value: "false"
  # 标记：return_to_previous_page 脚本中是否需要切换页面
  - id: return_page_pending
    type: bool
    restore_value: false
    initial_value: "false"
  # return_to_previous_page 的目标页面索引（0=主页, 1=插座, 2=系统）
  - id: return_page_target
    type: int
    restore_value: false
    initial_value: "0"

# ── 扬声器配置（I2S + ES8388 DAC）──────────────────────────────────
speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_dout_pin: GPIO26
    audio_dac: es8388_dac
    dac_type: external
    channel: mono
    buffer_duration: 100ms
    timeout: 2000ms
    bits_per_sample: 16bit
    sample_rate: 48000

# ── 媒体播放器（用于播放 TTS 和提示音）─────────────────────────────
media_player:
  - platform: speaker
    name: None
    id: speaker_media_player
    volume_min: 0.5
    volume_max: 0.8
    announcement_pipeline:
      speaker: box_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1
    files:
      - id: timer_finished_sound
        file: https://github.com/pysn2012/wake-word-voice-assistants/raw/main/sounds/timer_finished.flac
    on_announcement:
      # 如果麦克风正在录音，则停止唤醒词（mWW 或 VA 流式唤醒）
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - script.execute: stop_wake_word
            - if:
                condition:
                  - lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
                then:
                  - wait_until:
                      - not:
                          voice_assistant.is_running:
      # 如果 VA 未运行，说明这是用户主动播放的媒体，显示静音界面
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
            - script.execute: voice_ui_update
    on_idle:
      # VA 未运行，用户主动播放结束，重新启动唤醒词
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - script.execute: start_wake_word
            - script.execute: set_idle_or_mute_phase
            - script.execute: voice_ui_update

# ── 设备端唤醒词引擎 microWakeWord ─────────────────────────────────
# 使用 "okay_nabu" 唤醒词模型（中文发音 "ok nabu"）
micro_wake_word:
  id: mww
  models:
    - okay_nabu
  on_wake_word_detected:
    # 唤醒词被检测到 → 启动语音助手（带唤醒词文本）
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

# ── 语音助手核心 ──────────────────────────────────────────────────
voice_assistant:
  id: va
  microphone: tab5_microphone
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0

  # 开始监听用户语音
  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - text_sensor.template.publish:
        id: text_request
        state: "..."
    - text_sensor.template.publish:
        id: text_response
        state: "..."
    - script.execute: voice_ui_update

  # VAD 检测到用户说完了
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: voice_ui_update

  # 语音转文字完成（用户说的话）
  on_stt_end:
    - text_sensor.template.publish:
        id: text_request
        state: !lambda return x;
    - script.execute: voice_ui_update

  # 开始 TTS 播报（回复内容）
  on_tts_start:
    - text_sensor.template.publish:
        id: text_response
        state: !lambda return x;
    - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
    - script.execute: voice_ui_update

  # 语音助手会话结束
  on_end:
    # 短暂等待，以确认是否有播报开始
    - wait_until:
        condition:
          - media_player.is_announcing:
        timeout: 0.5s
    # 等待播报真正完成
    - wait_until:
        - and:
            - not:
                media_player.is_announcing:
            - not:
                speaker.is_playing:
    # 重启设备端唤醒词（如果配置为 On device）
    - if:
        condition:
          - lambda: return id(wake_word_engine_location).current_option() == "On device";
        then:
          - lambda: id(va).set_use_wake_word(false);
          - micro_wake_word.start:
    - script.execute: set_idle_or_mute_phase
    - script.execute: voice_ui_update
    # 清除文本传感器
    - text_sensor.template.publish:
        id: text_request
        state: ""
    - text_sensor.template.publish:
        id: text_response
        state: ""

  # 出错处理
  on_error:
    - if:
        condition:
          lambda: return !id(init_in_progress);
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: voice_ui_update
          - delay: 1s
          - if:
              condition:
                switch.is_off: mute
              then:
                - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
              else:
                - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
          - script.execute: voice_ui_update

  # HA 连接 / 断开
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - script.execute: start_wake_word
    - script.execute: set_idle_or_mute_phase
    - script.execute: voice_ui_update
  on_client_disconnected:
    - script.execute: stop_wake_word
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: voice_ui_update

  # 计时器相关回调
  on_timer_started:
    - script.execute: voice_ui_update
  on_timer_cancelled:
    - script.execute: voice_ui_update
  on_timer_updated:
    - script.execute: voice_ui_update
  on_timer_tick:
    - script.execute: voice_ui_update
  on_timer_finished:
    - switch.turn_on: timer_ringing
    - wait_until:
        media_player.is_announcing:
    - lambda: id(voice_assistant_phase) = ${voice_assist_timer_finished_phase_id};
    - script.execute: voice_ui_update

# ── 脚本（Scripts）说明 ───────────────────────────────────────────
# 以下脚本定义在 packages/script.yaml 中，以避免与该文件中已有的 script: 块冲突：
#   - start_wake_word        : 根据 wake_word_engine_location 启动 mWW 或流式唤醒
#   - stop_wake_word         : 停止对应唤醒词引擎
#   - set_idle_or_mute_phase : 根据 mute 开关设置 idle/muted 阶段
#   - voice_ui_update        : 根据 voice_assistant_phase 切换 LVGL 页面、更新图标/文字、
#                              高亮侧边栏语音按钮
#   - return_to_previous_page: 从语音页面返回启动前的页面

# ── 开关（Switches） ──────────────────────────────────────────────
switch:
  # 软件静音开关（控制麦克风）
  - platform: template
    name: Mute
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_off:
      - microphone.unmute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
      - script.execute: voice_ui_update
    on_turn_on:
      - microphone.mute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
      - script.execute: voice_ui_update

  # 计时器响铃开关（内部使用）
  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      - lambda: |-
          id(speaker_media_player)
            ->make_call()
            .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
            .set_announcement(true)
            .perform();
          id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);
      - media_player.stop:
          announcement: true
    on_turn_on:
      - lambda: |-
          id(speaker_media_player)
            ->make_call()
            .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
            .set_announcement(true)
            .perform();
          id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 1000);
      - media_player.speaker.play_on_device_media_file:
          media_file: timer_finished_sound
          announcement: true
      - delay: 15min
      - switch.turn_off: timer_ringing

# ── 选择器：唤醒词引擎运行位置 ─────────────────────────────────────
select:
  - platform: template
    entity_category: config
    name: Wake word engine location
    id: wake_word_engine_location
    icon: "mdi:account-voice"
    optimistic: true
    restore_value: true
    options:
      - In Home Assistant
      - On device
    initial_option: On device
    on_value:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - wait_until:
                lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id} || id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
            - if:
                condition:
                  lambda: return x == "In Home Assistant";
                then:
                  - micro_wake_word.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - lambda: id(va).set_use_wake_word(true);
                        - voice_assistant.start_continuous:
            - if:
                condition:
                  lambda: return x == "On device";
                then:
                  - lambda: id(va).set_use_wake_word(false);
                  - voice_assistant.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - micro_wake_word.start

# ── 文本传感器：用户问 / 答复 ─────────────────────────────────────
text_sensor:
  # 用户问（STT 结果），自动截断过长文本
  - id: text_request
    platform: template
    on_value:
      lambda: |-
        if(id(text_request).state.length() > 80) {
          std::string name = id(text_request).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(), 78);
          id(text_request).state = (truncated + "...").c_str();
        }

  # 助手答复（TTS 文本），自动截断过长文本
  - id: text_response
    platform: template
    on_value:
      lambda: |-
        if(id(text_response).state.length() > 80) {
          std::string name = id(text_response).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(), 78);
          id(text_response).state = (truncated + "...").c_str();
        }
