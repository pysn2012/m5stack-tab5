sensor:
  - platform: homeassistant
    id: phone_battery
    entity_id: ${entity_phone_battery}
    on_value:
      - lambda: |-
          if (id(icon_phone) == nullptr) return;
          if(isnan(x)) {
            lv_obj_set_style_text_color(id(icon_phone), lv_color_hex(UIColor::INACTIVE), LV_PART_MAIN);
          } else if(x > 80.0) {
            lv_obj_set_style_text_color(id(icon_phone), lv_color_hex(UIColor::SUCCESS), LV_PART_MAIN);
          } else if(x > 40.0) {
            lv_obj_set_style_text_color(id(icon_phone), lv_color_hex(UIColor::INFO), LV_PART_MAIN);
          } else if(x >= 20.0) {
            lv_obj_set_style_text_color(id(icon_phone), lv_color_hex(UIColor::WARNING), LV_PART_MAIN);
          } else {
            lv_obj_set_style_text_color(id(icon_phone), lv_color_hex(UIColor::ERROR), LV_PART_MAIN);
          }

  - platform: homeassistant
    id: temp_serre
    entity_id: ${entity_temp_plante}
    on_value:
      - lambda: |-
          if (id(current_serre) == nullptr) return;
          if(isnan(x)) {
            lv_label_set_text(id(current_serre), "-- \xC2\xB0");
            lv_obj_set_style_text_color(id(current_serre), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);
          } else {
            char buf[32];
            sprintf(buf, "%.1f \xC2\xB0", x);
            lv_label_set_text(id(current_serre), buf);
            uint32_t c_int = get_temperature_color(x); // AXE1: appel fonction C++ centralisee
            lv_obj_set_style_text_color(id(current_serre), lv_color_hex(c_int), LV_PART_MAIN);
          }

