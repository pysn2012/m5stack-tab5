select:
  - platform: template
    id: wifi_antenna_select
    name: "WiFi Antenna"
    options:
      - "Internal"
      - "External"
    optimistic: true
    on_value:
      - if:
          condition:
            lambda: return i == 0;
          then:
            - switch.turn_off: wifi_antenna_int_ext
          else:
            - switch.turn_on: wifi_antenna_int_ext

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Paris
    on_time:
      - seconds: 0
        minutes: "*"
        then:
          - lambda: |-
              auto t_now = id(sntp_time).now();
              if (t_now.is_valid()) {
                char buf_time[16];
                sprintf(buf_time, "%02d:%02d", t_now.hour, t_now.minute);
                lv_label_set_text(id(lbl_time), buf_time);
             
                const char* days[] = {"Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"};
                const char* months[] = {"Janv", "Févr", "Mars", "Avr", "Mai", "Juin", "Juil", "Août", "Sept", "Oct", "Nov", "Déc"};
                char buf_date[64];

                sprintf(buf_date, "%s %02d %s", days[t_now.day_of_week - 1], t_now.day_of_month, months[t_now.month - 1]);

                lv_label_set_text(id(lbl_date), buf_date);

              }

interval:
  - interval: 5s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - lambda: 'lv_obj_set_style_text_color(id(icon_wifi), lv_color_hex(UIColor::SUCCESS), LV_PART_MAIN);'
          else:
            - lambda: 'lv_obj_set_style_text_color(id(icon_wifi), lv_color_hex(UIColor::INACTIVE), LV_PART_MAIN);'
  - interval: 2s
    then:
      - lambda: |-
          if (id(layer_console_sys) != nullptr && !lv_obj_has_flag(id(layer_console_sys), LV_OBJ_FLAG_HIDDEN)) {

             // Update SRAM, PSRAM, Frag & Flash

             if (id(lbl_sys_sram_val) != nullptr) {

                #ifdef USE_ESP_IDF

                float sram_free = heap_caps_get_free_size(MALLOC_CAP_INTERNAL) / 1024.0f;
                float sram_total = heap_caps_get_total_size(MALLOC_CAP_INTERNAL) / 1024.0f;
                float psram_free = heap_caps_get_free_size(MALLOC_CAP_SPIRAM) / 1024.0f / 1024.0f;
                float psram_total = heap_caps_get_total_size(MALLOC_CAP_SPIRAM) / 1024.0f / 1024.0f;

                float frag = heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL) / 1024.0f;

                #else

                float sram_free = ESP.getFreeHeap() / 1024.0f;
                float sram_total = ESP.getHeapSize() / 1024.0f;
                float psram_free = ESP.getFreePsram() / (1024.0f * 1024.0f);
                float psram_total = ESP.getPsramSize() / (1024.0f * 1024.0f);

                float frag = ESP.getMaxAllocHeap() / 1024.0f;

                #endif

                float sram_used = sram_total - sram_free;
                if(sram_used < 0) sram_used = 0;
                float psram_used = psram_total - psram_free;
                if(psram_used < 0) psram_used = 0;

                int sram_pct = (int)((sram_used / sram_total) * 100.0f);
                int psram_pct = (int)((psram_used / psram_total) * 100.0f);

                char b_sram[32]; sprintf(b_sram, "%d%% (%.1f KB)", sram_pct, sram_used);

                lv_label_set_text(id(lbl_sys_sram_val), b_sram);
                lv_bar_set_value(id(bar_sys_sram), sram_pct, LV_ANIM_ON);

                char b_psram[32]; sprintf(b_psram, "%d%% (%.2f MB)", psram_pct, psram_used);

                lv_label_set_text(id(lbl_sys_psram_val), b_psram);
                lv_bar_set_value(id(bar_sys_psram), psram_pct, LV_ANIM_ON);
                
                auto set_bar_color = [](lv_obj_t* bar, int pct) {
                    lv_color_t color = lv_color_hex(UIColor::SUCCESS); // Vert (Normal)
                    if(pct > 50) color = lv_color_hex(UIColor::INFO); // Bleu (Bien-Rempli)
                    if(pct > 75) color = lv_color_hex(UIColor::WARNING); // Orange (Attention)
                    if(pct > 90) color = lv_color_hex(UIColor::ERROR); // Rouge (Critique)
                    lv_obj_set_style_bg_color(bar, color, LV_PART_INDICATOR);
                };
                set_bar_color(id(bar_sys_sram), sram_pct);
                set_bar_color(id(bar_sys_psram), psram_pct);

                char b_frag[32]; sprintf(b_frag, "%.1f KB", frag);

                lv_label_set_text(id(lbl_sys_frag_val), b_frag);

                lv_label_set_text(id(lbl_sys_flash_val), "16.0 MB");

             }

             // Update Loop Time

             if (id(sys_loop_time).has_state() && id(lbl_sys_loop_val) != nullptr) {

                float ltime = id(sys_loop_time).state; // usually in ms

                char buf[32];

                sprintf(buf, "%.0f ms", ltime);

                lv_label_set_text(id(lbl_sys_loop_val), buf);

             }

             // Update IP & SSID

             if (id(sys_wifi_ip).has_state() && id(lbl_sys_ip_val) != nullptr) {

                std::string ip = id(sys_wifi_ip).state;

                lv_label_set_text(id(lbl_sys_ip_val), ip.c_str());

             }

             if (id(sys_wifi_ssid).has_state() && id(lbl_sys_ssid_val) != nullptr) {

                std::string ssid = id(sys_wifi_ssid).state;

                lv_label_set_text(id(lbl_sys_ssid_val), ssid.c_str());

             }

          }

