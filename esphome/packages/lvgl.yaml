# 全局变量定义
globals:
  # 当前页面编号（0=主页, 1=插座, 2=系统, 3=语音）
  - id: page_num
    type: int
    restore_value: no
    initial_value: '0'
  # 背光亮度值 (0-255)
  - id: backlight_brightness_val
    type: int
    restore_value: yes
    initial_value: '153'  # 默认 60% (153/255 ≈ 60%)
  # 室外传感器缓存值
  - id: outdoor_temp_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: outdoor_humi_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: outdoor_pres_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: outdoor_pm25_val
    type: float
    restore_value: no
    initial_value: '0'
  # 室内传感器缓存值
  - id: indoor_temp_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: indoor_humi_val
    type: float
    restore_value: no
    initial_value: '0'
  # 插座功率缓存值
  - id: weak_power_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: weak_total_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: desk_power_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: desk_total_val
    type: float
    restore_value: no
    initial_value: '0'
  # 音量缓存值
  - id: volume_val
    type: int
    restore_value: yes
    initial_value: '60'

# LVGL 图形库配置
lvgl:
  rotation: 270
  on_boot:
    - light.turn_on: backlight
    - rx8130.read_time:
    - script.execute: expand_nav_btn_click_area
    - script.execute: nav_rail_update
    - script.execute: sync_ha
    # 初始化滑块位置和标签（使用全局初始值 60%）
    - lvgl.slider.update:
        id: backlight_slider
        value: !lambda return id(backlight_brightness_val);
    - lvgl.slider.update:
        id: volume_slider
        value: !lambda return id(volume_val);
    - lvgl.label.update:
        id: backlight_bright_label
        text: !lambda |-
          static char buf[16];
          int percent = id(backlight_brightness_val) * 100 / 255;
          snprintf(buf, sizeof(buf), "%d %%", percent);
          return buf;
    - lvgl.label.update:
        id: volume_label
        text: !lambda |-
          static char buf[16];
          snprintf(buf, sizeof(buf), "%d %%", id(volume_val));
          return buf;
    # 设置媒体播放器初始音量
    - media_player.volume_set: !lambda return id(volume_val) / 100.0;

  byte_order: little_endian
  color_depth: 16
  # 自动息屏
  on_idle:
    # 超时时间动态读取自 system.yaml 中定义的 select 组件
    timeout: !lambda |-
      int timeout_sec = 30; // 默认 30 秒
      if (id(screen_off_timeout_sec).has_state()) {
        std::string opt = id(screen_off_timeout_sec).current_option();
        if (opt == "Never") return UINT32_MAX; // 永不超时
        timeout_sec = atoi(opt.c_str());
      }
      return timeout_sec * 1000;

    then:
      - if:
          condition:
            # 判断是否处于语音助手活跃状态
            - lambda: |-
                int phase = id(voice_assistant_phase);
                // 活跃状态包括：聆听(2)、思考(3)、回复(4)、计时结束响铃(20)
                return (phase == ${voice_assist_listening_phase_id} ||
                        phase == ${voice_assist_thinking_phase_id} ||
                        phase == ${voice_assist_replying_phase_id} ||
                        phase == ${voice_assist_timer_finished_phase_id});
          then:
            - logger.log: "语音助手活跃中，阻止息屏"
          else:
            # 如果语音助手未活跃，执行息屏脚本
            - script.execute: screen_off

  # LVGL 样式定义
  style_definitions:
    # 侧边栏样式
    - id: sidebar
      bg_color: 0xE9EFEE
      bg_opa: COVER
      border_opa: TRANSP
      pad_top: 30
      pad_left: 0
      pad_right: 0
      radius: 0
      width: 192
      height: 100%

    # 导航按钮容器样式
    - id: nav_btn_container
      bg_opa: TRANSP
      border_opa: TRANSP
      width: 160
      height: 160
      pad_all: 0

    # 导航按钮未激活样式（水平布局：icon + 文字在同一行）
    - id: nav_btn_inactivate
      bg_opa: TRANSP
      width: 150
      height: 150
      radius: 28              # 半高圆角，胶囊形底纹不超出按钮
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_all: 0

    - id: nav_btn_activate
      bg_color: 0xCCE8E7    # 选中底纹色
      bg_opa: COVER
      width: 150
      height: 150
      radius: 28
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_all: 0

    # 语音助手按钮激活样式（橙色高亮，区别于普通导航）
    - id: va_btn_activate
      bg_color: 0xFF8C00    # 橙色：突出语音助手激活态
      bg_opa: COVER
      width: 150
      height: 150
      radius: 28
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_all: 0

    # 导航图标激活样式
    # 不设置 align，由按钮的 flex 布局统一控制位置
    - id: nav_icon_activate
      text_font: extra_icon_80
      text_color: 0x1A4A4A

    # 导航图标未激活样式
    - id: nav_icon_inactivate
      text_font: extra_icon_80
      text_color: 0x3F4948

    # 内容容器样式
    - id: content_container
      align: CENTER
      bg_opa: COVER
      border_opa: TRANSP
      height: 100%
      width: 1080
      x: 96
      pad_top: 30
      pad_left: 20

    # 语音助手页面：状态卡片样式
    - id: va_status_card
      bg_color: 0xFFFFFF
      bg_opa: COVER
      border_opa: TRANSP
      radius: 24
      width: 900
      height: 180
      pad_all: 24
      shadow_opa: TRANSP

    # 语音助手页面：对话气泡样式（用户问）
    - id: va_request_bubble
      bg_color: 0xCCE8E7
      bg_opa: COVER
      border_opa: TRANSP
      radius: 24
      width: 800
      height: SIZE_CONTENT
      min_height: 80
      pad_all: 24
      shadow_opa: TRANSP

    # 语音助手页面：对话气泡样式（助手答复）
    - id: va_response_bubble
      bg_color: 0xFFE0B2
      bg_opa: COVER
      border_opa: TRANSP
      radius: 24
      width: 800
      height: SIZE_CONTENT
      min_height: 80
      pad_all: 24
      shadow_opa: TRANSP

  # 顶层导航栏和模态框
  top_layer:
    widgets:
      # 侧边导航栏
      - obj:
          align: TOP_LEFT
          styles: sidebar
          id: sidebars
          layout:
            type: flex
            flex_flow: COLUMN
            pad_row: 5
            flex_align_main: start
            flex_align_cross: center
            flex_align_track: center
          widgets:
            # 主页导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: dash_panel_btn
                      widgets:
                        - label:
                            id: dash_btn_icon
                            styles: nav_icon_inactivate
                            text: "\U000F02DC" # 主页图标
                            align: center
                      on_press:
                        - lambda: id(page_num) = 0;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: main_page


            # 插座导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: socket_panel_btn
                      widgets:
                        - label:
                            id: socket_btn_icon
                            styles: nav_icon_inactivate
                            text: "\U000F0905" # 插座图标
                            align: center
                      on_press:
                        - lambda: id(page_num) = 1;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: socket_page


            # 系统导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: light_panel_btn
                      widgets:
                        - label:
                            id: light_btn_icon
                            styles: nav_icon_inactivate
                            text: "\U000F08BB"  # 齿轮（轮廓）图标
                            align: center
                      on_press:
                        - lambda: id(page_num) = 2;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: system_page


            # 语音助手导航按钮（侧边栏第 4 项）
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: voice_panel_btn
                      widgets:
                        - label:
                            id: voice_btn_icon
                            styles: nav_icon_inactivate
                            text: "\U000F05CB" # 声音助手图标 (account-voice)
                            align: center
                      on_press:
                        # 跳转到语音页面
                        - lambda: id(page_num) = 3;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: voice_page
                        # 主动启动一次语音助手（push-to-talk）
                        - if:
                            condition:
                              not:
                                voice_assistant.is_running:
                            then:
                              - script.execute: stop_wake_word
                              - voice_assistant.start:


      # 状态栏（显示电池/WiFi/API 状态图标）
      - obj:
          align: TOP_RIGHT
          id: status_bar
          width: 1280
          height: 100
          bg_opa: TRANSP
          border_opa: TRANSP
          layout:
            type: FLEX
            flex_flow: ROW_REVERSE
            flex_align_main: END
            flex_align_cross: CENTER
            flex_align_track: CENTER
            pad_column: 20
          widgets:
            - label:
                id: pwr_bat_icon_label
                text_font: extra_icon
                text: "\U000F06A5"
            - label:
                id: wifi_icon_label
                hidden: true
                text_font: extra_icon
                text: "\U000F05A9"
            - label:
                id: api_icon_label
                hidden: true
                text_font: extra_icon
                text: "\U000F109B"

      # Wi-Fi 配置弹窗（默认隐藏）
      - obj:
          id: wifi_config_panel
          hidden: true
          align: CENTER
          width: 1100
          height: 700
          bg_color: 0xFFFFFF
          bg_opa: COVER
          border_width: 2
          border_color: 0xCCCCCC
          radius: 20
          layout:
            type: flex
            flex_flow: COLUMN
            flex_align_main: CENTER
            flex_align_cross: CENTER
            pad_row: 10
          widgets:
            # 标题
            - label:
                text_font: noto_sans_sc_32
                text: "WiFi设置"
                text_color: 0x333333
            
            # 输入框容器（SSID + 密码）
            - obj:
                width: 1000
                height: SIZE_CONTENT
                bg_opa: TRANSP
                layout:
                  type: GRID
                  grid_columns: [120, FR(1)]
                  grid_rows: [60, 60]
                  pad_column: 10
                  pad_row: 5
                widgets:
                  # SSID 标签
                  - label:
                      text_font: montserrat_26
                      text: "SSID:"
                      grid_cell_column_pos: 0
                      grid_cell_row_pos: 0
                      grid_cell_x_align: CENTER
                      grid_cell_y_align: CENTER
                  # SSID 输入框
                  - textarea:
                      id: ta_wifi_ssid
                      grid_cell_column_pos: 1
                      grid_cell_row_pos: 0
                      width: 720
                      height: 50
                      pad_all: 2
                      text_font: montserrat_26
                      placeholder_text: "WiFi SSID"
                      border_width: 1
                      on_click:  # lambda 切换键盘绑定
                        - lambda: lv_keyboard_set_textarea(id(kb_wifi)->obj, id(ta_wifi_ssid));
                        
                  # 密码标签
                  - label:
                      text_font: montserrat_26
                      text: "PWD: "
                      grid_cell_column_pos: 0
                      grid_cell_row_pos: 1
                      grid_cell_x_align: CENTER
                      grid_cell_y_align: CENTER
                  # 密码输入框
                  - textarea:
                      id: ta_wifi_pass
                      grid_cell_column_pos: 1
                      grid_cell_row_pos: 1
                      width: 720
                      height: 50
                      pad_all: 2
                      text_font: montserrat_26
                      placeholder_text: "WiFi PASSWORD"
                      password_mode: true
                      border_width: 1
                      on_click:  # lambda 切换键盘绑定
                        - lambda: lv_keyboard_set_textarea(id(kb_wifi)->obj, id(ta_wifi_pass));

            # 虚拟键盘
            - keyboard:
                id: kb_wifi
                width: 1000
                height: 280
                textarea: ta_wifi_ssid    # 默认关联到 SSID 框
                mode: TEXT_LOWER
                bg_opa: 0
                radius: 20
                pad_bottom: 10
                translate_y: 10
                items:
                    bg_color: 0x7893A6    # dark
                    text_color: 0xE9EFFB
                    text_font: montserrat_26
                    checked:
                      bg_color: 0x2478D9
                      text_color: 0xE9EFFB

            # 底部按钮（连接/取消）
            - obj:
                width: 1000
                height: 100
                bg_opa: TRANSP
                pad_all: 5 
                layout:
                  type: FLEX
                  flex_flow: ROW
                  pad_column: 40
                  flex_align_main: CENTER
                widgets:
                  - button:
                      width: 180
                      height: 60
                      bg_color: 0x3498DB
                      radius: 10
                      on_press:
                        - script.execute: connect_wifi_action
                      widgets:
                        - label:
                            text_font: noto_sans_sc_32
                            text: "连接"
                            text_color: 0xFFFFFF
                            align: CENTER
                  - button:
                      width: 180
                      height: 60
                      bg_color: 0xCCCCCC
                      radius: 10
                      on_press:
                        - lvgl.widget.hide: wifi_config_panel
                        - lvgl.textarea.update:
                            id: ta_wifi_ssid
                            text: ""
                        - lvgl.textarea.update:
                            id: ta_wifi_pass
                            text: ""
                      widgets:
                        - label:
                            text_font: noto_sans_sc_32
                            text: "取消"
                            text_color: 0xFFFFFF
                            align: CENTER

  # LVGL 页面定义
  pages:
    # ========== 主页页面 ==========
    - id: main_page
      widgets:
        - obj:
            styles: content_container
            widgets:
              # 时间显示（大字居中）
              - label:
                  id: time_label
                  text_font: montserrat_96
                  text: "14:07"
                  align: CENTER
                  y: -200
              # 日期星期（中字居中）
              - label:
                  id: date_label
                  text_font: montserrat_32
                  text: "2026-03-11 Thu"
                  align: CENTER
                  y: -110
              # 信息区域（3行左对齐）
              - obj:
                  width: 950
                  height: 300
                  align: CENTER
                  y: 50
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: GRID
                    grid_columns: [FR(1)]
                    grid_rows: [FR(1), FR(1), FR(1)]
                    pad_row: 12
                  widgets:
                    # 室外行
                    - label:
                        id: outdoor_label
                        text_font: noto_sans_sc_32
                        text: "室外：温度--℃  湿度--%  气压--hPa  颗粒物--ppm"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 0
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    # 室内行
                    - label:
                        id: indoor_label
                        text_font: noto_sans_sc_32
                        text: "室内：温度--℃  湿度--%"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 1
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    # 预警行
                    - label:
                        id: weather_alert_label
                        text_font: noto_sans_sc_32
                        text_color: 0xE74C3C
                        text: "预警：无预警"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 2
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER

    # ========== 插座页面 ==========
    - id: socket_page
      widgets:
        - obj:
            styles: content_container
            widgets:
              # 4个插座按钮（并排）
              - obj:
                  width: 950
                  height: 240
                  align: CENTER
                  y: -160
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    pad_column: 24
                    flex_align_main: START
                    flex_align_cross: CENTER
                  widgets:
                    # 插座1按钮
                    - button:
                        id: chuangmi_socket1_button
                        width: 160
                        height: 160
                        radius: 20               # 圆角
                        pad_all: 12              # 内边距
                        text_color: 0xFFFFFF     # 文字颜色
                        checkable: true
                        bg_color: 0xE9EFEE       # 关闭状态颜色灰色
                        checked:
                          bg_color: 0xFF8C00     # 开启状态颜色橙色
                        widgets:
                          - label:
                              text_font: extra_icon_80
                              align: top_mid
                              text: "\U000F0425"
                          - label:
                              text_font: noto_sans_sc_32
                              text: "插座1"
                              align: bottom_mid
                        on_click:
                          - homeassistant.action:
                              action: switch.toggle
                              data:
                                entity_id: switch.chuangmi_cn_125697630_m3_on_p_2_1
                    # 插座2按钮
                    - button:
                        id: chuangmi_socket2_button
                        width: 160
                        height: 160
                        radius: 20               # 圆角
                        pad_all: 12              # 内边距
                        text_color: 0xFFFFFF     # 文字颜色
                        checkable: true
                        bg_color: 0xE9EFEE       # 关闭状态颜色灰色
                        checked:
                          bg_color: 0xFF8C00     # 开启状态颜色橙色
                        widgets:
                          - label:
                              text_font: extra_icon_80
                              align: top_mid
                              text: "\U000F0425"
                          - label:
                              text_font: noto_sans_sc_32
                              text: "插座2"
                              align: bottom_mid
                        on_click:
                          - homeassistant.action:
                              action: switch.toggle
                              data:
                                entity_id: switch.chuangmi_cn_125796823_m3_on_p_2_1
                    # 插座3按钮
                    - button:
                        id: chuangmi_socket3_button
                        width: 160
                        height: 160
                        radius: 20               # 圆角
                        pad_all: 12              # 内边距
                        text_color: 0xFFFFFF     # 文字颜色
                        checkable: true
                        bg_color: 0xE9EFEE       # 关闭状态颜色灰色
                        checked:
                          bg_color: 0xFF8C00     # 开启状态颜色橙色
                        widgets:
                          - label:
                              text_font: extra_icon_80
                              align: top_mid
                              text: "\U000F0425"
                          - label:
                              text_font: noto_sans_sc_32
                              text: "插座3"
                              align: bottom_mid
                        on_click:
                          - homeassistant.action:
                              action: switch.toggle
                              data:
                                entity_id: switch.chuangmi_cn_125520813_m3_on_p_2_1
                    # 插座4按钮
                    - button:
                        id: chuangmi_socket4_button
                        width: 160
                        height: 160
                        radius: 20               # 圆角
                        pad_all: 12              # 内边距
                        text_color: 0xFFFFFF     # 文字颜色
                        checkable: true
                        bg_color: 0xE9EFEE       # 关闭状态颜色灰色
                        checked:
                          bg_color: 0xFF8C00     # 开启状态颜色橙色
                        widgets:
                          - label:
                              text_font: extra_icon_80
                              align: top_mid
                              text: "\U000F0425"
                          - label:
                              text_font: noto_sans_sc_32
                              text: "插座4"
                              align: bottom_mid
                        on_click:
                          - homeassistant.action:
                              action: switch.toggle
                              data:
                                entity_id: switch.chuangmi_cn_393289534_212a01_on_p_2_1

              # 信息区域（2行左对齐）
              - obj:
                  width: 950
                  height: 200
                  align: CENTER
                  y: 30
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: GRID
                    grid_columns: [FR(1)]
                    grid_rows: [FR(1), FR(1)]
                    pad_row: 12
                  widgets:
                    # 弱电行
                    - label:
                        id: weak_power_label
                        text_font: noto_sans_sc_32
                        text: "弱电：功耗--W  总电量--Wh"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 0
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    # 书桌行
                    - label:
                        id: desk_power_label
                        text_font: noto_sans_sc_32
                        text: "书桌：功耗--W  总电量--Wh"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 1
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER

    # ========== 系统页面 ==========
    - id: system_page
      widgets:
        # 左上角页面标题
        - label:
            text_font: noto_sans_sc_48
            text: "设置"
            align: TOP_LEFT
            x: 120
            y: 30
            text_color: 0x1A4A4A
        # 内容容器
        - obj:
            styles: content_container
            pad_top: 100 # 留出顶部标题空间
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: SPACE_EVENLY
              flex_align_cross: START
            widgets:
              # 左列容器
              - obj:
                  width: 520
                  height: 580
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: SPACE_EVENLY
                  widgets:
                    # 模块：显示
                    - obj:
                        width: 520
                        height: 280
                        bg_color: 0xFFFFFF
                        bg_opa: COVER
                        radius: 20
                        border_opa: TRANSP
                        pad_all: 24
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 20
                        widgets:
