    # ========== 系统页面 ==========
    - id: system_page
      widgets:  
        - obj:
            styles: content_container
            align: BOTTOM_RIGHT
            width: 1088
            height: 620
            scroll_dir: VER
            scrollbar_mode: ACTIVE
            scroll_momentum: false
            scroll_elastic: false
            widgets:
              - obj:
                  align: TOP_MID
                  x: 0
                  y: 5
                  width: 980
                  height: 600
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: GRID                          # ← GRID 布局
                    grid_columns: [FR(1), FR(1)]         # ← 两列，等宽
                    grid_rows: [230, 330]  # ← 两行自适应
                    pad_column: 10                       # ← 列间距
                    pad_row: 10                          # ← 行间距
                  widgets:
                    # ─── 显示模块 (第0列, 第0行) ───
                    - obj:
                        styles: small_card
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 0
                        grid_cell_x_align: STRETCH      # ← 撑满单元格
                        grid_cell_y_align: STRETCH
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 0
                        widgets:
                          - label:
                              styles: module_title
                              text: "显示"
                          - obj:
                              styles: module_divider
                          - obj:
                              styles: setting_row
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: START
                                flex_align_cross: CENTER
                                pad_column: 12
                              widgets:
                                - label:
                                    styles: setting_label
                                    text: "亮度"
                                    flex_grow: 1
                                - slider:
                                    id: backlight_slider
                                    width: 200
                                    height: 32
                                    radius: 18
                                    min_value: 0
                                    max_value: 255
                                    value: 153
                                    bg_color: 0xECECEC
                                    bg_opa: COVER
                                    indicator:
                                      radius: 18
                                      bg_color: 0xFFB90B
                                    knob:
                                      bg_opa: TRANSP
                                    on_release:
                                      - light.turn_on:
                                          id: backlight
                                          brightness: !lambda return x / 255.0;
                                      - lambda: id(backlight_brightness_val) = int(x);
                                      - lvgl.label.update:
                                          id: backlight_bright_label
                                          text: !lambda |-
                                            static char buf[16];
                                            int percent = int(x) * 100 / 255;
                                            snprintf(buf, sizeof(buf), "%d %%", percent);
                                            return buf;
                                      - homeassistant.action:
                                          action: light.turn_on
                                          data:
                                            entity_id: light.tab5_display_backlight
                                            brightness: !lambda return int(x);
                                - label:
                                    id: backlight_bright_label
                                    text_font: montserrat_32
                                    text_color: 0x333333
                                    text: "60 %"
                          - obj:
                              styles: setting_row
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: START
                                flex_align_cross: CENTER
                                pad_column: 12
                              widgets:
                                - label:
                                    styles: setting_label
                                    text: "息屏时间"
                                    flex_grow: 1
                                - dropdown:
                                    id: screen_off_timeout_dropdown
                                    width: 180
                                    height: 44
                                    text_font: montserrat_32
                                    bg_color: 0xF5F5F5
                                    bg_opa: COVER
                                    border_width: 0
                                    radius: 8
                                    options:
                                      - "15"
                                      - "30"
                                      - "60"
                                      - "90"
                                      - "120"
                                      - "Never"
                                    selected_index: 1

                    # ─── 声音模块 (第1列, 第0行) ───
                    - obj:
                        styles: small_card
                        grid_cell_column_pos: 1
                        grid_cell_row_pos: 0
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 0
                        widgets:
                          - label:
                              styles: module_title
                              text: "声音"
                          - obj:
                              styles: module_divider
                          - obj:
                              styles: setting_row
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: START
                                flex_align_cross: CENTER
                                pad_column: 12
                              widgets:
                                - label:
                                    styles: setting_label
                                    text: "音量"
                                    flex_grow: 1
                                - slider:
                                    id: volume_slider
                                    width: 200
                                    height: 32
                                    radius: 18
                                    min_value: 0
                                    max_value: 100
                                    value: 60
                                    bg_color: 0xECECEC
                                    bg_opa: COVER
                                    indicator:
                                      radius: 18
                                      bg_color: 0x4A6363
                                    knob:
                                      bg_opa: TRANSP
                                    on_release:
                                      - number.set:
                                          id: volume_number
                                          value: !lambda return int(x);
                                - label:
                                    id: volume_label
                                    text_font: montserrat_32
                                    text_color: 0x333333
                                    text: "60 %"
                          - obj:
                              styles: setting_row
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: START
                                flex_align_cross: CENTER
                                pad_column: 12
                              widgets:
                                - label:
                                    styles: setting_label
                                    text: "DAC输出"
                                    flex_grow: 1
                                - dropdown:
                                    id: tab5_dac_output_dropdown
                                    width: 180
                                    height: 44
                                    text_font: montserrat_32
                                    bg_color: 0xF5F5F5
                                    bg_opa: COVER
                                    border_width: 0
                                    radius: 8
                                    options:
                                      - "LINE1"
                                      - "LINE2"
                                      - "BOTH"
                                    selected_index: 0

                    # ─── 网络模块 (第0列, 第1行) ───
                    - obj:
                        styles: small_card
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 1
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 0
                        widgets:
                          - label:
                              styles: module_title
                              text: "网络"
                          - obj:
                              styles: module_divider
                          - obj:
                              styles: setting_row
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: START
                                flex_align_cross: CENTER
                                pad_column: 12
                              widgets:
                                - label:
                                    styles: setting_label
                                    text: "WiFi配置"
                                    flex_grow: 1
                                - button:
                                    id: btn_wifi_config
                                    width: 160
                                    height: 44
                                    radius: 8
                                    text_color: 0xFFFFFF
                                    bg_color: 0x3498DB
                                    checkable: false
                                    on_press:
                                      - lvgl.widget.show: wifi_config_panel
                                    widgets:
                                      - label:
                                          text_font: noto_sans_sc_32
                                          text: "配网"
                                          align: CENTER
                                          text_color: 0xFFFFFF
                          - obj:
                              styles: setting_row
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: START
                                flex_align_cross: CENTER
                                pad_column: 12
                              widgets:
                                - label:
                                    styles: setting_label
                                    text: "IP地址"
                                    flex_grow: 1
                                - label:
                                    id: sys_ip_label
                                    styles: setting_label
                                    text: "0.0.0.0"
                          - obj:
                              styles: setting_row
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: START
                                flex_align_cross: CENTER
                                pad_column: 12
                              widgets:
                                - label:
                                    styles: setting_label
                                    text: "信号强度"
                                    flex_grow: 1
                                - label:
                                    id: sys_rssi_label
                                    styles: setting_label
                                    text: "-- dBm"

                    # ─── 系统模块 (第1列, 第1行) ───
                    - obj:
                        styles: small_card
                        grid_cell_column_pos: 1
                        grid_cell_row_pos: 1
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 0
                        widgets:
                          - label:
                              styles: module_title
                              text: "系统"
                          - obj:
                              styles: module_divider
                          - obj:
                              styles: setting_row
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: START
                                flex_align_cross: CENTER
                                pad_column: 12
                              widgets:
                                - label:
                                    styles: setting_label
                                    text: "设备控制"
                                    flex_grow: 1
                                - button:
                                    id: btn_restart
                                    width: 120
                                    height: 44
                                    radius: 8
                                    text_color: 0xFFFFFF
                                    bg_color: 0x27AE60
                                    checkable: false
                                    on_press:
                                      - button.press: restart_button
                                    widgets:
                                      - label:
                                          text_font: noto_sans_sc_32
                                          text: "重启"
                                          align: CENTER
                                          text_color: 0xFFFFFF
                                - button:
                                    id: btn_shutdown
                                    width: 120
                                    height: 44
                                    radius: 8
                                    text_color: 0xFFFFFF
                                    bg_color: 0xE74C3C
                                    checkable: false
                                    on_press:
                                      - button.press: shutdown_button
                                    widgets:
                                      - label:
                                          text_font: noto_sans_sc_32
                                          text: "关机"
                                          align: CENTER
                                          text_color: 0xFFFFFF
                          - obj:
                              styles: setting_row
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: START
                                flex_align_cross: CENTER
                                pad_column: 12
                              widgets:
                                - label:
                                    styles: setting_label
                                    text: "运行时间"
                                    flex_grow: 1
                                - label:
                                    id: sys_uptime_label
                                    styles: setting_label
                                    text: "--:--:--"

    # ========== 语音助手页面 ==========
    # 由 voice_ui_update 脚本驱动：
    #   - va_status_icon   : 顶部大图标（聆听/思考/回复/错误…）
    #   - va_status_label  : 顶部状态文字
    #   - va_request_label : 用户说的话（STT 结果）
    #   - va_response_label: 助手答复（TTS 文本）
    - id: voice_page
      widgets:
        - obj:
            styles: content_container
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: CENTER
              flex_align_cross: CENTER
              pad_row: 24
            widgets:
              # 顶部状态卡片（图标 + 状态文字）
              - obj:
                  styles: va_status_card
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: CENTER
                    flex_align_cross: CENTER
                    pad_row: 12
                  widgets:
                    - label:
                        id: va_status_icon
                        text_font: extra_icon
                        text_color: 0xFF8C00
                        text: "\U000F05CB"
                    - label:
                        id: va_status_label
                        text_font: noto_sans_sc_32    # ← 统一使用 noto_sans_sc_32
                        text_color: 0x333333
                        text: "待机状态"
                        text_align: CENTER
                        long_mode: WRAP
                        width: 800

              # 用户问气泡（蓝色）
              - obj:
                  styles: va_request_bubble
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: START
                    flex_align_cross: START
                  widgets:
                    - label:
                        text_font: noto_sans_sc_32
                        text_color: 0x4A6363
                        text: "你："
                    - label:
                        id: va_request_label
                        text_font: noto_sans_sc_32
                        text_color: 0x1A1A1A
                        text: ""
                        width: 750
                        text_align: LEFT
                        long_mode: WRAP             # ← 不截断，自动换行

              # 助手答复气泡（橙色）
              - obj:
                  styles: va_response_bubble
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: START
                    flex_align_cross: START
                  widgets:
                    - label:
                        text_font: noto_sans_sc_32
                        text_color: 0x8B5A00
                        text: "助手："
                    - label:
                        id: va_response_label
                        text_font: noto_sans_sc_32
                        text_color: 0x1A1A1A
                        text: ""
                        width: 750
                        text_align: LEFT
                        long_mode: WRAP             # ← 不截断，自动换行

