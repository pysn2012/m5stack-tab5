# 全局变量定义
globals:
  # 当前页面编号（0=主页, 1=插座, 2=系统, 3=语音）
  - id: page_num
    type: int
    restore_value: no
    initial_value: '0'
  # 背光亮度值 (0-255)
  - id: backlight_brightness_val
    type: int
    restore_value: yes
    initial_value: '153'  # 默认 60% (153/255 ≈ 60%)
  # 室外传感器缓存值
  - id: outdoor_temp_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: outdoor_humi_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: outdoor_pres_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: outdoor_pm25_val
    type: float
    restore_value: no
    initial_value: '0'
  # 室内传感器缓存值
  - id: indoor_temp_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: indoor_humi_val
    type: float
    restore_value: no
    initial_value: '0'
  # 插座功率缓存值
  - id: weak_power_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: weak_total_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: desk_power_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: desk_total_val
    type: float
    restore_value: no
    initial_value: '0'
  # 音量缓存值
  - id: volume_val
    type: int
    restore_value: yes
    initial_value: '60'

# LVGL 图形库配置
lvgl:
  rotation: 270
  on_boot:
    - light.turn_on: backlight
    - rx8130.read_time:
    - script.execute: expand_nav_btn_click_area
    - script.execute: nav_rail_update
    - script.execute: sync_ha
    # 初始化滑块位置和标签（使用全局初始值 60%）
    - lvgl.slider.update:
        id: backlight_slider
        value: !lambda return id(backlight_brightness_val);
    - lvgl.slider.update:
        id: volume_slider
        value: !lambda return id(volume_val);
    - lvgl.label.update:
        id: backlight_bright_label
        text: !lambda |-
          static char buf[16];
          int percent = id(backlight_brightness_val) * 100 / 255;
          snprintf(buf, sizeof(buf), "%d%%", percent);
          return buf;
    - lvgl.label.update:
        id: volume_label
        text: !lambda |-
          static char buf[16];
          snprintf(buf, sizeof(buf), "%d%%", id(volume_val));
          return buf;
    # 设置媒体播放器初始音量
    - media_player.volume_set: !lambda return id(volume_val) / 100.0;

  byte_order: little_endian
  color_depth: 16

  # ═══════════════════════════════════════════════════════════════
  # LVGL 样式定义
  # ═══════════════════════════════════════════════════════════════

  style_definitions:
    # ── 侧边栏样式（现代浅灰蓝）──────────────────────────────────
    - id: sidebar
      bg_color: 0xF0F4F8
      bg_opa: COVER
      border_opa: TRANSP
      pad_top: 30
      pad_left: 0
      pad_right: 0
      radius: 0
      width: 192
      height: 100%

    # ── 导航按钮容器样式 ─────────────────────────────────────────
    - id: nav_btn_container
      bg_opa: TRANSP
      border_opa: TRANSP
      width: 180
      height: 72

    # ── 导航按钮未激活样式 ──────────────────────────────────────
    - id: nav_btn_inactivate
      bg_opa: TRANSP
      width: 168
      height: 56
      radius: 28
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_left: 12
      pad_right: 12

    # ── 导航按钮激活样式（淡蓝高亮）─────────────────────────────
    - id: nav_btn_activate
      bg_color: 0xE3F2FD
      bg_opa: COVER
      width: 168
      height: 56
      radius: 28
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_left: 12
      pad_right: 12

    # ── 语音助手按钮激活样式（活力橙）──────────────────────────
    - id: va_btn_activate
      bg_color: 0xFF6B35
      bg_opa: COVER
      width: 168
      height: 56
      radius: 28
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_left: 12
      pad_right: 12

    # ── 导航图标激活样式 ─────────────────────────────────────────
    - id: nav_icon_activate
      text_font: extra_icon
      text_color: 0x1A2138

    # ── 导航图标未激活样式 ───────────────────────────────────────
    - id: nav_icon_inactivate
      text_font: extra_icon
      text_color: 0x9CA3AF

    # ── 导航标签激活样式 ─────────────────────────────────────────
    - id: nav_label_activate
      text_color: 0x1A2138
      text_font: noto_sans_sc_32

    # ── 导航标签未激活样式 ───────────────────────────────────────
    - id: nav_label_inactivate
      text_color: 0x9CA3AF
      text_font: noto_sans_sc_32

    # ── 内容容器样式 ─────────────────────────────────────────────
    - id: content_container
      align: CENTER
      bg_opa: COVER
      border_opa: TRANSP
      height: 100%
      width: 1080
      x: 96
      pad_top: 30
      pad_left: 30

    # ── 信息卡片样式（白色圆角卡片）────────────────────────────
    - id: info_card
      bg_color: 0xFFFFFF
      bg_opa: COVER
      border_color: 0xE8ECF0
      border_width: 1
      border_opa: COVER
      radius: 16
      shadow_opa: TRANSP
      pad_all: 12

    # ── 卡片图标样式（室外蓝色）────────────────────────────────
    - id: card_icon_blue
      text_font: extra_icon
      text_color: 0x3B82F6

    # ── 卡片图标样式（室内绿色）────────────────────────────────
    - id: card_icon_green
      text_font: extra_icon
      text_color: 0x10B981

    # ── 卡片图标样式（预警红色）────────────────────────────────
    - id: card_icon_red
      text_font: extra_icon
      text_color: 0xEF4444

    # ── 卡片数值样式 ────────────────────────────────────────────
    - id: card_value
      text_font: montserrat_32
      text_color: 0x1A2138

    # ── 卡片标签样式 ────────────────────────────────────────────
    - id: card_label
      text_font: noto_sans_sc_32
      text_color: 0x6B7280

    # ── 系统信息卡片样式 ────────────────────────────────────────
    - id: system_info_card
      bg_color: 0xF8FAFC
      bg_opa: COVER
      border_color: 0xE8ECF0
      border_width: 1
      border_opa: COVER
      radius: 16
      width: 900
      height: 200
      pad_all: 20

    # ── 语音助手页面：状态卡片样式 ──────────────────────────────
    - id: va_status_card
      bg_color: 0xFFFFFF
      bg_opa: COVER
      border_color: 0xE8ECF0
      border_width: 1
      border_opa: COVER
      radius: 20
      width: 900
      height: 160
      pad_all: 20
      shadow_opa: TRANSP

    # ── 语音助手页面：对话气泡样式（用户问）─────────────────────
    - id: va_request_bubble
      bg_color: 0xE3F2FD
      bg_opa: COVER
      border_opa: TRANSP
      radius: 20
      width: 800
      height: SIZE_CONTENT
      min_height: 70
      pad_all: 20
      shadow_opa: TRANSP

    # ── 语音助手页面：对话气泡样式（助手答复）───────────────────
    - id: va_response_bubble
      bg_color: 0xF5F5F5
      bg_opa: COVER
      border_opa: TRANSP
      radius: 20
      width: 800
      height: SIZE_CONTENT
      min_height: 70
      pad_all: 20
      shadow_opa: TRANSP

  # 顶层导航栏和模态框
  top_layer:
    widgets:
      # 侧边导航栏
      - obj:
          align: TOP_LEFT
          styles: sidebar
          id: sidebars
          layout:
            type: flex
            flex_flow: COLUMN
            pad_row: 12
            flex_align_main: start
            flex_align_cross: center
            flex_align_track: center
          widgets:
            # 主页导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: dash_panel_btn
                      layout:
                        type: flex
                        flex_flow: row
                        flex_align_main: center
                        flex_align_cross: center
                        pad_column: 10
                      widgets:
                        - label:
                            id: dash_btn_icon
                            styles: nav_icon_inactivate
                            text: "\U000F02DC" # 主页图标
                        - label:
                            styles: nav_label_inactivate
                            id: dash_btn_label
                            text: "主页"
                      on_press:
                        - lambda: id(page_num) = 0;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: main_page


            # 插座导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: socket_panel_btn
                      layout:
                        type: flex
                        flex_flow: row
                        flex_align_main: center
                        flex_align_cross: center
                        pad_column: 10
                      widgets:
                        - label:
                            id: socket_btn_icon
                            styles: nav_icon_inactivate
                            text: "\U000F0905" # 插座图标
                        - label:
                            styles: nav_label_inactivate
                            id: socket_btn_label
                            text: "插座"
                      on_press:
                        - lambda: id(page_num) = 1;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: socket_page


            # 系统导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: light_panel_btn
                      layout:
                        type: flex
                        flex_flow: row
                        flex_align_main: center
                        flex_align_cross: center
                        pad_column: 10
                      widgets:
                        - label:
                            id: light_btn_icon
                            styles: nav_icon_inactivate
                            text: "\U000F08BB"  # 齿轮（轮廓）图标
                        - label:
                            styles: nav_label_inactivate
                            id: light_btn_label
                            text: "系统"
                      on_press:
                        - lambda: id(page_num) = 2;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: system_page


            # ── 语音助手导航按钮（侧边栏第 4 项）─────────────────
            # 点击：跳转到语音页面 + 主动启动一次语音对话（push-to-talk）
            # 唤醒："okay nabu" 也可自动启动
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: voice_panel_btn
                      layout:
                        type: flex
                        flex_flow: row
                        flex_align_main: center
                        flex_align_cross: center
                        pad_column: 10
                      widgets:
                        - label:
                            id: voice_btn_icon
                            styles: nav_icon_inactivate
                            text: "\U000F05CB" # 声音助手图标 (account-voice)
                        - label:
                            styles: nav_label_inactivate
                            id: voice_btn_label
                            text: "语音"
                      on_press:
                        # 跳转到语音页面
                        - lambda: id(page_num) = 3;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: voice_page
                        # 主动启动一次语音助手（push-to-talk）
                        - if:
                            condition:
                              not:
                                voice_assistant.is_running:
                            then:
                              - script.execute: stop_wake_word
                              - voice_assistant.start:


      # 状态栏（显示电池/WiFi/API 状态图标）
      - obj:
          align: TOP_RIGHT
          id: status_bar
          width: 1280
          height: 100
          bg_opa: TRANSP
          border_opa: TRANSP
          layout:
            type: FLEX
            flex_flow: ROW_REVERSE
            flex_align_main: END
            flex_align_cross: CENTER
            flex_align_track: CENTER
            pad_column: 20
          widgets:
            - label:
                id: pwr_bat_icon_label
                text_font: extra_icon
                text: "\U000F06A5"
            - label:
                id: wifi_icon_label
                hidden: true
                text_font: extra_icon
                text: "\U000F05A9"
            - label:
                id: api_icon_label
                hidden: true
                text_font: extra_icon
                text: "\U000F109B"

  # LVGL 页面定义
  pages:
    # ========== 主页页面（卡片化布局）==========
    - id: main_page
      widgets:
        - obj:
            styles: content_container
            widgets:
              # 时间显示（大字居中）
              - label:
                  id: time_label
                  text_font: montserrat_96
                  text: "14:07"
                  align: CENTER
                  y: -220
              # 日期星期（中字居中）
              - label:
                  id: date_label
                  text_font: montserrat_32
                  text_color: 0x6B7280
                  text: "2026-03-11 Thu"
                  align: CENTER
                  y: -130
              # 信息卡片区域（3列×2行网格）
              - obj:
                  width: 960
                  height: 280
                  align: CENTER
                  y: 20
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: GRID
                    grid_columns: [FR(1), FR(1), FR(1)]
                    grid_rows: [120, 120]
                    pad_column: 16
                    pad_row: 16
                  widgets:
                    # 卡片1：室外温度
                    - obj:
                        styles: info_card
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 0
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          flex_align_main: CENTER
                          flex_align_cross: CENTER
                          pad_row: 4
                        widgets:
                          - label:
                              styles: card_icon_blue
                              text: "\U000F050F"
                          - label:
                              id: outdoor_temp_value
                              styles: card_value
                              text: "--.-°C"
                          - label:
                              styles: card_label
                              text: "室外温度"
                    # 卡片2：室外湿度
                    - obj:
                        styles: info_card
                        grid_cell_column_pos: 1
                        grid_cell_row_pos: 0
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          flex_align_main: CENTER
                          flex_align_cross: CENTER
                          pad_row: 4
                        widgets:
                          - label:
                              styles: card_icon_blue
                              text: "\U000F058E"
                          - label:
                              id: outdoor_humi_value
                              styles: card_value
                              text: "--.-%"
                          - label:
                              styles: card_label
                              text: "室外湿度"
                    # 卡片3：气压
                    - obj:
                        styles: info_card
                        grid_cell_column_pos: 2
                        grid_cell_row_pos: 0
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          flex_align_main: CENTER
                          flex_align_cross: CENTER
                          pad_row: 4
                        widgets:
                          - label:
                              styles: card_icon_blue
                              text: "\U000F029A"
                          - label:
                              id: outdoor_pres_value
                              styles: card_value
                              text: "----hPa"
                          - label:
                              styles: card_label
                              text: "气压"
                    # 卡片4：室内温度
                    - obj:
                        styles: info_card
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 1
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          flex_align_main: CENTER
                          flex_align_cross: CENTER
                          pad_row: 4
                        widgets:
                          - label:
                              styles: card_icon_green
                              text: "\U000F0F54"
                          - label:
                              id: indoor_temp_value
                              styles: card_value
                              text: "--.-°C"
                          - label:
                              styles: card_label
                              text: "室内温度"
                    # 卡片5：室内湿度
                    - obj:
                        styles: info_card
                        grid_cell_column_pos: 1
                        grid_cell_row_pos: 1
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          flex_align_main: CENTER
                          flex_align_cross: CENTER
                          pad_row: 4
                        widgets:
                          - label:
                              styles: card_icon_green
                              text: "\U000F058E"
                          - label:
                              id: indoor_humi_value
                              styles: card_value
                              text: "--.-%"
                          - label:
                              styles: card_label
                              text: "室内湿度"
                    # 卡片6：PM2.5
                    - obj:
                        styles: info_card
                        grid_cell_column_pos: 2
                        grid_cell_row_pos: 1
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          flex_align_main: CENTER
                          flex_align_cross: CENTER
                          pad_row: 4
                        widgets:
                          - label:
                              styles: card_icon_blue
                              text: "\U000F0F30"
                          - label:
                              id: outdoor_pm25_value
                              styles: card_value
                              text: "--ppm"
                          - label:
                              styles: card_label
                              text: "颗粒物"
              # 天气预警条
              - obj:
                  width: 960
                  height: 50
                  align: CENTER
                  y: 180
                  bg_color: 0xFFF3E0
                  bg_opa: COVER
                  radius: 12
                  border_opa: TRANSP
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    flex_align_main: CENTER
                    flex_align_cross: CENTER
                    pad_column: 8
                  widgets:
                    - label:
                        text_font: extra_icon
                        text_color: 0xF59E0B
                        text: "\U000F018C"
                    - label:
                        id: weather_alert_label
                        text_font: noto_sans_sc_32
                        text_color: 0x92400E
                        text: "无预警"

    # ========== 插座页面（图标区分）==========
    - id: socket_page
      widgets:
        - obj:
            styles: content_container
            widgets:
              # 4个插座按钮（并排，不同图标）
              - obj:
                  width: 960
                  height: 240
                  align: CENTER
                  y: -160
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    pad_column: 24
                    flex_align_main: CENTER
                    flex_align_cross: CENTER
                  widgets:
                    # 插座1（灯具）
                    - button:
                        id: chuangmi_socket1_button
                        width: 160
                        height: 160
                        radius: 16
                        pad_all: 12
                        text_color: 0xFFFFFF
                        checkable: true
                        bg_color: 0xE8ECF0
                        checked:
                          bg_color: 0xFF6B35
                        widgets:
                          - label:
                              text_font: extra_icon_64
                              align: top_mid
                              text: "\U000F0335"
                          - label:
                              text_font: noto_sans_sc_32
                              text: "灯具"
                              align: bottom_mid
                        on_click:
                          - homeassistant.action:
                              action: switch.toggle
                              data:
                                entity_id: switch.chuangmi_cn_125697630_m3_on_p_2_1
                    # 插座2（电脑）
                    - button:
                        id: chuangmi_socket2_button
                        width: 160
                        height: 160
                        radius: 16
                        pad_all: 12
                        text_color: 0xFFFFFF
                        checkable: true
                        bg_color: 0xE8ECF0
                        checked:
                          bg_color: 0xFF6B35
                        widgets:
                          - label:
                              text_font: extra_icon_64
                              align: top_mid
                              text: "\U000F03B9"
                          - label:
                              text_font: noto_sans_sc_32
                              text: "电脑"
                              align: bottom_mid
                        on_click:
                          - homeassistant.action:
                              action: switch.toggle
                              data:
                                entity_id: switch.chuangmi_cn_125796823_m3_on_p_2_1
                    # 插座3（空调）
                    - button:
                        id: chuangmi_socket3_button
                        width: 160
                        height: 160
                        radius: 16
                        pad_all: 12
                        text_color: 0xFFFFFF
                        checkable: true
                        bg_color: 0xE8ECF0
                        checked:
                          bg_color: 0xFF6B35
                        widgets:
                          - label:
                              text_font: extra_icon_64
                              align: top_mid
                              text: "\U000F001B"
                          - label:
                              text_font: noto_sans_sc_32
                              text: "空调"
                              align: bottom_mid
                        on_click:
                          - homeassistant.action:
                              action: switch.toggle
                              data:
                                entity_id: switch.chuangmi_cn_125520813_m3_on_p_2_1
                    # 插座4（通用）
                    - button:
                        id: chuangmi_socket4_button
                        width: 160
                        height: 160
                        radius: 16
                        pad_all: 12
                        text_color: 0xFFFFFF
                        checkable: true
                        bg_color: 0xE8ECF0
                        checked:
                          bg_color: 0xFF6B35
                        widgets:
                          - label:
                              text_font: extra_icon_64
                              align: top_mid
                              text: "\U000F0425"
                          - label:
                              text_font: noto_sans_sc_32
                              text: "通用"
                              align: bottom_mid
                        on_click:
                          - homeassistant.action:
                              action: switch.toggle
                              data:
                                entity_id: switch.chuangmi_cn_393289534_212a01_on_p_2_1

              # 功率信息卡片
              - obj:
                  styles: system_info_card
                  align: CENTER
                  y: 60
                  layout:
                    type: GRID
                    grid_columns: [FR(1)]
                    grid_rows: [FR(1), FR(1)]
                    pad_row: 8
                  widgets:
                    # 弱电行
                    - obj:
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 0
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: CENTER
                        bg_opa: TRANSP
                        border_opa: TRANSP
                        layout:
                          type: FLEX
                          flex_flow: ROW
                          flex_align_main: START
                          flex_align_cross: CENTER
                          pad_column: 12
                        widgets:
                          - label:
                              text_font: extra_icon
                              text_color: 0xF59E0B
                              text: "\U000F09C8"
                          - label:
                              id: weak_power_label
                              text_font: noto_sans_sc_32
                              text_color: 0x1A2138
                              text: "弱电：--W / --Wh"
                    # 书桌行
                    - obj:
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 1
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: CENTER
                        bg_opa: TRANSP
                        border_opa: TRANSP
                        layout:
                          type: FLEX
                          flex_flow: ROW
                          flex_align_main: START
                          flex_align_cross: CENTER
                          pad_column: 12
                        widgets:
                          - label:
                              text_font: extra_icon
                              text_color: 0x3B82F6
                              text: "\U000F0E19"
                          - label:
                              id: desk_power_label
                              text_font: noto_sans_sc_32
                              text_color: 0x1A2138
                              text: "书桌：--W / --Wh"

    # ========== 系统页面（美化版）==========
    - id: system_page
      widgets:
        - obj:
            styles: content_container
            widgets:
              # 亮度控制卡片
              - obj:
                  width: 960
                  height: 120
                  align: CENTER
                  y: -200
                  bg_color: 0xFFFFFF
                  bg_opa: COVER
                  radius: 16
                  border_color: 0xE8ECF0
                  border_width: 1
                  border_opa: COVER
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    flex_align_main: START
                    flex_align_cross: CENTER
                    pad_column: 16
                  pad_left: 24
                  pad_right: 24
                  widgets:
                    - label:
                        text_font: extra_icon
                        text_color: 0xF59E0B
                        text: "\U000F00DF"
                    - label:
                        text_font: noto_sans_sc_32
                        text_color: 0x1A2138
                        text: "亮度"
                        width: 60
                    - slider:
                        width: 500
                        height: 36
                        radius: 18
                        min_value: 0
                        max_value: 255
                        value: 153
                        id: backlight_slider
                        bg_color: 0xE8ECF0
                        bg_opa: COVER
                        indicator:
                          radius: 18
                          bg_color: 0xF59E0B
                        knob:
                          bg_opa: TRANSP
                        on_release:
                          - light.turn_on:
                              id: backlight
                              brightness: !lambda return x / 255.0;
                          - lambda: id(backlight_brightness_val) = int(x);
                          - lvgl.label.update:
                              id: backlight_bright_label
                              text: !lambda |-
                                static char buf[16];
                                int percent = int(x) * 100 / 255;
                                snprintf(buf, sizeof(buf), "%d%%", percent);
                                return buf;
                          - homeassistant.action:
                              action: light.turn_on
                              data:
                                entity_id: light.tab5_display_backlight
                                brightness: !lambda return int(x);
                    - label:
                        id: backlight_bright_label
                        text_font: montserrat_32
                        text_color: 0x1A2138
                        text: "60%"
                        width: 60
              # 音量控制卡片
              - obj:
                  width: 960
                  height: 120
                  align: CENTER
                  y: -60
                  bg_color: 0xFFFFFF
                  bg_opa: COVER
                  radius: 16
                  border_color: 0xE8ECF0
                  border_width: 1
                  border_opa: COVER
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    flex_align_main: START
                    flex_align_cross: CENTER
                    pad_column: 16
                  pad_left: 24
                  pad_right: 24
                  widgets:
                    - label:
                        text_font: extra_icon
                        text_color: 0x3B82F6
                        text: "\U000F0E19"
                    - label:
                        text_font: noto_sans_sc_32
                        text_color: 0x1A2138
                        text: "音量"
                        width: 60
                    - slider:
                        width: 500
                        height: 36
                        radius: 18
                        min_value: 0
                        max_value: 100
                        value: 60
                        id: volume_slider
                        bg_color: 0xE8ECF0
                        bg_opa: COVER
                        indicator:
                          radius: 18
                          bg_color: 0x3B82F6
                        knob:
                          bg_opa: TRANSP
                        on_release:
                          - number.set:
                              id: volume_number
                              value: !lambda return int(x);
                    - label:
                        id: volume_label
                        text_font: montserrat_32
                        text_color: 0x1A2138
                        text: "60%"
                        width: 60
              # 系统信息卡片
              - obj:
                  styles: system_info_card
                  align: CENTER
                  y: 100
                  layout:
                    type: GRID
                    grid_columns: [FR(1)]
                    grid_rows: [FR(1), FR(1), FR(1)]
                    pad_row: 8
                  widgets:
                    # IP地址行
                    - obj:
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 0
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: CENTER
                        bg_opa: TRANSP
                        border_opa: TRANSP
                        layout:
                          type: FLEX
                          flex_flow: ROW
                          flex_align_main: START
                          flex_align_cross: CENTER
                          pad_column: 12
                        widgets:
                          - label:
                              text_font: extra_icon
                              text_color: 0x10B981
                              text: "\U000F05A9"
                          - label:
                              id: sys_ip_label
                              text_font: noto_sans_sc_32
                              text_color: 0x1A2138
                              text: "IP：0.0.0.0"
                    # 信号行
                    - obj:
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 1
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: CENTER
                        bg_opa: TRANSP
                        border_opa: TRANSP
                        layout:
                          type: FLEX
                          flex_flow: ROW
                          flex_align_main: START
                          flex_align_cross: CENTER
                          pad_column: 12
                        widgets:
                          - label:
                              text_font: extra_icon
                              text_color: 0x3B82F6
                              text: "\U000F05A9"
                          - label:
                              id: sys_rssi_label
                              text_font: noto_sans_sc_32
                              text_color: 0x1A2138
                              text: "信号：-- dBm"
                    # 运行时间行
                    - obj:
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 2
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: CENTER
                        bg_opa: TRANSP
                        border_opa: TRANSP
                        layout:
                          type: FLEX
                          flex_flow: ROW
                          flex_align_main: START
                          flex_align_cross: CENTER
                          pad_column: 12
                        widgets:
                          - label:
                              text_font: extra_icon
                              text_color: 0xF59E0B
                              text: "\U000F0EFF"
                          - label:
                              id: sys_uptime_label
                              text_font: noto_sans_sc_32
                              text_color: 0x1A2138
                              text: "运行：--:--:--"

    # ========== 语音助手页面（优化版）==========
    - id: voice_page
      widgets:
        - obj:
            styles: content_container
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: CENTER
              flex_align_cross: CENTER
              pad_row: 20
            widgets:
              # 状态指示卡片
              - obj:
                  id: va_status_card_bg
                  styles: va_status_card
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    flex_align_main: CENTER
                    flex_align_cross: CENTER
                    pad_column: 20
                  widgets:
                    # 状态图标（大号）
                    - obj:
                        id: va_icon_circle
                        width: 80
                        height: 80
                        radius: 40
                        bg_color: 0x9CA3AF
                        bg_opa: COVER
                        border_opa: TRANSP
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          flex_align_main: CENTER
                          flex_align_cross: CENTER
                        widgets:
                          - label:
                              id: va_status_icon
                              text_font: extra_icon
                              text_color: 0xFFFFFF
                              text: "\U000F05CB"
                    # 状态文字
                    - obj:
                        bg_opa: TRANSP
                        border_opa: TRANSP
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          flex_align_main: CENTER
                          flex_align_cross: START
                          pad_row: 4
                        widgets:
                          - label:
                              id: va_status_label
                              text_font: noto_sans_sc_32
                              text_color: 0x1A2138
                              text: "待机状态"
                          - label:
                              id: va_status_hint
                              text_font: noto_sans_sc_32
                              text_color: 0x9CA3AF
                              text: "说 \"Okay Nabu\" 唤醒"

              # 用户问气泡
              - obj:
                  styles: va_request_bubble
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: START
                    flex_align_cross: START
                    pad_row: 6
                  widgets:
                    - label:
                        text_font: noto_sans_sc_32
                        text_color: 0x3B82F6
                        text: "你"
                    - label:
                        id: va_request_label
                        text_font: noto_sans_sc_32
                        text_color: 0x1A2138
                        text: ""
                        width: 750
                        text_align: LEFT
                        long_mode: WRAP

              # 助手答复气泡
              - obj:
                  styles: va_response_bubble
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: START
                    flex_align_cross: START
                    pad_row: 6
                  widgets:
                    - label:
                        text_font: noto_sans_sc_32
                        text_color: 0x10B981
                        text: "助手"
                    - label:
                        id: va_response_label
                        text_font: noto_sans_sc_32
                        text_color: 0x1A2138
                        text: ""
                        width: 750
                        text_align: LEFT
                        long_mode: WRAP
