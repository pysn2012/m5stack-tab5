                                    text: "亮度"
                                    text_color: 0x333333
                                - slider:
                                    id: backlight_slider
                                    width: 230
                                    height: 40
                                    radius: 20
                                    min_value: 0
                                    max_value: 255
                                    value: 153
                                    bg_color: 0xECECEC
                                    bg_opa: COVER
                                    indicator:
                                      radius: 20
                                      bg_color: 0xFFB90B
                                    knob:
                                      bg_opa: TRANSP
                                    on_release:
                                      - light.turn_on:
                                          id: backlight
                                          brightness: !lambda return x / 255.0;
                                      - lambda: id(backlight_brightness_val) = int(x);
                                      - lvgl.label.update:
                                          id: backlight_bright_label
                                          text: !lambda |-
                                            static char buf[16];
                                            int percent = int(x) * 100 / 255;
                                            snprintf(buf, sizeof(buf), "%d %%", percent);
                                            return buf;
                                      - homeassistant.action:
                                          action: light.turn_on
                                          data:
                                            entity_id: light.tab5_display_backlight
                                            brightness: !lambda return int(x);
                                - label:
                                    id: backlight_bright_label
                                    text_font: montserrat_32
                                    text_color: 0x333333
                                    text: "60 %"
                          # 息屏时间行
                          - obj:
                              width: 470
                              height: 80
                              bg_opa: TRANSP
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: SPACE_BETWEEN
                                flex_align_cross: CENTER
                              widgets:
                                - label:
                                    text_font: noto_sans_sc_32
                                    text: "息屏时间"
                                    text_color: 0x333333
                                - dropdown:
                                    id: screen_off_timeout_dropdown
