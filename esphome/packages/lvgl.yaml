# 全局变量定义
globals:
  # 当前页面编号（0=主页, 1=控制, 2=系统, 3=语音）
  - id: page_num
    type: int
    restore_value: no
    initial_value: '0'
  # 背光亮度值 (0-255)
  - id: backlight_brightness_val
    type: int
    restore_value: yes
    initial_value: '153'  # 默认 60% (153/255 ≈ 60%)
  # 室外传感器缓存值
  - id: outdoor_temp_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: outdoor_humi_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: outdoor_pres_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: outdoor_pm25_val
    type: float
    restore_value: no
    initial_value: '0'
  # 室内传感器缓存值
  - id: indoor_temp_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: indoor_humi_val
    type: float
    restore_value: no
    initial_value: '0'
  # 插座功率缓存值
  - id: weak_power_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: weak_total_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: desk_power_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: desk_total_val
    type: float
    restore_value: no
    initial_value: '0'
  # 音量缓存值
  - id: volume_val
    type: int
    restore_value: yes
    initial_value: '60'

# LVGL 图形库配置
lvgl:
  rotation: 270                   # 旋转270度
  byte_order: little_endian       # 字节序：小端模式（与大多数 MCU 和显示屏控制器兼容）
  color_depth: 16                 # 色深：16位 RGB565
  # 启动初始化
  on_boot:
    - light.turn_on: backlight    # 点亮屏幕背光
    - rx8130.read_time:           # 从RX8130读取时间
    - script.execute: expand_nav_btn_click_area  # 扩展导航按钮的触控点击区域
    - script.execute: nav_rail_update            # 更新侧边导航栏的显示状态
    - script.execute: sync_ha                    # 同步 Home Assistant 实体状态到本地
    # 初始化滑块位置和标签（使用全局初始值 60%）
    - lvgl.slider.update:
        id: backlight_slider
        value: !lambda return id(backlight_brightness_val);
    # 初始化音量滑块位置（使用全局初始值）
    - lvgl.slider.update:
        id: volume_slider
        value: !lambda return id(volume_val);
    # 更新背光亮度百分比标签
    - lvgl.label.update:
        id: backlight_bright_label
        text: !lambda |-
          static char buf[16];
          int percent = id(backlight_brightness_val) * 100 / 255;
          snprintf(buf, sizeof(buf), "%d %%", percent);
          return buf;
    # 更新音量百分比标签
    - lvgl.label.update:
        id: volume_label
        text: !lambda |-
          static char buf[16];
          snprintf(buf, sizeof(buf), "%d %%", id(volume_val));
          return buf;
    # 设置媒体播放器初始音量
    - media_player.volume_set: !lambda return id(volume_val) / 100.0;
 
  # 自动息屏
  on_idle:
    # 超时时间动态读取自 system.yaml 中定义的 select 组件
    timeout: !lambda |-
      int timeout_sec = 30; // 默认 30 秒
      if (id(screen_off_timeout_sec).has_state()) {
        std::string opt = id(screen_off_timeout_sec).current_option();
        if (opt == "Never") return UINT32_MAX; // 永不超时
        timeout_sec = atoi(opt.c_str());
      }
      return timeout_sec * 1000;

    then:
      - if:
          condition:
            # 判断是否处于语音助手活跃状态
            - lambda: |-
                int phase = id(voice_assistant_phase);
                // 活跃状态包括：聆听(2)、思考(3)、回复(4)、计时结束响铃(20)
                return (phase == ${voice_assist_listening_phase_id} ||
                        phase == ${voice_assist_thinking_phase_id} ||
                        phase == ${voice_assist_replying_phase_id} ||
                        phase == ${voice_assist_timer_finished_phase_id});
          then:
            - logger.log: "语音助手活跃中，阻止息屏"
          else:
            # 如果语音助手未活跃，执行息屏脚本
            - script.execute: screen_off

  # 顶层导航栏和模态框
  top_layer:
    widgets:
      # 侧边导航栏
      - obj:
          align: TOP_LEFT
          styles: sidebar
          id: sidebars
          layout:
            type: flex
            flex_flow: COLUMN
            pad_row: 5
            flex_align_main: start
            flex_align_cross: center
            flex_align_track: center
          widgets:
            # 主页导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: dash_panel_btn
                      widgets:
                        - label:
                            id: dash_btn_icon
                            styles: nav_icon_inactivate
                            text: "\U000F02DC" # 主页图标
                            align: center
                      on_press:
                        - lambda: id(page_num) = 0;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: main_page


            # 控制导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: socket_panel_btn
                      widgets:
                        - label:
                            id: socket_btn_icon
                            styles: nav_icon_inactivate
                            text: "\U000F0905" # 插座图标
                            align: center
                      on_press:
                        - lambda: id(page_num) = 1;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: socket_page


            # 系统导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: light_panel_btn
                      widgets:
                        - label:
                            id: light_btn_icon
                            styles: nav_icon_inactivate
                            text: "\U000F08BB"  # 齿轮（轮廓）图标
                            align: center
                      on_press:
                        - lambda: id(page_num) = 2;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: system_page


            # 语音助手导航按钮（侧边栏第 4 项）
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: voice_panel_btn
                      widgets:
                        - label:
                            id: voice_btn_icon
                            styles: nav_icon_inactivate
                            text: "\U000F05CB" # 声音助手图标 (account-voice)
                            align: center
                      on_press:
                        # 跳转到语音页面
                        - lambda: id(page_num) = 3;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: voice_page
                        # 主动启动一次语音助手（push-to-talk）
                        - if:
                            condition:
                              not:
                                voice_assistant.is_running:
                            then:
                              - script.execute: stop_wake_word
                              - voice_assistant.start:


      # 状态栏（显示电池/WiFi/API 状态图标）
      - obj:
          align: TOP_RIGHT
          id: status_bar
          width: 1088
          height: 100
          bg_color: 0xFFFFFF
          bg_opa: COVER
          text_color: 0x111111
          border_width: 0
          border_opa: TRANSP
          pad_left: 28
          pad_right: 28
          layout:
            type: FLEX
            flex_flow: ROW
            flex_align_main: START
            flex_align_cross: CENTER
            flex_align_track: CENTER
            pad_column: 20
          widgets:
            - label:
                id: page_title_label
                text_font: noto_sans_sc_32
                text_color: 0x111111
                text: "主页"
                flex_grow: 1
            - label:
                id: api_icon_label
                hidden: true
                text_font: extra_icon
                text_color: 0x111111
                text: "\U000F109B"
            - label:
                id: wifi_icon_label
                hidden: true
                text_font: extra_icon
                text_color: 0x111111
                text: "\U000F05A9"
            - label:
                id: pwr_bat_icon_label
                text_font: extra_icon
                text_color: 0x111111
                text: "\U000F06A5"

      # Wi-Fi 配置弹窗（默认隐藏）
      - obj:
          id: wifi_config_panel
          hidden: true
          align: CENTER
          width: 1100
          height: 700
          bg_color: 0xFFFFFF
          bg_opa: COVER
          border_width: 2
          border_color: 0xCCCCCC
          radius: 20
          layout:
            type: flex
            flex_flow: COLUMN
            flex_align_main: CENTER
            flex_align_cross: CENTER
            pad_row: 10
          widgets:
            # 标题
            - label:
                text_font: noto_sans_sc_32
                text: "WiFi设置"
                text_color: 0x333333
            
            # 输入框容器（SSID + 密码）
            - obj:
                width: 1000
                height: SIZE_CONTENT
                bg_opa: TRANSP
                layout:
                  type: GRID
                  grid_columns: [120, FR(1)]
                  grid_rows: [60, 60]
                  pad_column: 10
                  pad_row: 5
                widgets:
                  # SSID 标签
                  - label:
                      text_font: montserrat_26
                      text: "SSID:"
                      grid_cell_column_pos: 0
                      grid_cell_row_pos: 0
                      grid_cell_x_align: CENTER
                      grid_cell_y_align: CENTER
                  # SSID 输入框
                  - textarea:
                      id: ta_wifi_ssid
                      grid_cell_column_pos: 1
                      grid_cell_row_pos: 0
                      width: 720
                      height: 50
                      pad_all: 2
                      text_font: montserrat_26
                      placeholder_text: "WiFi SSID"
                      border_width: 1
                      on_click:  # lambda 切换键盘绑定
                        - lambda: lv_keyboard_set_textarea(id(kb_wifi)->obj, id(ta_wifi_ssid));
                        
                  # 密码标签
                  - label:
                      text_font: montserrat_26
                      text: "PWD: "
                      grid_cell_column_pos: 0
                      grid_cell_row_pos: 1
                      grid_cell_x_align: CENTER
                      grid_cell_y_align: CENTER
                  # 密码输入框
                  - textarea:
                      id: ta_wifi_pass
                      grid_cell_column_pos: 1
                      grid_cell_row_pos: 1
                      width: 720
                      height: 50
                      pad_all: 2
                      text_font: montserrat_26
                      placeholder_text: "WiFi PASSWORD"
                      password_mode: true
                      border_width: 1
                      on_click:  # lambda 切换键盘绑定
                        - lambda: lv_keyboard_set_textarea(id(kb_wifi)->obj, id(ta_wifi_pass));

            # 虚拟键盘
            - keyboard:
                id: kb_wifi
                width: 1000
                height: 280
                textarea: ta_wifi_ssid    # 默认关联到 SSID 框
                mode: TEXT_LOWER
                bg_opa: 0
                radius: 20
                pad_bottom: 10
                translate_y: 10
                items:
                    bg_color: 0x7893A6    # dark
                    text_color: 0xE9EFFB
                    text_font: montserrat_26
                    checked:
                      bg_color: 0x2478D9
                      text_color: 0xE9EFFB

            # 底部按钮（连接/取消）
            - obj:
                width: 1000
                height: 100
                bg_opa: TRANSP
                pad_all: 5 
                layout:
                  type: FLEX
                  flex_flow: ROW
                  pad_column: 40
                  flex_align_main: CENTER
                widgets:
                  - button:
                      width: 180
                      height: 60
                      bg_color: 0x3498DB
                      radius: 10
                      on_press:
                        - script.execute: connect_wifi_action
                      widgets:
                        - label:
                            text_font: noto_sans_sc_32
                            text: "连接"
                            text_color: 0xFFFFFF
                            align: CENTER
                  - button:
                      width: 180
                      height: 60
                      bg_color: 0xCCCCCC
                      radius: 10
                      on_press:
                        - lvgl.widget.hide: wifi_config_panel
                        - lvgl.textarea.update:
                            id: ta_wifi_ssid
                            text: ""
                        - lvgl.textarea.update:
                            id: ta_wifi_pass
                            text: ""
                      widgets:
                        - label:
                            text_font: noto_sans_sc_32
                            text: "取消"
                            text_color: 0xFFFFFF
                            align: CENTER

  # LVGL 页面定义
  pages:
    # ========== 主页页面 ==========
    - id: main_page
      widgets:
        - obj:
            styles: content_container
            align: BOTTOM_RIGHT
            width: 1088
            height: 620
            scroll_dir: NONE
            scrollbar_mode: "OFF"
            scroll_momentum: false
            scroll_elastic: false
            widgets:
              # 时间显示（大字居中）
              - label:
                  id: time_label
                  text_font: montserrat_96
                  text: "14:07"
                  align: CENTER
                  y: -210
              # 日期星期（中字居中）
              - label:
                  id: date_label
                  text_font: montserrat_32
                  text: "2026-03-11 Thu"
                  align: CENTER
                  y: -120

              # ═══ 信息区域：FLEX 两列 ═══
              - obj:
                  width: 980
                  height: 400
                  align: CENTER
                  y: 90
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    flex_align_main: START
                    flex_align_cross: STRETCH
                    pad_column: 16
                  widgets:
                    # ─── 左列：天气模块（圆角卡片） ───
                    - obj:
                        styles: small_card
                        height: 100%
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 0
                        widgets:
                          # 标题
                          - label:
                              styles: module_title
                              text: "天气"
                          # 分隔线
                          - obj:
                              styles: module_divider
                          # 内容区：4个传感器直接排列，无额外容器包裹
                          - obj:
                              styles: setting_row
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: START
                                flex_align_cross: CENTER
                                pad_column: 12
                              widgets:
                                # 温度（图标+文本，直接放，无obj包裹）
                                - label:
                                    text_font: extra_icon
                                    text_color: 0xFF8C00
                                    text: "\U000F050F"
                                - label:
                                    id: outdoor_temp_label
                                    text_font: noto_sans_sc_32
                                    text_color: 0x333333
                                    text: "-- ℃"
                                # 湿度（图标+文本，直接放）
                                - label:
                                    text_font: extra_icon
                                    text_color: 0x3498DB
                                    text: "\U000F058E"
                                - label:
                                    id: outdoor_humi_label
                                    text_font: noto_sans_sc_32
                                    text_color: 0x333333
                                    text: "-- %"
                                # 第2行：气压 + 颗粒物
                          - obj:
                              styles: setting_row
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: START
                                flex_align_cross: CENTER
                                pad_column: 12
                              widgets:
                                # 气压
                                - label:
                                    text_font: extra_icon
                                    text_color: 0x27AE60
                                    text: "\U000F029A"
                                - label:
                                    id: outdoor_pres_label
                                    text_font: noto_sans_sc_32
                                    text_color: 0x333333
                                    text: "-- hPa"
                                # 颗粒物
                                - label:
                                    text_font: extra_icon
                                    text_color: 0xE74C3C
                                    text: "\U000F0F30"
                                - label:
                                    id: outdoor_pm25_label
                                    text_font: noto_sans_sc_32
                                    text_color: 0x333333
                                    text: "-- ppm"

                    # ─── 右列：室内 + 预警 ───
                    - obj:
                        styles: small_card
                        height: 100%
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 0
                        widgets:
                          # 标题
                          - label:
                              styles: module_title
                              text: "室内"
                          # 分隔线
                          - obj:
                              styles: module_divider
                          # 内容区：2个传感器直接排列
                          - obj:
                              styles: setting_row
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: START
                                flex_align_cross: CENTER
                                pad_column: 12
                              widgets:
                                - label:
                                    text_font: extra_icon
                                    text_color: 0xFF8C00
                                    text: "\U000F0F54"
                                - label:
                                    id: indoor_temp_label
                                    text_font: noto_sans_sc_32
                                    text_color: 0x333333
                                    text: "-- ℃"
                                - label:
                                    text_font: extra_icon
                                    text_color: 0x3498DB
                                    text: "\U000F058E"
                                - label:
                                    id: indoor_humi_label
                                    text_font: noto_sans_sc_32
                                    text_color: 0x333333
                                    text: "-- %"

                          # ─── 预警模块（包含在室内） ───
                          - label:
                              styles: module_title
                              text: "预警"
                          # 分隔线
                          - obj:
                              styles: module_divider
                          # 预警文本直接显示，无包裹
                          - label:
                              id: weather_alert_label
                              text_font: noto_sans_sc_32
                              text_color: 0xE74C3C
                              text: "无预警"
                              width: 100%
                              height: 160
                              long_mode: WRAP
                              text_align: LEFT

    # ========== 控制页面 ==========
    - id: socket_page
      widgets:
        - obj:
            styles: content_container
            align: BOTTOM_RIGHT
            width: 1088
            height: 620
            scroll_dir: VER          # 只允许垂直滚动，减少计算
            scrollbar_mode: ACTIVE   # 只有滚动时显示滚动条
            scroll_momentum: false    # 惯性滚动
            scroll_elastic: false    # 关闭弹性回弹，减少卡顿
            widgets:
              - obj:
                  align: TOP_MID
                  x: 0
                  y: 5
                  width: 980
                  height: SIZE_CONTENT
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: GRID
                    grid_columns: [FR(1), FR(1)]
                    grid_rows: [200, 300]
                    pad_column: 10
                    pad_row: 10
                  widgets:
                    # ─── 模块1：插座 ───
                    - obj:
                        styles: module_card
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 0
                        grid_cell_column_span: 2
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH
                        height: SIZE_CONTENT
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 0
                        widgets:
                          - label:
                              styles: module_title
                              text: "插座"
                          - obj:
                              styles: module_divider
                          - obj:
                              styles: setting_row
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: START
                                flex_align_cross: CENTER
                                pad_column: 24
                              widgets:
                                - button:
                                    id: chuangmi_socket1_button
                                    width: 160
                                    height: 120
                                    radius: 20
                                    pad_all: 12
                                    text_color: 0xFFFFFF
                                    checkable: true
                                    bg_color: 0xE9EFEE
                                    checked:
                                      bg_color: 0xFF8C00
                                    widgets:
                                      - label:
                                          text_font: extra_icon
                                          align: top_mid
                                          text: "\U000F0425"
                                      - label:
                                          text_font: noto_sans_sc_32
                                          text: "插座1"
                                          align: bottom_mid
                                    on_click:
                                      - homeassistant.action:
                                          action: switch.toggle
                                          data:
                                            entity_id: switch.chuangmi_cn_125697630_m3_on_p_2_1
                                - button:
                                    id: chuangmi_socket2_button
                                    width: 160
                                    height: 120
                                    radius: 20
                                    pad_all: 12
                                    text_color: 0xFFFFFF
                                    checkable: true
                                    bg_color: 0xE9EFEE
                                    checked:
                                      bg_color: 0xFF8C00
                                    widgets:
                                      - label:
                                          text_font: extra_icon
                                          align: top_mid
                                          text: "\U000F0425"
                                      - label:
                                          text_font: noto_sans_sc_32
                                          text: "插座2"
                                          align: bottom_mid
                                    on_click:
                                      - homeassistant.action:
                                          action: switch.toggle
                                          data:
                                            entity_id: switch.chuangmi_cn_125796823_m3_on_p_2_1
                                - button:
                                    id: chuangmi_socket3_button
                                    width: 160
                                    height: 120
                                    radius: 20
                                    pad_all: 12
                                    text_color: 0xFFFFFF
                                    checkable: true
                                    bg_color: 0xE9EFEE
                                    checked:
                                      bg_color: 0xFF8C00
                                    widgets:
                                      - label:
                                          text_font: extra_icon
                                          align: top_mid
                                          text: "\U000F0425"
                                      - label:
                                          text_font: noto_sans_sc_32
                                          text: "插座3"
                                          align: bottom_mid
                                    on_click:
                                      - homeassistant.action:
                                          action: switch.toggle
                                          data:
                                            entity_id: switch.chuangmi_cn_125520813_m3_on_p_2_1
                                - button:
                                    id: chuangmi_socket4_button
                                    width: 160
                                    height: 120
                                    radius: 20
                                    pad_all: 12
                                    text_color: 0xFFFFFF
                                    checkable: true
                                    bg_color: 0xE9EFEE
                                    checked:
                                      bg_color: 0xFF8C00
                                    widgets:
                                      - label:
                                          text_font: extra_icon
                                          align: top_mid
                                          text: "\U000F0425"
                                      - label:
                                          text_font: noto_sans_sc_32
                                          text: "插座4"
                                          align: bottom_mid
                                    on_click:
                                      - homeassistant.action:
                                          action: switch.toggle
                                          data:
                                            entity_id: switch.chuangmi_cn_393289534_212a01_on_p_2_1

                    # ─── 弱电箱：第1列，第2行 ───
                    - obj:
                        styles: small_card
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 1
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
