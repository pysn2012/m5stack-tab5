                              text_color: 0x1A4A4A
                          # 亮度行
                          - obj:
                              width: 470
                              height: 80
                              bg_opa: TRANSP
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: START
                                flex_align_cross: CENTER
                                pad_column: 10
                              widgets:
