                                    height: 60
                                    text_font: noto_sans_sc_32
                                    bg_color: 0xF5F5F5
                                    bg_opa: COVER
                                    border_width: 0
                                    radius: 10
                                    items:
                                      - "15"
                                      - "30"
                                      - "60"
                                      - "90"
                                      - "120"
                                      - "Never"
                                    on_value:
                                      - select.set:
                                          id: screen_off_timeout_sec
                                          option: !lambda return x.c_str();
                    # 模块：网络
                    - obj:
                        width: 520
                        height: 280
                        bg_color: 0xFFFFFF
                        bg_opa: COVER
                        radius: 20
                        border_opa: TRANSP
                        pad_all: 24
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 20
                        widgets:
                          - label:
                              text_font: noto_sans_sc_32
                              text: "网络"
                              text_color: 0x1A4A4A
                          - obj:
                              width: 470
                              height: 60
                              bg_opa: TRANSP
                              widgets:
                                - button:
                                    id: btn_wifi_config
                                    width: 160
                                    height: 50
                                    radius: 10
                                    text_color: 0xFFFFFF
                                    bg_color: 0x3498DB
                                    checkable: false
                                    on_press:
                                      - lvgl.widget.show: wifi_config_panel
                                    widgets:
                                      - label:
                                          text_font: noto_sans_sc_32
                                          text: "WiFi配网"
                                          align: CENTER
                                          text_color: 0xFFFFFF
                          - label:
                              id: sys_ip_label
                              text_font: noto_sans_sc_32
                              text: "IP地址：0.0.0.0"
                              text_color: 0x333333
                          - label:
                              id: sys_rssi_label
                              text_font: noto_sans_sc_32
                              text: "信号：-- dBm"
                              text_color: 0x333333

              # 右列容器
              - obj:
                  width: 520
                  height: 580
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: SPACE_EVENLY
                  widgets:
                    # 模块：声音
                    - obj:
                        width: 520
                        height: 280
                        bg_color: 0xFFFFFF
                        bg_opa: COVER
                        radius: 20
                        border_opa: TRANSP
                        pad_all: 24
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 20
                        widgets:
                          - label:
                              text_font: noto_sans_sc_32
                              text: "声音"
                              text_color: 0x1A4A4A
                          # 音量行
                          - obj:
                              width: 470
                              height: 80
                              bg_opa: TRANSP
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: START
                                flex_align_cross: CENTER
                                pad_column: 10
                              widgets:
                                - label:
                                    text_font: noto_sans_sc_32
                                    text: "音量"
                                    text_color: 0x333333
                                - slider:
                                    id: volume_slider
                                    width: 230
                                    height: 40
                                    radius: 20
                                    min_value: 0
                                    max_value: 100
                                    value: 60
                                    bg_color: 0xECECEC
                                    bg_opa: COVER
                                    indicator:
                                      radius: 20
                                      bg_color: 0x4A6363
                                    knob:
                                      bg_opa: TRANSP
                                    on_release:
                                      - number.set:
                                          id: volume_number
                                          value: !lambda return int(x);
                                - label:
                                    id: volume_label
                                    text_font: montserrat_32
                                    text_color: 0x333333
                                    text: "60 %"
                          # DAC输出行
                          - obj:
                              width: 470
                              height: 80
                              bg_opa: TRANSP
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: SPACE_BETWEEN
                                flex_align_cross: CENTER
                              widgets:
                                - label:
                                    text_font: noto_sans_sc_32
                                    text: "DAC输出"
                                    text_color: 0x333333
                                - dropdown:
                                    id: tab5_dac_output_dropdown
                                    width: 160
                                    height: 60
                                    text_font: noto_sans_sc_32
                                    bg_color: 0xF5F5F5
                                    bg_opa: COVER
                                    border_width: 0
                                    radius: 10
                                    items:
                                      - "LINE1"
                                      - "LINE2"
                                      - "BOTH"
                                    on_value:
                                      - select.set:
                                          id: tab5_dac_output_template
                                          option: !lambda return x.c_str();
                    # 模块：关于
                    - obj:
                        width: 520
                        height: 280
                        bg_color: 0xFFFFFF
                        bg_opa: COVER
                        radius: 20
                        border_opa: TRANSP
                        pad_all: 24
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 20
                        widgets:
                          - label:
                              text_font: noto_sans_sc_32
                              text: "关于"
                              text_color: 0x1A4A4A
                          - obj:
                              width: 470
                              height: 60
                              bg_opa: TRANSP
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                pad_column: 20
                              widgets:
                                - button:
                                    id: btn_restart
                                    width: 120
                                    height: 50
                                    radius: 10
                                    text_color: 0xFFFFFF
                                    bg_color: 0x27AE60
                                    checkable: false
                                    on_press:
                                      - button.press: restart_button
                                    widgets:
                                      - label:
                                          text_font: noto_sans_sc_32
                                          text: "重启"
                                          align: CENTER
                                          text_color: 0xFFFFFF
                                - button:
                                    id: btn_shutdown
                                    width: 120
                                    height: 50
                                    radius: 10
                                    text_color: 0xFFFFFF
                                    bg_color: 0xE74C3C
                                    checkable: false
                                    on_press:
                                      - button.press: shutdown_button
                                    widgets:
                                      - label:
                                          text_font: noto_sans_sc_32
                                          text: "关机"
                                          align: CENTER
                                          text_color: 0xFFFFFF
                          - label:
                              id: sys_uptime_label
                              text_font: noto_sans_sc_32
                              text: "运行：--:--:--"
                              text_color: 0x333333



    # ========== 语音助手页面 ==========
    # 由 voice_ui_update 脚本驱动：
    #   - va_status_icon   : 顶部大图标（聆听/思考/回复/错误…）
    #   - va_status_label  : 顶部状态文字
    #   - va_request_label : 用户说的话（STT 结果）
    #   - va_response_label: 助手答复（TTS 文本）
    - id: voice_page
      widgets:
        - obj:
            styles: content_container
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: CENTER
              flex_align_cross: CENTER
              pad_row: 24
            widgets:
              # 顶部状态卡片（图标 + 状态文字）
              - obj:
                  styles: va_status_card
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: CENTER
                    flex_align_cross: CENTER
                    pad_row: 12
                  widgets:
                    - label:
                        id: va_status_icon
                        text_font: extra_icon
                        text_color: 0xFF8C00
                        text: "\U000F05CB"
                    - label:
                        id: va_status_label
                        text_font: noto_sans_sc_32    # ← 统一使用 noto_sans_sc_32
                        text_color: 0x333333
                        text: "待机状态"
                        text_align: CENTER
                        long_mode: WRAP
                        width: 800

              # 用户问气泡（蓝色）
              - obj:
                  styles: va_request_bubble
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: START
                    flex_align_cross: START
                  widgets:
                    - label:
                        text_font: noto_sans_sc_32
                        text_color: 0x4A6363
                        text: "你："
                    - label:
                        id: va_request_label
                        text_font: noto_sans_sc_32
                        text_color: 0x1A1A1A
                        text: ""
                        width: 750
                        text_align: LEFT
                        long_mode: WRAP             # ← 不截断，自动换行

              # 助手答复气泡（橙色）
              - obj:
                  styles: va_response_bubble
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: START
                    flex_align_cross: START
                  widgets:
                    - label:
                        text_font: noto_sans_sc_32
                        text_color: 0x8B5A00
                        text: "助手："
                    - label:
                        id: va_response_label
                        text_font: noto_sans_sc_32
                        text_color: 0x1A1A1A
                        text: ""
                        width: 750
                        text_align: LEFT
                        long_mode: WRAP             # ← 不截断，自动换行
