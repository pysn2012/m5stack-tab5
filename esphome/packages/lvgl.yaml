# 全局变量定义
globals:
  # 当前页面编号（0=主页, 1=插座, 2=系统, 3=语音）
  - id: page_num
    type: int
    restore_value: no
    initial_value: '0'
  # 背光亮度值 (0-255)
  - id: backlight_brightness_val
    type: int
    restore_value: yes
    initial_value: '153'  # 默认 60% (153/255 ≈ 60%)
  # 室外传感器缓存值
  - id: outdoor_temp_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: outdoor_humi_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: outdoor_pres_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: outdoor_pm25_val
    type: float
    restore_value: no
    initial_value: '0'
  # 室内传感器缓存值
  - id: indoor_temp_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: indoor_humi_val
    type: float
    restore_value: no
    initial_value: '0'
  # 插座功率缓存值
  - id: weak_power_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: weak_total_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: desk_power_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: desk_total_val
    type: float
    restore_value: no
    initial_value: '0'
  # 音量缓存值
  - id: volume_val
    type: int
    restore_value: yes
    initial_value: '60'

# LVGL 图形库配置
lvgl:
  rotation: 270
  on_boot:
    - light.turn_on: backlight
    - rx8130.read_time:
    - script.execute: expand_nav_btn_click_area
    - script.execute: nav_rail_update
    - script.execute: sync_ha
    # 初始化滑块位置和标签（使用全局初始值 60%）
    - lvgl.slider.update:
        id: backlight_slider
        value: !lambda return id(backlight_brightness_val);
    - lvgl.slider.update:
        id: volume_slider
        value: !lambda return id(volume_val);
    - lvgl.label.update:
        id: backlight_bright_label
        text: !lambda |-
          static char buf[16];
          int percent = id(backlight_brightness_val) * 100 / 255;
          snprintf(buf, sizeof(buf), "%d %%", percent);
          return buf;
    - lvgl.label.update:
        id: volume_label
        text: !lambda |-
          static char buf[16];
          snprintf(buf, sizeof(buf), "%d %%", id(volume_val));
          return buf;
    # 设置媒体播放器初始音量
    - media_player.volume_set: !lambda return id(volume_val) / 100.0;
  byte_order: little_endian
  color_depth: 16
  # 自动息屏
  on_idle:
    timeout: !lambda |-
      int timeout_sec = 30; // 默认 30 秒
      if (id(screen_off_timeout_sec).has_state()) {
        std::string opt = id(screen_off_timeout_sec).current_option();
        if (opt == "Never") return UINT32_MAX; // 永不超时
        timeout_sec = atoi(opt.c_str());
      }
      return timeout_sec * 1000;
    then:
      - if:
          condition:
            - lambda: |-
                int phase = id(voice_assistant_phase);
                return (phase == ${voice_assist_listening_phase_id} || phase == ${voice_assist_thinking_phase_id} || phase == ${voice_assist_replying_phase_id} || phase == ${voice_assist_timer_finished_phase_id});
          then:
            - logger.log: "语音助手活跃中，阻止息屏"
          else:
            - script.execute: screen_off

  # LVGL 样式定义
  style_definitions:
    # 侧边栏样式
    - id: sidebar
      bg_color: 0xE9EFEE
      bg_opa: COVER
      border_opa: TRANSP
      pad_top: 30
      pad_left: 0
      pad_right: 0
      radius: 0
      width: 192
      height: 100%
    # 导航按钮容器样式
    - id: nav_btn_container
      bg_opa: TRANSP
      border_opa: TRANSP
      width: 160
      height: 160
      pad_all: 0
    # 导航按钮未激活样式
    - id: nav_btn_inactivate
      bg_opa: TRANSP
      width: 150
      height: 150
      radius: 28
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_all: 0
    # 导航按钮激活样式
    - id: nav_btn_activate
      bg_color: 0xCCE8E7
      bg_opa: COVER
      width: 150
      height: 150
      radius: 28
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_all: 0
    # 语音助手按钮激活样式
    - id: va_btn_activate
      bg_color: 0xFF8C00
      bg_opa: COVER
      width: 150
      height: 150
      radius: 28
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_all: 0
    # 导航图标激活样式
    - id: nav_icon_activate
      text_font: extra_icon_80
      text_color: 0x1A4A4A
    # 导航图标未激活样式
    - id: nav_icon_inactivate
      text_font: extra_icon_80
      text_color: 0x3F4948
    # 内容容器样式
    - id: content_container
      align: CENTER
      bg_opa: COVER
      border_opa: TRANSP
      height: 100%
      width: 1080
      x: 96
      pad_top: 30
      pad_left: 20
    # 语音助手页面：状态卡片样式
    - id: va_status_card
      bg_color: 0xFFFFFF
      bg_opa: COVER
      border_opa: TRANSP
      radius: 24
      width: 900
      height: 180
      pad_all: 24
      shadow_opa: TRANSP
    # 语音助手页面：对话气泡样式（用户问）
    - id: va_request_bubble
      bg_color: 0xCCE8E7
      bg_opa: COVER
      border_opa: TRANSP
      radius: 24
      width: 800
      height: SIZE_CONTENT
      min_height: 80
      pad_all: 24
      shadow_opa: TRANSP
    # 语音助手页面：对话气泡样式（助手答复）
    - id: va_response_bubble
      bg_color: 0xFFE0B2
      bg_opa: COVER
      border_opa: TRANSP
      radius: 24
      width: 800
      height: SIZE_CONTENT
      min_height: 80
      pad_all: 24
      shadow_opa: TRANSP
    # 苹果风格卡片样式
    - id: apple_card
      bg_color: 0x1E1E1E
      bg_opa: COVER
      radius: 16
      border_opa: TRANSP
      shadow_opa: 30%
      shadow_color: 0x000000
      shadow_spread: 8
      shadow_offset_x: 0
      shadow_offset_y: 4
      pad_all: 24
    # 卡片标题样式
    - id: card_title
      text_font: noto_sans_sc_32
      text_color: 0xFFFFFF
      align: LEFT_MID
      pad_bottom: 16
    # 模块内元素容器（平直边框，无圆角）
    - id: module_content
      bg_opa: TRANSP
      border_opa: TRANSP
      pad_all: 0
    # 模块内标签样式
    - id: module_label
      text_font: montserrat_26
      text_color: 0xCCCCCC
      align: LEFT_MID
      pad_bottom: 8
    # 模块内控件容器
    - id: control_container
      bg_opa: TRANSP
      border_opa: TRANSP
    # 圆角按钮样式（用于WiFi配置、重启、关机）
    - id: apple_button
      bg_color: 0x2C2C2C
      bg_opa: COVER
      radius: 12
      border_opa: TRANSP
      shadow_opa: 20%
      shadow_color: 0x000000
      shadow_spread: 4
      shadow_offset_x: 0
      shadow_offset_y: 2
      pad_all: 12

  # 顶层导航栏和模态框
  top_layer:
    widgets:
      # 侧边导航栏
      - obj:
          align: TOP_LEFT
          styles: sidebar
          id: sidebars
          layout:
            type: FLEX
            flex_flow: COLUMN
            pad_row: 5
            flex_align_main: START
            flex_align_cross: CENTER
            flex_align_track: CENTER
          widgets:
            # 主页导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: CENTER
                      styles: nav_btn_inactivate
                      id: dash_panel_btn
                      widgets:
                        - label:
                            id: dash_btn_icon
                            styles: nav_icon_inactivate
                            text: "\U000F02DC"
                            align: CENTER
                      on_press:
                        - lambda: id(page_num) = 0;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: main_page
            # 插座导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: CENTER
                      styles: nav_btn_inactivate
                      id: socket_panel_btn
                      widgets:
                        - label:
                            id: socket_btn_icon
                            styles: nav_icon_inactivate
                            text: "\U000F0905"
                            align: CENTER
                      on_press:
                        - lambda: id(page_num) = 1;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: socket_page
            # 系统导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: CENTER
                      styles: nav_btn_inactivate
                      id: light_panel_btn
                      widgets:
                        - label:
                            id: light_btn_icon
                            styles: nav_icon_inactivate
                            text: "\U000F08BB"
                            align: CENTER
                      on_press:
                        - lambda: id(page_num) = 2;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: system_page
            # 语音助手导航按钮（侧边栏第 4 项）
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: CENTER
                      styles: nav_btn_inactivate
                      id: voice_panel_btn
                      widgets:
                        - label:
                            id: voice_btn_icon
                            styles: nav_icon_inactivate
                            text: "\U000F05CB"
                            align: CENTER
                      on_press:
                        - lambda: id(page_num) = 3;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: voice_page
                        - if:
                            condition:
                              not: voice_assistant.is_running:
                            then:
                              - script.execute: stop_wake_word
                              - voice_assistant.start:

      # 状态栏（显示电池/WiFi/API 状态图标）
      - obj:
          align: TOP_RIGHT
          id: status_bar
          width: 1280
          height: 100
          bg_opa: TRANSP
          border_opa: TRANSP
          layout:
            type: FLEX
            flex_flow: ROW_REVERSE
            flex_align_main: END
            flex_align_cross: CENTER
            flex_align_track: CENTER
            pad_column: 20
          widgets:
            - label:
                id: pwr_bat_icon_label
                text_font: extra_icon
                text: "\U000F06A5"
            - label:
                id: wifi_icon_label
                hidden: true
                text_font: extra_icon
                text: "\U000F05A9"
            - label:
                id: api_icon_label
                hidden: true
                text_font: extra_icon
                text: "\U000F109B"

      # Wi-Fi 配置弹窗（默认隐藏）
      - obj:
          id: wifi_config_panel
          hidden: true
          align: CENTER
          width: 1100
          height: 700
          bg_color: 0xFFFFFF
          bg_opa: COVER
          border_width: 2
          border_color: 0xCCCCCC
          radius: 20
          layout:
            type: FLEX
            flex_flow: COLUMN
            flex_align_main: CENTER
            flex_align_cross: CENTER
            pad_row: 10
          widgets:
            # 标题
            - label:
                text_font: noto_sans_sc_32
                text: "WiFi设置"
                text_color: 0x333333
            # 输入框容器（SSID + 密码）
            - obj:
                width: 1000
                height: SIZE_CONTENT
                bg_opa: TRANSP
                layout:
                  type: GRID
                  grid_columns: [120, FR(1)]
                  grid_rows: [60, 60]
                  pad_column: 10
                  pad_row: 5
                widgets:
                  # SSID 标签
                  - label:
                      text_font: montserrat_26
                      text: "SSID:"
                      grid_cell_column_pos: 0
                      grid_cell_row_pos: 0
                      grid_cell_x_align: CENTER
                      grid_cell_y_align: CENTER
                  # SSID 输入框
                  - textarea:
                      id: ta_wifi_ssid
                      grid_cell_column_pos: 1
                      grid_cell_row_pos: 0
                      width: 720
                      height: 50
                      pad_all: 2
                      text_font: montserrat_26
                      placeholder_text: "WiFi SSID"
                      border_width: 1
                      on_click:
                        - lambda: lv_keyboard_set_textarea(id(kb_wifi)->obj, id(ta_wifi_ssid));
                  # 密码标签
                  - label:
                      text_font: montserrat_26
                      text: "PWD: "
                      grid_cell_column_pos: 0
                      grid_cell_row_pos: 1
                      grid_cell_x_align: CENTER
                      grid_cell_y_align: CENTER
                  # 密码输入框
                  - textarea:
                      id: ta_wifi_pass
                      grid_cell_column_pos: 1
                      grid_cell_row_pos: 1
                      width: 720
                      height: 50
                      pad_all: 2
                      text_font: montserrat_26
                      placeholder_text: "WiFi PASSWORD"
                      password_mode: true
                      border_width: 1
                      on_click:
                        - lambda: lv_keyboard_set_textarea(id(kb_wifi)->obj, id(ta_wifi_pass));
            # 虚拟键盘
            - keyboard:
                id: kb_wifi
                width: 1000
                height: 280
                textarea: ta_wifi_ssid
                mode: TEXT_LOWER
                bg_opa: TRANSP
                radius: 20
                pad_bottom: 10
                translate_y: 10
                items:
                  bg_color: 0x7893A6
                  text_color: 0xE9EFFB
                  text_font: montserrat_26
                  checked:
                    bg_color: 0x2478D9
                    text_color: 0xE9EFFB
            # 底部按钮（连接/取消）
            - obj:
                width: 1000
                height: 100
                bg_opa: TRANSP
                pad_all: 5
                layout:
                  type: FLEX
                  flex_flow: ROW
                  pad_column: 40
                  flex_align_main: CENTER
                widgets:
                  - button:
                      width: 180
                      height: 60
                      bg_color: 0x3498DB
                      radius: 10
                      on_press:
                        - script.execute: connect_wifi_action
                      widgets:
                        - label:
                            text_font: noto_sans_sc_32
                            text: "连接"
                            text_color: 0xFFFFFF
                            align: CENTER
                  - button:
                      width: 180
                      height: 60
                      bg_color: 0xCCCCCC
                      radius: 10
                      on_press:
                        - lvgl.widget.hide: wifi_config_panel
                        - lvgl.textarea.update:
                            id: ta_wifi_ssid
                            text: ""
                        - lvgl.textarea.update:
                            id: ta_wifi_pass
                            text: ""
                      widgets:
                        - label:
                            text_font: noto_sans_sc_32
                            text: "取消"
                            text_color: 0xFFFFFF
                            align: CENTER

  # LVGL 页面定义
  pages:
    # ========== 主页页面 ==========
    - id: main_page
      widgets:
        - obj:
            styles: content_container
            widgets:
              # 时间显示（大字居中）
              - label:
                  id: time_label
                  text_font: montserrat_96
                  text: "14:07"
                  align: CENTER
                  y: -200
              # 日期星期（中字居中）
              - label:
                  id: date_label
                  text_font: montserrat_32
                  text: "2026-03-11 Thu"
                  align: CENTER
                  y: -110
              # 信息区域（3行左对齐）
              - obj:
                  width: 950
                  height: 300
                  align: CENTER
                  y: 50
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: GRID
                    grid_columns: [FR(1)]
                    grid_rows: [FR(1), FR(1), FR(1)]
                    pad_row: 12
                  widgets:
                    # 室外行
                    - label:
                        id: outdoor_label
                        text_font: noto_sans_sc_32
                        text: "室外：温度--℃ 湿度--% 气压--hPa 颗粒物--ppm"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 0
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    # 室内行
                    - label:
                        id: indoor_label
                        text_font: noto_sans_sc_32
                        text: "室内：温度--℃ 湿度--%"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 1
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    # 预警行
                    - label:
                        id: weather_alert_label
                        text_font: noto_sans_sc_32
                        text_color: 0xE74C3C
                        text: "预警：无预警"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 2
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER

    # ========== 插座页面 ==========
    - id: socket_page
      widgets:
        - obj:
            styles: content_container
            widgets:
              # 4个插座按钮（并排）
              - obj:
                  width: 950
                  height: 240
                  align: CENTER
                  y: -160
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    pad_column: 24
                    flex_align_main: START
                    flex_align_cross: CENTER
                  widgets:
                    # 插座1按钮
                    - button:
                        id: chuangmi_socket1_button
                        width: 160
                        height: 160
                        radius: 20
                        pad_all: 12
                        text_color: 0xFFFFFF
                        checkable: true
                        bg_color: 0xE9EFEE
                        checked:
                          bg_color: 0xFF8C00
                        widgets:
                          - label:
                              text_font: extra_icon_80
                              align: TOP_MID
                              text: "\U000F0425"
                          - label:
                              text_font: noto_sans_sc_32
                              text: "插座1"
                              align: BOTTOM_MID
                        on_click:
                          - homeassistant.action:
                              action: switch.toggle
                              data:
                                entity_id: switch.chuangmi_cn_125697630_m3_on_p_2_1
                    # 插座2按钮
                    - button:
                        id: chuangmi_socket2_button
                        width: 160
                        height: 160
                        radius: 20
                        pad_all: 12
                        text_color: 0xFFFFFF
                        checkable: true
                        bg_color: 0xE9EFEE
                        checked:
                          bg_color: 0xFF8C00
                        widgets:
                          - label:
                              text_font: extra_icon_80
                              align: TOP_MID
                              text: "\U000F0425"
                          - label:
                              text_font: noto_sans_sc_32
                              text: "插座2"
                              align: BOTTOM_MID
                        on_click:
                          - homeassistant.action:
                              action: switch.toggle
                              data:
                                entity_id: switch.chuangmi_cn_125796823_m3_on_p_2_1
                    # 插座3按钮
                    - button:
                        id: chuangmi_socket3_button
                        width: 160
                        height: 160
                        radius: 20
                        pad_all: 12
                        text_color: 0xFFFFFF
                        checkable: true
                        bg_color: 0xE9EFEE
                        checked:
                          bg_color: 0xFF8C00
                        widgets:
                          - label:
                              text_font: extra_icon_80
                              align: TOP_MID
                              text: "\U000F0425"
                          - label:
                              text_font: noto_sans_sc_32
                              text: "插座3"
                              align: BOTTOM_MID
                        on_click:
                          - homeassistant.action:
                              action: switch.toggle
                              data:
                                entity_id: switch.chuangmi_cn_125520813_m3_on_p_2_1
                    # 插座4按钮
                    - button:
                        id: chuangmi_socket4_button
                        width: 160
                        height: 160
                        radius: 20
                        pad_all: 12
                        text_color: 0xFFFFFF
                        checkable: true
                        bg_color: 0xE9EFEE
                        checked:
                          bg_color: 0xFF8C00
                        widgets:
                          - label:
                              text_font: extra_icon_80
                              align: TOP_MID
                              text: "\U000F0425"
                          - label:
                              text_font: noto_sans_sc_32
                              text: "插座4"
                              align: BOTTOM_MID
                        on_click:
                          - homeassistant.action:
                              action: switch.toggle
                              data:
                                entity_id: switch.chuangmi_cn_393289534_212a01_on_p_2_1
              # 信息区域（2行左对齐）
              - obj:
                  width: 950
                  height: 200
                  align: CENTER
                  y: 30
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: GRID
                    grid_columns: [FR(1)]
                    grid_rows: [FR(1), FR(1)]
                    pad_row: 12
                  widgets:
                    # 弱电行
                    - label:
                        id: weak_power_label
                        text_font: noto_sans_sc_32
                        text: "弱电：功耗--W 总电量--Wh"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 0
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    # 书桌行
                    - label:
                        id: desk_power_label
                        text_font: noto_sans_sc_32
                        text: "书桌：功耗--W 总电量--Wh"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 1
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER

    # ========== 系统页面 ==========
    - id: system_page
      widgets:
        # 左上角页面标题
        - label:
            text_font: noto_sans_sc_48
            text: "设置"
            align: TOP_LEFT
            x: 120
            y: 30
            text_color: 0xFFFFFF
        # 内容容器
        - obj:
            styles: content_container
            pad_top: 100
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: START
              flex_align_cross: CENTER
              pad_row: 20
            widgets:
              # ─── 显示模块 ───
              - obj:
                  styles: apple_card
                  width: 900
                  height: SIZE_CONTENT
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    pad_row: 20
                  widgets:
                    - label:
                        styles: card_title
                        text: "显示"
                    - obj:
                        styles: module_content
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 16
                        widgets:
                          # 亮度行
                          - obj:
                              styles: control_container
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: SPACE_BETWEEN
                                flex_align_cross: CENTER
                                pad_column: 20
                              widgets:
                                - label:
                                    styles: module_label
                                    text: "亮度:"
                                - slider:
                                    id: backlight_slider
                                    width: 400
                                    height: 40
                                    radius: 8
                                    min_value: 0
                                    max_value: 255
                                    value: 153
                                    bg_color: 0x333333
                                    bg_opa: COVER
                                    indicator:
                                      radius: 8
                                      bg_color: 0x4A90E2
                                    knob:
                                      bg_opa: TRANSP
                                    on_release:
                                      - light.turn_on:
                                          id: backlight
                                          brightness: !lambda return x / 255.0;
                                      - lambda: id(backlight_brightness_val) = int(x);
                                      - lvgl.label.update:
                                          id: backlight_bright_label
                                          text: !lambda |-
                                            static char buf[16];
                                            int percent = int(x) * 100 / 255;
                                            snprintf(buf, sizeof(buf), "%d %%", percent);
                                            return buf;
                                      - homeassistant.action:
                                          action: light.turn_on
                                          data:
                                            entity_id: light.tab5_display_backlight
                                            brightness: !lambda return int(x);
                                - label:
                                    id: backlight_bright_label
                                    text_font: montserrat_32
                                    text_color: 0xCCCCCC
                                    text: "60 %"
                          # 息屏时间行
                          - obj:
                              styles: control_container
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: SPACE_BETWEEN
                                flex_align_cross: CENTER
                                pad_column: 20
                              widgets:
                                - label:
                                    styles: module_label
                                    text: "息屏时间:"
                                - dropdown:
                                    id: screen_off_timeout_dropdown
                                    width: 200
                                    height: 50
                                    text_font: montserrat_26
                                    bg_color: 0x2C2C2C
                                    bg_opa: COVER
                                    border_width: 0
                                    radius: 8
                                    options:
                                      - "15"
                                      - "30"
                                      - "60"
                                      - "90"
                                      - "120"
                                      - "Never"
                                    selected_index: 1

              # ─── 声音模块 ───
              - obj:
                  styles: apple_card
                  width: 900
                  height: SIZE_CONTENT
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    pad_row: 20
                  widgets:
                    - label:
                        styles: card_title
                        text: "声音"
                    - obj:
                        styles: module_content
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 16
                        widgets:
                          # 音量行
                          - obj:
                              styles: control_container
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: SPACE_BETWEEN
                                flex_align_cross: CENTER
                                pad_column: 20
                              widgets:
                                - label:
                                    styles: module_label
                                    text: "音量:"
                                - slider:
                                    id: volume_slider
                                    width: 400
                                    height: 40
                                    radius: 8
                                    min_value: 0
                                    max_value: 100
                                    value: 60
                                    bg_color: 0x333333
                                    bg_opa: COVER
                                    indicator:
                                      radius: 8
                                      bg_color: 0x4A90E2
                                    knob:
                                      bg_opa: TRANSP
                                    on_release:
                                      - number.set:
                                          id: volume_number
                                          value: !lambda return int(x);
                                - label:
                                    id: volume_label
                                    text_font: montserrat_32
                                    text_color: 0xCCCCCC
                                    text: "60 %"
                          # DAC输出行
                          - obj:
                              styles: control_container
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: SPACE_BETWEEN
                                flex_align_cross: CENTER
                                pad_column: 20
                              widgets:
                                - label:
                                    styles: module_label
                                    text: "输出:"
                                - dropdown:
                                    id: tab5_dac_output_dropdown
                                    width: 200
                                    height: 50
                                    text_font: montserrat_26
                                    bg_color: 0x2C2C2C
                                    bg_opa: COVER
                                    border_width: 0
                                    radius: 8
                                    options:
                                      - "LINE1"
                                      - "LINE2"
                                      - "BOTH"
                                    selected_index: 0

              # ─── 网络模块 ───
              - obj:
                  styles: apple_card
                  width: 900
                  height: SIZE_CONTENT
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    pad_row: 20
                  widgets:
                    - label:
                        styles: card_title
                        text: "网络"
                    - obj:
                        styles: module_content
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 16
                        widgets:
                          # IP地址行
                          - obj:
                              styles: control_container
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: SPACE_BETWEEN
                                flex_align_cross: CENTER
                                pad_column: 20
                              widgets:
                                - label:
                                    styles: module_label
                                    text: "IP地址:"
                                - label:
                                    id: sys_ip_label
                                    text_font: noto_sans_sc_32
                                    text_color: 0xCCCCCC
                                    text: "0.0.0.0"
                          # WIFI信号行
                          - obj:
                              styles: control_container
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: SPACE_BETWEEN
                                flex_align_cross: CENTER
                                pad_column: 20
                              widgets:
                                - label:
                                    styles: module_label
                                    text: "WIFI信号:"
                                - label:
                                    id: sys_rssi_label
                                    text_font: noto_sans_sc_32
                                    text_color: 0xCCCCCC
                                    text: "-- dBm"
                          # WiFi配置按钮
                          - obj:
                              styles: control_container
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: SPACE_BETWEEN
                                flex_align_cross: CENTER
                                pad_column: 20
                              widgets:
                                - label:
                                    styles: module_label
                                    text: "WiFi配置:"
                                - button:
                                    id: btn_wifi_config
                                    styles: apple_button
                                    width: 180
                                    height: 50
                                    text_font: noto_sans_sc_32
                                    text: "WiFi配置"
                                    text_color: 0xFFFFFF
                                    checkable: false
                                    on_press:
                                      - lvgl.widget.show: wifi_config_panel

              # ─── 关于模块 ───
              - obj:
                  styles: apple_card
                  width: 900
                  height: SIZE_CONTENT
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    pad_row: 20
                  widgets:
                    - label:
                        styles: card_title
                        text: "关于"
                    - obj:
                        styles: module_content
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 16
                        widgets:
                          # 运行时间行
                          - obj:
                              styles: control_container
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: SPACE_BETWEEN
                                flex_align_cross: CENTER
                                pad_column: 20
                              widgets:
                                - label:
                                    styles: module_label
                                    text: "运行:"
                                - label:
                                    id: sys_uptime_label
                                    text_font: noto_sans_sc_32
                                    text_color: 0xCCCCCC
                                    text: "--:--:--"
                          # 重启/关机按钮行
                          - obj:
                              styles: control_container
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: SPACE_BETWEEN
                                flex_align_cross: CENTER
                                pad_column: 20
                              widgets:
                                - button:
                                    id: btn_restart
                                    styles: apple_button
                                    width: 180
                                    height: 50
                                    text_font: noto_sans_sc_32
                                    text: "重启"
                                    text_color: 0x4CAF50
                                    checkable: false
                                    on_press:
                                      - button.press: restart_button
                                - button:
                                    id: btn_shutdown
                                    styles: apple_button
                                    width: 180
                                    height: 50
                                    text_font: noto_sans_sc_32
                                    text: "关机"
                                    text_color: 0xF44336
                                    checkable: false
                                    on_press:
                                      - button.press: shutdown_button

    # ========== 语音助手页面 ==========
    - id: voice_page
      widgets:
        - obj:
            styles: content_container
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: CENTER
              flex_align_cross: CENTER
              pad_row: 24
            widgets:
              # 顶部状态卡片（图标 + 状态文字）
              - obj:
                  styles: va_status_card
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: CENTER
                    flex_align_cross: CENTER
                    pad_row: 12
                  widgets:
                    - label:
                        id: va_status_icon
                        text_font: extra_icon
                        text_color: 0xFF8C00
                        text: "\U000F05CB"
                    - label:
                        id: va_status_label
                        text_font: noto_sans_sc_32
                        text_color: 0x333333
                        text: "待机状态"
                        text_align: CENTER
                        long_mode: WRAP
                        width: 800
              # 用户问气泡（蓝色）
              - obj:
                  styles: va_request_bubble
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: START
                    flex_align_cross: START
                  widgets:
                    - label:
                        text_font: noto_sans_sc_32
                        text_color: 0x4A6363
                        text: "你："
                    - label:
                        id: va_request_label
                        text_font: noto_sans_sc_32
                        text_color: 0x1A1A1A
                        text: ""
                        width: 750
                        text_align: LEFT
                        long_mode: WRAP
              # 助手答复气泡（橙色）
              - obj:
                  styles: va_response_bubble
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: START
                    flex_align_cross: START
                  widgets:
                    - label:
                        text_font: noto_sans_sc_32
                        text_color: 0x8B5A00
                        text: "助手："
                    - label:
                        id: va_response_label
                        text_font: noto_sans_sc_32
                        text_color: 0x1A1A1A
                        text: ""
                        width: 750
                        text_align: LEFT
                        long_mode: WRAP
