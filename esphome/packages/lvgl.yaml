# 全局变量定义
globals:
  # 当前页面编号（0=主页, 1=插座, 2=系统）
  - id: page_num
    type: int
    restore_value: no
    initial_value: '0'
  # 背光亮度值 (0-255)
  - id: backlight_brightness_val
    type: int
    restore_value: yes
    initial_value: '128'  # 默认 50%
  # 室外传感器缓存值
  - id: outdoor_temp_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: outdoor_humi_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: outdoor_pres_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: outdoor_pm25_val
    type: float
    restore_value: no
    initial_value: '0'
  # 室内传感器缓存值
  - id: indoor_temp_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: indoor_humi_val
    type: float
    restore_value: no
    initial_value: '0'
  # 插座功率缓存值
  - id: weak_power_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: weak_total_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: desk_power_val
    type: float
    restore_value: no
    initial_value: '0'
  - id: desk_total_val
    type: float
    restore_value: no
    initial_value: '0'
  # 音量缓存值
  - id: volume_val
    type: int
    restore_value: no
    initial_value: '50'

# LVGL 图形库配置
lvgl:
  rotation: 270
  on_boot:
    - light.turn_on: backlight
    - rx8130.read_time:
    - script.execute: expand_nav_btn_click_area
    - script.execute: nav_rail_update
    - script.execute: sync_ha

  byte_order: little_endian
  color_depth: 16

  # ═══════════════════════════════════════════════════════════════
  # LVGL 样式定义
  # ═══════════════════════════════════════════════════════════════

  style_definitions:
    # ── 侧边栏样式 ──────────────────────────────────────────────
    - id: sidebar
      bg_color: 0xE9EFEE
      bg_opa: COVER
      border_opa: TRANSP
      pad_top: 30
      pad_left: 0
      pad_right: 0
      radius: 0
      width: 192
      height: 100%

    # ── 导航按钮容器样式 ─────────────────────────────────────────
    - id: nav_btn_container
      bg_opa: TRANSP
      border_opa: TRANSP
      width: 180
      height: 150

    # ── 导航按钮未激活样式 ───────────────────────────────────────
    - id: nav_btn_inactivate
      bg_opa: TRANSP
      align: CENTER
      width: 112
      height: 100          # ← 从64改成100
      radius: 48
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_top: 10           # ← 新增
      pad_bottom: 6         # ← 新增
      layout:               # ← 新增
        type: flex
        flex_flow: column
        flex_align_main: center
        flex_align_cross: center
        pad_row: 2

    - id: nav_btn_activate
      bg_color: 0xCCE8E7   # ← 从 checked 里移过来的底纹色
      align: CENTER
      width: 112
      height: 100
      radius: 48
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_top: 10
      pad_bottom: 6
      layout:
        type: flex
        flex_flow: column
        flex_align_main: center
        flex_align_cross: center
        pad_row: 2

    # ── 导航图标激活样式 ─────────────────────────────────────────
    - id: nav_icon_activate
      align: CENTER
      text_font: extra_icon
      text_color: 0x4A6363

    # ── 导航图标未激活样式 ───────────────────────────────────────
    - id: nav_icon_inactivate
      align: CENTER
      text_font: extra_icon
      text_color: 0x3F4948

    # ── 导航标签激活样式 ─────────────────────────────────────────
    - id: nav_label_activate
      align: BOTTOM_MID
      text_color: 0x4A6363
      text_font: noto_sans_sc_32

    # ── 导航标签未激活样式 ───────────────────────────────────────
    - id: nav_label_inactivate
      align: BOTTOM_MID
      text_color: 0x3F4948
      text_font: noto_sans_sc_32

    # ── 内容容器样式 ─────────────────────────────────────────────
    - id: content_container
      align: CENTER
      bg_opa: COVER
      border_opa: TRANSP
      height: 100%
      width: 1080
      x: 96
      pad_top: 30
      pad_left: 30

  # 顶层导航栏和模态框
  top_layer:
    widgets:
      # 侧边导航栏
      - obj:
          align: TOP_LEFT
          styles: sidebar
          id: sidebars
          layout:
            type: flex
            flex_flow: COLUMN
            pad_row: 12
            flex_align_main: start
            flex_align_cross: center
            flex_align_track: center
          widgets:
            # 主页导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: dash_panel_btn
                      widgets:
                        - label:
                            id: dash_btn_icon
                            align: CENTER
                            styles: nav_icon_inactivate
                            text: "\U000F02DC" # 主页图标
                        - label:
                            styles: nav_label_inactivate
                            id: dash_btn_label
                            text: "主页"
                      on_press:
                        - lambda: id(page_num) = 0;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: main_page


            # 插座导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: socket_panel_btn
                      widgets:
                        - label:
                            id: socket_btn_icon
                            align: CENTER
                            styles: nav_icon_inactivate
                            text: "\U000F0905" # 插座图标
                        - label:
                            styles: nav_label_inactivate
                            id: socket_btn_label
                            text: "插座"
                      on_press:
                        - lambda: id(page_num) = 1;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: socket_page


            # 系统导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: light_panel_btn
                      widgets:
                        - label:
                            id: light_btn_icon
                            align: CENTER
                            styles: nav_icon_inactivate
                            text: "\U000F08BB"  # 齿轮（轮廓）图标
                        - label:
                            styles: nav_label_inactivate
                            id: light_btn_label
                            text: "系统"
                      on_press:
                        - lambda: id(page_num) = 2;
                        - script.execute: nav_rail_update
                        - lvgl.page.show: system_page


      # 状态栏（显示电池/WiFi/API 状态图标）
      - obj:
          align: TOP_RIGHT
          id: status_bar
          width: 1280
          height: 100
          bg_opa: TRANSP
          border_opa: TRANSP
          layout:
            type: FLEX
            flex_flow: ROW_REVERSE
            flex_align_main: END
            flex_align_cross: CENTER
            flex_align_track: CENTER
            pad_column: 20
          widgets:
            - label:
                id: pwr_bat_icon_label
                text_font: extra_icon
                text: "\U000F06A5"
            - label:
                id: wifi_icon_label
                hidden: true
                text_font: extra_icon
                text: "\U000F05A9"
            - label:
                id: api_icon_label
                hidden: true
                text_font: extra_icon
                text: "\U000F109B"

  # LVGL 页面定义
  pages:
    # ========== 主页页面 ==========
    - id: main_page
      widgets:
        - obj:
            styles: content_container
            widgets:
              # 时间显示（大字居中）
              - label:
                  id: time_label
                  text_font: montserrat_96
                  text: "14:07"
                  align: CENTER
                  y: -200
              # 日期星期（中字居中）
              - label:
                  id: date_label
                  text_font: montserrat_32
                  text: "2026-03-11 Thu"
                  align: CENTER
                  y: -110
              # 信息区域（3行左对齐）
              - obj:
                  width: 900
                  height: 300
                  align: CENTER
                  y: 50
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: GRID
                    grid_columns: [FR(1)]
                    grid_rows: [FR(1), FR(1), FR(1)]
                    pad_row: 12
                  widgets:
                    # 室外行
                    - label:
                        id: outdoor_label
                        text_font: noto_sans_sc_32
                        text: "室外：温度--℃  湿度--%  气压--hPa  颗粒物--ppm"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 0
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    # 室内行
                    - label:
                        id: indoor_label
                        text_font: noto_sans_sc_32
                        text: "室内：温度--℃  湿度--%"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 1
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    # 预警行
                    - label:
                        id: weather_alert_label
                        text_font: noto_sans_sc_32
                        text_color: 0xE74C3C
                        text: "预警：无预警"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 2
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER

    # ========== 插座页面 ==========
    - id: socket_page
      widgets:
        - obj:
            styles: content_container
            widgets:
              # 4个插座按钮（并排）
              - obj:
                  width: 900
                  height: 240
                  align: CENTER
                  y: -180
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    pad_column: 24
                    flex_align_main: CENTER
                    flex_align_cross: CENTER
                  widgets:
                    # 插座1按钮
                    - button:
                        id: chuangmi_socket1_button
                        width: 160
                        height: 160
                        radius: 12               # 圆角
                        pad_all: 12              # 内边距
                        text_color: 0xFFFFFF     # 文字颜色
                        checkable: true
                        bg_color: 0xE9EFEE       # 关闭状态颜色灰色
                        checked:
                          bg_color: 0xFF8C00     # 开启状态颜色橙色
                        widgets:
                          - label:
                              text_font: extra_icon_64
                              align: top_mid
                              text: "\U000F0425"
                          - label:
                              text_font: noto_sans_sc_32
                              text: "插座1"
                              align: bottom_mid
                        on_click:
                          - homeassistant.action:
                              action: switch.toggle
                              data:
                                entity_id: switch.chuangmi_cn_125697630_m3_on_p_2_1
                    # 插座2按钮
                    - button:
                        id: chuangmi_socket2_button
                        width: 160
                        height: 160
                        radius: 12               # 圆角
                        pad_all: 12              # 内边距
                        text_color: 0xFFFFFF     # 文字颜色
                        checkable: true
                        bg_color: 0xE9EFEE       # 关闭状态颜色灰色
                        checked:
                          bg_color: 0xFF8C00     # 开启状态颜色橙色
                        widgets:
                          - label:
                              text_font: extra_icon_64
                              align: top_mid
                              text: "\U000F0425"
                          - label:
                              text_font: noto_sans_sc_32
                              text: "插座2"
                              align: bottom_mid
                        on_click:
                          - homeassistant.action:
                              action: switch.toggle
                              data:
                                entity_id: switch.chuangmi_cn_125796823_m3_on_p_2_1
                    # 插座3按钮
                    - button:
                        id: chuangmi_socket3_button
                        width: 160
                        height: 160
                        radius: 12               # 圆角
                        pad_all: 12              # 内边距
                        text_color: 0xFFFFFF     # 文字颜色
                        checkable: true
                        bg_color: 0xE9EFEE       # 关闭状态颜色灰色
                        checked:
                          bg_color: 0xFF8C00     # 开启状态颜色橙色
                        widgets:
                          - label:
                              text_font: extra_icon_64
                              align: top_mid
                              text: "\U000F0425"
                          - label:
                              text_font: noto_sans_sc_32
                              text: "插座3"
                              align: bottom_mid
                        on_click:
                          - homeassistant.action:
                              action: switch.toggle
                              data:
                                entity_id: switch.chuangmi_cn_125520813_m3_on_p_2_1
                    # 插座4按钮
                    - button:
                        id: chuangmi_socket4_button
                        width: 160
                        height: 160
                        radius: 12               # 圆角
                        pad_all: 12              # 内边距
                        text_color: 0xFFFFFF     # 文字颜色
                        checkable: true
                        bg_color: 0xE9EFEE       # 关闭状态颜色灰色
                        checked:
                          bg_color: 0xFF8C00     # 开启状态颜色橙色
                        widgets:
                          - label:
                              text_font: extra_icon_64
                              align: top_mid
                              text: "\U000F0425"
                          - label:
                              text_font: noto_sans_sc_32
                              text: "插座4"
                              align: bottom_mid
                        on_click:
                          - homeassistant.action:
                              action: switch.toggle
                              data:
                                entity_id: switch.chuangmi_cn_393289534_212a01_on_p_2_1

              # 信息区域（2行左对齐）
              - obj:
                  width: 900
                  height: 200
                  align: CENTER
                  y: 30
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: GRID
                    grid_columns: [FR(1)]
                    grid_rows: [FR(1), FR(1)]
                    pad_row: 12
                  widgets:
                    # 弱电行
                    - label:
                        id: weak_power_label
                        text_font: noto_sans_sc_32
                        text: "弱电：功耗--W  总电量--Wh"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 0
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    # 书桌行
                    - label:
                        id: desk_power_label
                        text_font: noto_sans_sc_32
                        text: "书桌：功耗--W  总电量--Wh"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 1
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER

    # ========== 系统页面 ==========
    - id: system_page
      widgets:
        - obj:
            styles: content_container
            widgets:
              # 亮度控制条（第1行）
              - obj:
                  width: 900
                  height: 150
                  align: CENTER
                  y: -200
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: GRID
                    grid_columns: [100, FR(1)]
                    grid_rows: [FR(1)]
                    pad_column: 12
                  widgets:
                    - label:
                        text_font: noto_sans_sc_32
                        text: "亮度："
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 0
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    - obj:
                        grid_cell_column_pos: 1
                        grid_cell_row_pos: 0
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                        width: 560
                        height: 90
                        bg_opa: TRANSP
                        border_opa: TRANSP
                        widgets:
                          - slider:
                              width: 500
                              height: 40
                              radius: 20
                              align: CENTER
                              min_value: 0
                              max_value: 255
                              id: backlight_slider
                              bg_color: 0xECECEC
                              bg_opa: COVER
                              indicator:
                                radius: 20
                                bg_color: 0xFFB90B
                              knob:
                                bg_opa: TRANSP
                              on_release:
                                - light.turn_on:
                                    id: backlight
                                    brightness: !lambda return x / 255.0;
                                - lambda: id(backlight_brightness_val) = int(x);
                                - lvgl.label.update:
                                    id: backlight_bright_label
                                    text: !lambda |-
                                      static char buf[16];
                                      int percent = int(x) * 100 / 255;
                                      snprintf(buf, sizeof(buf), "%d %%", percent);
                                      return buf;
                                - homeassistant.action:
                                    action: light.turn_on
                                    data:
                                      entity_id: light.tab5_display_backlight
                                      brightness: !lambda return int(x);
                          - label:
                              id: backlight_bright_label
                              text_font: montserrat_32
                              text_color: 0x333333
                              text: "50 %"
                              align: CENTER
                              y: 2
              # 音量控制条（第2行）
              - obj:
                  width: 900
                  height: 150
                  align: CENTER
                  y: -100
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: GRID
                    grid_columns: [100, FR(1)]
                    grid_rows: [FR(1)]
                    pad_column: 12
                  widgets:
                    - label:
                        text_font: noto_sans_sc_32
                        text: "音量："
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 0
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    - obj:
                        grid_cell_column_pos: 1
                        grid_cell_row_pos: 0
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                        width: 560
                        height: 90
                        bg_opa: TRANSP
                        border_opa: TRANSP
                        widgets:
                          - slider:
                              width: 500
                              height: 40
                              radius: 20
                              align: CENTER
                              min_value: 0
                              max_value: 100
                              id: volume_slider
                              bg_color: 0xECECEC
                              bg_opa: COVER
                              indicator:
                                radius: 20
                                bg_color: 0x4A6363
                              knob:
                                bg_opa: TRANSP
                              on_release:
                                - lambda: id(volume_val) = int(x);
                                - lvgl.label.update:
                                    id: volume_label
                                    text: !lambda |-
                                      static char buf[16];
                                      snprintf(buf, sizeof(buf), "%d %%", int(x));
                                      return buf;
                          - label:
                              id: volume_label
                              text_font: montserrat_32
                              text_color: 0x333333
                              text: "50 %"
                              align: CENTER
                              y: 2
              # 系统信息区域（3行左对齐）
              - obj:
                  width: 900
                  height: 240
                  align: CENTER
                  y: 50
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: GRID
                    grid_columns: [FR(1)]
                    grid_rows: [FR(1), FR(1), FR(1)]
                    pad_row: 12
                  widgets:
                    # IP地址行
                    - label:
                        id: sys_ip_label
                        text_font: noto_sans_sc_32
                        text: "IP地址：0.0.0.0"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 0
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    # 信号行
                    - label:
                        id: sys_rssi_label
                        text_font: noto_sans_sc_32
                        text: "信号：-- dBm"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 1
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    # 运行行
                    - label:
                        id: sys_uptime_label
                        text_font: noto_sans_sc_32
                        text: "运行：--:--:--"
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 2
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
