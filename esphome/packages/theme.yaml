substitutions:
  text_font: noto_sans_sc_32
  radius: 12px
  card_bg_color: "0xFFFFFF"
  card_border_color: "0xE5E5E5"
  title_color: "0x1A4A4A"
  text_color: "0x333333"
  accent_color: "0xFF8C00"
  padding: 20px

lvgl:
  style_definitions:
    # 模块卡片（唯一有视觉样式的圆角容器）
    - id: module_card
      bg_color: $card_bg_color
      bg_opa: COVER
      border_width: 1
      border_color: $card_border_color
      border_opa: COVER
      radius: $radius
      width: 900
      pad_all: $padding
      pad_top: 18
      pad_bottom: 18
      shadow_width: 0

    - id: module_title
      text_font: $text_font
      text_color: $title_color
      bg_opa: TRANSP
      align: TOP_LEFT

    - id: module_divider
      bg_color: 0xEEEEEE
      bg_opa: COVER
      height: 1
      width: 100%

    # 设置项行：完全透明，仅用于横向布局，绝不可见任何边框/圆角
    - id: setting_row
      bg_opa: TRANSP
      border_opa: TRANSP
      border_width: 0
      radius: 0
      width: 100%
      height: 56

    - id: setting_label
      text_font: $text_font
      text_color: $text_color
      bg_opa: TRANSP