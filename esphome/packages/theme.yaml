substitutions:
  # ==========================
  # Theme colors
  # ==========================
  light_page_bg: "0xF5F5F5"
  light_card_bg: "0xFFFFFF"
  light_border: "0xE5E5E5"
  light_title: "0x1A4A4A"
  light_text: "0x333333"

  dark_page_bg: "0x121212"
  dark_card_bg: "0x1E1E1E"
  dark_border: "0x444444"
  dark_title: "0x80CBC4"
  dark_text: "0xEEEEEE"

  page_bg_color: "0xF5F5F5"
  card_bg_color: "0xFFFFFF"
  card_border_color: "0xE5E5E5"
  title_color: "0x1A4A4A"
  text_color: "0x333333"

  accent_color: "0xFF8C00"
  radius: "20px"
  padding: "12px"
  text_font: noto_sans_sc_32

lvgl:
  style_definitions:

    # 侧边栏样式
    - id: sidebar
      bg_color: $page_bg_color
      bg_opa: COVER
      border_opa: TRANSP
      pad_top: 30
      pad_left: 0
      pad_right: 0
      radius: 0
      width: 192
      height: 100%

    # 导航按钮容器样式
    - id: nav_btn_container
      bg_opa: TRANSP
      border_opa: TRANSP
      width: 160
      height: 160
      pad_all: 0

    # 导航按钮未激活样式（水平布局：icon + 文字在同一行）
    - id: nav_btn_inactivate
      bg_opa: TRANSP
      width: 150
      height: 150
      radius: 28              # 半高圆角，胶囊形底纹不超出按钮
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_all: 0

    - id: nav_btn_activate
      bg_color: 0xCCE8E7    # 选中底纹色
      bg_opa: COVER
      width: 150
      height: 150
      radius: 28
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_all: 0

    # 语音助手按钮激活样式（橙色高亮，区别于普通导航）
    - id: va_btn_activate
      bg_color: 0xFF8C00    # 橙色：突出语音助手激活态
      bg_opa: COVER
      width: 150
      height: 150
      radius: 28
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_all: 0

    # 导航图标激活样式
    # 不设置 align，由按钮的 flex 布局统一控制位置
    - id: nav_icon_activate
      text_font: extra_icon_80
      text_color: $title_color

    # 导航图标未激活样式
    - id: nav_icon_inactivate
      text_font: extra_icon_80
      text_color: 0x3F4948

    # 内容容器样式
    - id: content_container
      bg_color: $card_bg_color
      bg_opa: COVER
      text_color: 0x111111
      border_width: 0
      border_opa: TRANSP
      radius: 0
      pad_all: 0

    # 语音助手页面：状态卡片样式
    - id: va_status_card
      bg_color: $card_bg_color
      bg_opa: COVER
      border_opa: TRANSP
      radius: 24
      width: 900
      height: 180
      pad_all: 24
      shadow_opa: TRANSP

    # 语音助手页面：对话气泡样式（用户问）
    - id: va_request_bubble
      bg_color: 0xCCE8E7
      bg_opa: COVER
      border_opa: TRANSP
      radius: 24
      width: 900
      height: SIZE_CONTENT
      min_height: 80
      pad_all: 24
      shadow_opa: TRANSP
      align: CENTER

    # 语音助手页面：对话气泡样式（助手答复）
    - id: va_response_bubble
      bg_color: 0xFFE0B2
      bg_opa: COVER
      border_opa: TRANSP
      radius: 24
      width: 900
      height: SIZE_CONTENT
      min_height: 80
      pad_all: 24
      shadow_opa: TRANSP
      align: CENTER

    # ========== 模块卡片样式 ==========
    # 设置页面上每个功能模块的外边框，白色圆角矩形
    - id: module_card
      bg_color: $card_bg_color
      bg_opa: COVER
      border_width: 1
      border_color: $card_border_color
      border_opa: COVER
      radius: $radius
      width: 900                      # 固定宽度，与 content_container 适配
      pad_all: $padding               # 四周内边距 10px
      pad_top: 2                      # 顶部额外压缩，减小标题与上边框距离
      pad_bottom: 2                   # 底部额外压缩
      shadow_width: 0                 # 无阴影，扁平风格

    # ========== 小模块卡片样式 ==========
    # 设置页面上每个功能模块的外边框，白色圆角矩形
    - id: small_card
      bg_color: $card_bg_color
      bg_opa: COVER
      border_width: 1
      border_color: $card_border_color
      border_opa: COVER
      radius: $radius
      width: 450                      # 固定宽度
      pad_all: $padding               # 四周内边距 10px
      pad_top: 2                      # 顶部额外压缩，减小标题与上边框距离
      pad_bottom: 2                   # 底部额外压缩
      shadow_width: 0                 # 无阴影，扁平风格

    # ========== 模块标题样式 ==========
    # 卡片内的大标题，如"显示""声音"等
    - id: module_title
      text_font: $text_font
      text_color: $title_color
      bg_opa: TRANSP                # 透明背景，不遮挡卡片底色

    # ========== 模块内分隔线样式 ==========
    # 标题与内容之间的浅灰色细线
    - id: module_divider
      bg_color: 0xEEEEEE
      bg_opa: COVER
      height: 1
      width: 100%                     # 撑满卡片宽度

    # ========== 设置项行样式 ==========
    # 卡片内每一行设置项的容器，如"亮度 [滑块] 60%"
    # 关键：高度由内容自适应(SIZE_CONTENT)，避免固定高度导致内部滚动条
    - id: setting_row
      bg_opa: TRANSP                # 完全透明，不显示任何边框或背景
      border_opa: TRANSP            # 边框透明
      border_width: 0                 # 无边框
      radius: 0                       # 无圆角（避免LVGL默认主题加圆角）
      width: 100%
      height: SIZE_CONTENT

    # ========== 设置项标签样式 ==========
    # 行左侧的文字标签，如"亮度""音量"等
    - id: setting_label
      text_font: $text_font
      text_color: $text_color
      bg_opa: TRANSP
    # 首页时间大卡
    - id: hero_card
      bg_color: $card_bg_color
      bg_opa: COVER
      border_width: 0
      radius: 24
      pad_all: 20

    # 语音状态卡
    - id: voice_card
      bg_color: $card_bg_color
      bg_opa: COVER
      border_width: 0
      radius: 24
      width: 900
      align: CENTER
      pad_all: 24

    # 聊天气泡
    - id: message_card
      bg_color: $card_bg_color
      bg_opa: COVER
      border_width: 0
      radius: 24
      width: 800
      align: CENTER
      pad_all: 20
