substitutions:
  text_font: noto_sans_sc_32
  radius: 12px
  card_bg_color: "0xFFFFFF"
  card_border_color: "0xE5E5E5"
  title_color: "0x1A4A4A"
  text_color: "0x333333"
  accent_color: "0xFF8C00"
  padding: 20px

lvgl:
  style_definitions:
    # ========== 模块卡片（圆角矩形容器） ==========
    - id: module_card
      bg_color: $card_bg_color
      bg_opa: COVER
      border_width: 1
      border_color: $card_border_color
      border_opa: COVER
      radius: $radius
      width: 900
      pad_all: $padding
      pad_top: 18
      pad_bottom: 18
      shadow_width: 0

    # ========== 模块标题 ==========
    - id: module_title
      text_font: $text_font
      text_color: $title_color
      bg_opa: TRANSP
      align: TOP_LEFT

    # ========== 分隔线 ==========
    - id: module_divider
      bg_color: 0xEEEEEE
      bg_opa: COVER
      height: 1
      width: 100%

    # ========== 设置项行（标签+控件 左右分布） ==========
    - id: setting_row
      bg_opa: TRANSP
      width: 100%
      height: 56
      layout:
        type: FLEX
        flex_flow: ROW
        flex_align_main: SPACE_BETWEEN
        flex_align_cross: CENTER

    # ========== 设置项标签 ==========
    - id: setting_label
      text_font: $text_font
      text_color: $text_color
      bg_opa: TRANSP

    # ========== 控件容器（把 slider、label、button 等包在一起） ==========
    - id: control_group
      bg_opa: TRANSP
      layout:
        type: FLEX
        flex_flow: ROW
        flex_align_main: END
        flex_align_cross: CENTER
        pad_column: 12

