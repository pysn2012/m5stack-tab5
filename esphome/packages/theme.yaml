substitutions:
  # ==========================
  # Theme colors
  # ==========================
  light_page_bg: "0xF5F5F5"
  light_card_bg: "0xFFFFFF"
  light_border: "0xE5E5E5"
  light_title: "0x1A4A4A"
  light_text: "0x333333"

  # 深色主题：黑底白字，卡片为灰色半透明（毛玻璃观感）
  dark_page_bg: "0x121212"
  dark_card_bg: "0x3C3C3C"
  dark_border: "0x666666"
  dark_title: "0xFFFFFF"
  dark_text: "0xF0F0F0"

  page_bg_color: "0xF5F5F5"
  card_bg_color: "0xFFFFFF"
  card_border_color: "0xE5E5E5"
  title_color: "0x1A4A4A"
  text_color: "0x333333"

  accent_color: "0xFF8C00"
  radius: "20px"
  padding: "8px"
  text_font: noto_sans_sc_32

  user_message_color: "0xCCE8E7"
  assistant_message_color: "0xFFE0B2"

lvgl:
  style_definitions:

    # 侧边栏样式
    - id: sidebar
      bg_color: $page_bg_color
      bg_opa: COVER
      border_opa: TRANSP
      pad_top: 30
      pad_left: 0
      pad_right: 0
      radius: 0
      width: 192
      height: 100%

    # 导航按钮容器样式
    - id: nav_btn_container
      bg_opa: TRANSP
      border_opa: TRANSP
      width: 160
      height: 160
      pad_all: 0

    # 导航按钮未激活样式（水平布局：icon + 文字在同一行）
    - id: nav_btn_inactivate
      bg_opa: TRANSP
      width: 150
      height: 150
      radius: 28              # 半高圆角，胶囊形底纹不超出按钮
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_all: 0

    - id: nav_btn_activate
      bg_color: 0xCCE8E7    # 选中底纹色
      bg_opa: COVER
      width: 150
      height: 150
      radius: 28
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_all: 0

    # 语音助手按钮激活样式（橙色高亮，区别于普通导航）
    - id: va_btn_activate
      bg_color: 0xFF8C00    # 橙色：突出语音助手激活态
      bg_opa: COVER
      width: 150
      height: 150
      radius: 28
      border_opa: TRANSP
      shadow_opa: TRANSP
      pad_all: 0

    # 导航图标激活样式
    # 不设置 align，由按钮的 flex 布局统一控制位置
    - id: nav_icon_activate
      text_font: extra_icon_80
      text_color: $title_color

    # 导航图标未激活样式
    - id: nav_icon_inactivate
      text_font: extra_icon_80
      text_color: 0x3F4948

    # 通用透明布局容器（仅用于layout，不承担视觉）
    - id: layout_container
      bg_color: $card_bg_color
      bg_opa: COVER
      border_opa: TRANSP
      radius: 0                 # 无圆角，避免圆角处透出屏幕底色
      pad_all: 0

    # 通用卡片
    - id: card
      bg_color: $card_bg_color
      bg_opa: COVER
      border_width: 1
      border_color: $card_border_color
      border_opa: COVER
      radius: $radius
      pad_all: 5
      shadow_width: 0

    # 通用消息气泡：替代 va_request_bubble / va_response_bubble
    # 注意：不要在此设置 align —— 气泡是 flex 布局容器的子项，位置由父布局接管，
    # 设置 align 会与布局计算冲突。水平居中由父容器的 flex_align_track 实现。
    - id: message_bubble
      bg_opa: COVER
      border_width: 0
      radius: 24
      width: 900
      height: SIZE_CONTENT
      min_height: 80
      pad_all: 24
      shadow_width: 0

    # ========== 模块标题样式 ==========
    # 卡片内的大标题，如"显示""声音"等
    - id: module_title
      text_font: $text_font
      text_color: $title_color
      bg_opa: TRANSP                # 透明背景，不遮挡卡片底色

    # ========== 模块内分隔线样式 ==========
    # 标题与内容之间的浅灰色细线
    - id: module_divider
      bg_color: 0xEEEEEE
      bg_opa: COVER
      height: 1
      width: 100%                     # 撑满卡片宽度

    # ========== 设置项行样式 ==========
    # 卡片内每一行设置项的容器，如"亮度 [滑块] 60%"
    # 关键：高度由内容自适应(SIZE_CONTENT)，避免固定高度导致内部滚动条
    - id: setting_row
      bg_opa: TRANSP                # 完全透明，不显示任何边框或背景
      border_opa: TRANSP            # 边框透明
      border_width: 0                 # 无边框
      radius: 0                       # 无圆角（避免LVGL默认主题加圆角）
      width: 100%
      height: SIZE_CONTENT

    # ========== 设置项标签样式 ==========
    # 行左侧的文字标签，如"亮度""音量"等
    - id: setting_label
      text_font: $text_font
      text_color: $text_color
      bg_opa: TRANSP
