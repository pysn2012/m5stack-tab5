# 脚本定义
script:
  # 扩展导航按钮点击区域脚本
  - id: expand_nav_btn_click_area
    then:
      - lambda: |-
          std::vector<lv_obj_t*> btns = {
            id(dash_panel_btn),
            id(socket_panel_btn),
            id(light_panel_btn),
            id(voice_panel_btn)
          };
          for (auto* btn : btns) {
            lv_obj_set_ext_click_area(btn, 180);
          }

  # 更新导航栏 UI 脚本（4 个按钮：主页/插座/系统/语音）
  - id: nav_rail_update
    then:
      - lambda: |-
          const int active = id(page_num);
          lv_obj_t* buttons[] = {
              id(dash_panel_btn),
              id(socket_panel_btn),
              id(light_panel_btn),
              id(voice_panel_btn),
          };
          lv_obj_t* icons[] = {
              id(dash_btn_icon),
              id(socket_btn_icon),
              id(light_btn_icon),
              id(voice_btn_icon),
          };
          const char* icon_unchecked[] = {
              "\U000F02DC", // 客厅（沙发）
              "\U000F0905", // 插座
              "\U000F08BB", // 齿轮（轮廓）
              "\U000F05CB", // 声音助手
          };
          const char* icon_checked[] = {
              "\U000F02DC", // 客厅
              "\U000F0905", // 插座
              "\U000F0493", // 齿轮（实心）
              "\U000F05CB", // 声音助手（保持一致）
          };

          const int count = sizeof(buttons) / sizeof(buttons[0]);

          for (int i = 0; i < count; i++) {
              bool selected = (i == active);

              // 切换按钮背景样式（激活/未激活）
              lv_obj_remove_style_all(buttons[i]);
              lv_obj_add_style(buttons[i], selected ? id(nav_btn_activate) : id(nav_btn_inactivate), LV_PART_MAIN);

              // 切换图标
              lv_label_set_text(icons[i], selected ? icon_checked[i] : icon_unchecked[i]);
          }
          
          const char* page_titles[] = {
              "主页",
              "控制",
              "设置",
              "语音助手",
          };

          if (active >= 0 && active < 4) {
              lv_label_set_text(id(page_title_label), page_titles[active]);
          }

  # 同步 Home Assistant 状态脚本
  - id: sync_ha
    then:
      - logger.log: "与 Home Assistant 同步"

  # 更新室外信息标签
  - id: update_outdoor_label
    then:
      - lvgl.label.update:
          id: outdoor_temp_label
          text: !lambda |-
            static char buf[16];
            snprintf(buf, sizeof(buf), "%.1f ℃", id(outdoor_temp_val));
            return buf;
      - lvgl.label.update:
          id: outdoor_humi_label
          text: !lambda |-
            static char buf[16];
            snprintf(buf, sizeof(buf), "%.1f %%", id(outdoor_humi_val));
            return buf;
      - lvgl.label.update:
          id: outdoor_pres_label
          text: !lambda |-
            static char buf[16];
            snprintf(buf, sizeof(buf), "%.0f hPa", id(outdoor_pres_val));
            return buf;
      - lvgl.label.update:
          id: outdoor_pm25_label
          text: !lambda |-
            static char buf[16];
            snprintf(buf, sizeof(buf), "%.0f ppm", id(outdoor_pm25_val));
            return buf;

  # 更新室内信息标签
  - id: update_indoor_label
    then:
      - lvgl.label.update:
          id: indoor_temp_label
          text: !lambda |-
            static char buf[16];
            snprintf(buf, sizeof(buf), "%.1f ℃", id(indoor_temp_val));
            return buf;
      - lvgl.label.update:
          id: indoor_humi_label
          text: !lambda |-
            static char buf[16];
            snprintf(buf, sizeof(buf), "%.1f %%", id(indoor_humi_val));
            return buf;

  # 更新弱电功率标签
  - id: update_weak_power_label
    then:
      - lvgl.label.update:
          id: weak_power_value_label
          text: !lambda |-
            static char buf[16];
            snprintf(buf, sizeof(buf), "%.1f W", id(weak_power_val));
            return buf;
      - lvgl.label.update:
          id: weak_total_value_label
          text: !lambda |-
            static char buf[16];
            snprintf(buf, sizeof(buf), "%.0f Wh", id(weak_total_val));
            return buf;

  # 更新书桌功率标签
  - id: update_desk_power_label
    then:
      - lvgl.label.update:
          id: desk_power_value_label
          text: !lambda |-
            static char buf[16];
            snprintf(buf, sizeof(buf), "%.1f W", id(desk_power_val));
            return buf;
      - lvgl.label.update:
          id: desk_total_value_label
          text: !lambda |-
            static char buf[16];
            snprintf(buf, sizeof(buf), "%.0f Wh", id(desk_total_val));
            return buf;

  # 语音助手 UI 更新脚本（核心）
  - id: voice_ui_update
    then:
      - lambda: |-
          int phase = id(voice_assistant_phase);
          const char* status_text = "";
          const char* status_icon = "\U000F05CB";  // 默认声音助手图标

          switch (phase) {
            case ${voice_assist_listening_phase_id}:
              status_text = "聆听状态";
              status_icon = "\U000F0362";  // 麦克风
              break;
            case ${voice_assist_thinking_phase_id}:
              status_text = "思考状态";
              status_icon = "\U000F0064";  // 助手
              break;
            case ${voice_assist_replying_phase_id}:
              status_text = "回复状态";
              status_icon = "\U000F0E19";  // 音量高
              break;
            case ${voice_assist_error_phase_id}:
              status_text = "错误状态";
              status_icon = "\U000F0156";  // 关闭
              break;
            case ${voice_assist_muted_phase_id}:
              status_text = "静音状态";
              status_icon = "\U000F0374";  // 减号
              break;
            case ${voice_assist_not_ready_phase_id}:
              status_text = "连接中";
              status_icon = "\U000F05A9";  // WiFi 图标
              break;
            case ${voice_assist_timer_finished_phase_id}:
              status_text = "计时到点";
              status_icon = "\U000F09C8";  // 提示
              break;
            default:
              status_text = "待机状态";
              status_icon = "\U000F05CB";  // 声音助手
          }

          // 1) 更新语音页面上的状态文字 / 图标 / 用户问 / 答复
          if (id(va_status_label) != nullptr)
            lv_label_set_text(id(va_status_label), status_text);
          if (id(va_status_icon) != nullptr)
            lv_label_set_text(id(va_status_icon), status_icon);
          if (id(va_request_label) != nullptr)
            lv_label_set_text(id(va_request_label), id(text_request).state.c_str());
          if (id(va_response_label) != nullptr)
            lv_label_set_text(id(va_response_label), id(text_response).state.c_str());

          // 2) 判断是否需要切换到语音页（仅在活跃阶段 + 当前不在语音页时）
          bool need_show_voice_page = (phase == ${voice_assist_listening_phase_id} ||
                                       phase == ${voice_assist_thinking_phase_id} ||
                                       phase == ${voice_assist_replying_phase_id} ||
                                       phase == ${voice_assist_error_phase_id} ||
                                       phase == ${voice_assist_timer_finished_phase_id});
          if (need_show_voice_page && id(page_num) != 3) {
            id(prev_page_num) = id(page_num);
            id(page_num) = 3;
            id(voice_page_pending) = true;  // 标记需要后续 YAML action 切页
            id(nav_rail_update).execute();
          } else {
            id(voice_page_pending) = false;
          }

          // 3) 侧边栏语音按钮高亮：VA 活跃→橙色 / 在语音页→普通高亮 / 否则未激活
          bool va_active = (phase == ${voice_assist_listening_phase_id} ||
                            phase == ${voice_assist_thinking_phase_id} ||
                            phase == ${voice_assist_replying_phase_id} ||
                            phase == ${voice_assist_timer_finished_phase_id});
          bool on_voice_page = (id(page_num) == 3);

          lv_obj_remove_style_all(id(voice_panel_btn));
          if (va_active) {
            lv_obj_add_style(id(voice_panel_btn), id(va_btn_activate), LV_PART_MAIN);
          } else if (on_voice_page) {
            lv_obj_add_style(id(voice_panel_btn), id(nav_btn_activate), LV_PART_MAIN);
          } else {
            lv_obj_add_style(id(voice_panel_btn), id(nav_btn_inactivate), LV_PART_MAIN);
          }

      # 在 lambda 之后，用 YAML action 切换页面（不能在 lambda 里调 lv_scr_load_anim）
      - if:
          condition:
            lambda: return id(voice_page_pending);
          then:
            - lvgl.page.show: voice_page

  # ── 启动唤醒词引擎脚本 ──────────────────────────────────────
  - id: start_wake_word
    then:
      - logger.log: "★ start_wake_word: 脚本被调用"
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - logger.log: "★ start_wake_word: 启动设备端 micro_wake_word"
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - logger.log: "★ start_wake_word: 启动 HA 端流式唤醒"
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:

  # ── 停止唤醒词引擎脚本 ──────────────────────────────────────
  - id: stop_wake_word
    then:
      - logger.log: "★ stop_wake_word: 脚本被调用"
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - micro_wake_word.stop:

  # ── 根据静音开关设置 idle 或 muted 阶段 ────────────────────
  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_off: mute
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};

  # ── 返回语音助手启动前的页面 ───────────────────────────────
  # 用户在 voice_page 上读完答复后，可调用此脚本回到原页面
  - id: return_to_previous_page
    then:
      - lambda: |-
          int prev = id(prev_page_num);
          if (prev < 0 || prev > 2) prev = 0;  // 仅允许 0/1/2
          id(page_num) = prev;
          id(prev_page_num) = 3;  // 防止重复返回
          id(return_page_target) = prev;
      - script.execute: nav_rail_update
      - if:
          condition:
            lambda: return id(return_page_target) == 0;
          then:
            - lvgl.page.show: main_page
      - if:
          condition:
            lambda: return id(return_page_target) == 1;
          then:
            - lvgl.page.show: socket_page
      - if:
          condition:
            lambda: return id(return_page_target) == 2;
          then:
            - lvgl.page.show: system_page

  # 关闭屏幕（息屏）
  - id: screen_off
    then:
      - logger.log: "执行息屏..."
      - light.turn_off:
          id: backlight
          transition_length: 500ms # 平滑过渡
      - lvgl.pause:

  # 唤醒屏幕（亮屏）
  - id: screen_wakeup
    then:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "执行亮屏..."
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on:
                id: backlight
                transition_length: 300ms
  # Wi-Fi 配网脚本
  - id: connect_wifi_action
    then:
      - logger.log: "读取屏幕输入并尝试连接 Wi-Fi..."
      - wifi.configure:
          ssid: !lambda 'return lv_textarea_get_text(id(ta_wifi_ssid));'
          password: !lambda 'return lv_textarea_get_text(id(ta_wifi_pass));'
          save: true          # 保存凭据，下次重启自动连接
          timeout: 30s        # 连接超时时间
          on_connect:
            - logger.log: "Wi-Fi 连接成功！"
            # 可选：连接成功后自动关闭弹窗
            - lvgl.widget.hide: wifi_config_panel
          on_error:
            - logger.log: "Wi-Fi 连接失败，请重试"



  # 深浅主题切换
  # 深色：黑底白字，卡片灰色半透明（毛玻璃观感，LVGL 无高斯模糊，用半透明叠加模拟）
  - id: change_theme
    then:
      - lambda: |-
          bool dark = id(dark_mode);

          // ── 颜色方案 ──
          lv_color_t page_bg    = dark ? lv_color_hex(${dark_page_bg})   : lv_color_hex(${light_page_bg});
          lv_color_t card_bg    = dark ? lv_color_hex(${dark_card_bg})   : lv_color_hex(${light_card_bg});
          lv_opa_t   card_opa   = dark ? LV_OPA_70 : LV_OPA_COVER;   // 深色半透明=毛玻璃
          lv_color_t border     = dark ? lv_color_hex(${dark_border})    : lv_color_hex(${light_border});
          lv_opa_t   border_opa = dark ? LV_OPA_40 : LV_OPA_COVER;
          lv_color_t title_col  = dark ? lv_color_hex(${dark_title})     : lv_color_hex(${light_title});
          lv_color_t text_col   = dark ? lv_color_hex(${dark_text})      : lv_color_hex(${light_text});
          lv_color_t divider    = dark ? lv_color_hex(0x555555)          : lv_color_hex(0xEEEEEE);
          lv_color_t nav_act    = dark ? lv_color_hex(0x3A3A3A)          : lv_color_hex(0xCCE8E7);
          lv_color_t icon_inact = dark ? lv_color_hex(0x9E9E9E)          : lv_color_hex(0x3F4948);
          lv_color_t strong_col = dark ? lv_color_hex(0xFFFFFF)          : lv_color_hex(0x111111); // 状态栏/时间
          lv_color_t bubble_u   = dark ? lv_color_hex(0x2A4A4A)          : lv_color_hex(${user_message_color});
          lv_color_t bubble_a   = dark ? lv_color_hex(0x4A3520)          : lv_color_hex(${assistant_message_color});
          lv_color_t prefix_u   = dark ? lv_color_hex(0x80CBC4)          : lv_color_hex(0x4A6363);
          lv_color_t prefix_a   = dark ? lv_color_hex(0xFFB74D)          : lv_color_hex(0x8B5A00);
          lv_color_t body_txt   = dark ? lv_color_hex(0xF5F5F5)          : lv_color_hex(0x1A1A1A);
          lv_color_t input_bg   = dark ? lv_color_hex(0x2A2A2A)          : lv_color_hex(${light_page_bg});
          lv_color_t slider_bg  = dark ? lv_color_hex(0x424242)          : lv_color_hex(0xECECEC);
          lv_color_t sock_bg    = dark ? lv_color_hex(0x4A4A4A)          : lv_color_hex(0xE9EFEE);

          // ── 1) 屏幕背景（黑底）──
          lv_obj_set_style_bg_color(lv_scr_act(), page_bg, 0);
          lv_obj_set_style_bg_opa(lv_scr_act(), LV_OPA_COVER, 0);

          // ── 2) 更新共享样式（卡片/标题/分隔线/标签/导航）──
          lv_style_set_bg_color(id(sidebar), page_bg);
          lv_style_set_bg_color(id(layout_container), page_bg);
          lv_style_set_bg_color(id(card), card_bg);
          lv_style_set_bg_opa(id(card), card_opa);
          lv_style_set_border_color(id(card), border);
          lv_style_set_border_opa(id(card), border_opa);
          lv_style_set_text_color(id(module_title), title_col);
          lv_style_set_bg_color(id(module_divider), divider);
          lv_style_set_text_color(id(setting_label), text_col);
          lv_style_set_bg_color(id(nav_btn_activate), nav_act);
          lv_style_set_text_color(id(nav_icon_activate), title_col);
          lv_style_set_text_color(id(nav_icon_inactivate), icon_inact);

          // ── 3) 状态栏 ──
          lv_obj_set_style_bg_color(id(status_bar)->obj, page_bg, 0);
          lv_obj_set_style_bg_opa(id(status_bar)->obj, LV_OPA_COVER, 0);
          lv_obj_set_style_text_color(id(page_title_label)->obj, strong_col, 0);
          lv_obj_set_style_text_color(id(api_icon_label)->obj, strong_col, 0);
          lv_obj_set_style_text_color(id(wifi_icon_label)->obj, strong_col, 0);
          lv_obj_set_style_text_color(id(pwr_bat_icon_label)->obj, strong_col, 0);

          // ── 4) 主页时间/日期/传感器数值/预警前缀 ──
          lv_obj_set_style_text_color(id(time_label)->obj, strong_col, 0);
          lv_obj_t* text_labels[] = {
            id(date_label)->obj,
            id(outdoor_temp_label)->obj, id(outdoor_humi_label)->obj,
            id(outdoor_pres_label)->obj, id(outdoor_pm25_label)->obj,
            id(indoor_temp_label)->obj,  id(indoor_humi_label)->obj,
            id(weather_alert_prefix)->obj,
          };
          for (uint32_t i = 0; i < sizeof(text_labels)/sizeof(text_labels[0]); i++) {
            lv_obj_set_style_text_color(text_labels[i], text_col, 0);
          }

          // ── 5) 系统页数值标签 / 下拉框 / 滑块 ──
          lv_obj_set_style_text_color(id(backlight_bright_label)->obj, text_col, 0);
          lv_obj_set_style_text_color(id(volume_label)->obj, text_col, 0);
          lv_obj_t* dropdowns[] = { id(screen_off_timeout_dropdown)->obj, id(tab5_dac_output_dropdown)->obj };
          for (uint32_t i = 0; i < 2; i++) {
            lv_obj_set_style_bg_color(dropdowns[i], input_bg, 0);
            lv_obj_set_style_text_color(dropdowns[i], text_col, 0);
          }
          lv_obj_set_style_bg_color(id(backlight_slider)->obj, slider_bg, 0);
          lv_obj_set_style_bg_color(id(volume_slider)->obj, slider_bg, 0);

          // ── 6) 插座按钮（未选中底色，选中态保持橙色 accent）──
          lv_obj_t* sock_btns[] = {
            id(chuangmi_socket1_button)->obj, id(chuangmi_socket2_button)->obj,
            id(chuangmi_socket3_button)->obj, id(chuangmi_socket4_button)->obj,
          };
          for (uint32_t i = 0; i < 4; i++) {
            lv_obj_set_style_bg_color(sock_btns[i], sock_bg, LV_PART_MAIN);
          }

          // ── 7) 语音页气泡 ──
          lv_obj_set_style_bg_color(id(va_request_bubble)->obj, bubble_u, 0);
          lv_obj_set_style_bg_opa(id(va_request_bubble)->obj, dark ? LV_OPA_80 : LV_OPA_COVER, 0);
          lv_obj_set_style_bg_color(id(va_response_bubble)->obj, bubble_a, 0);
          lv_obj_set_style_bg_opa(id(va_response_bubble)->obj, dark ? LV_OPA_80 : LV_OPA_COVER, 0);
          lv_obj_set_style_text_color(id(va_request_prefix)->obj, prefix_u, 0);
          lv_obj_set_style_text_color(id(va_response_prefix)->obj, prefix_a, 0);
          lv_obj_set_style_text_color(id(va_request_label)->obj, body_txt, 0);
          lv_obj_set_style_text_color(id(va_response_label)->obj, body_txt, 0);
          lv_obj_set_style_text_color(id(va_status_label)->obj, text_col, 0);

          // ── 8) WiFi 弹窗 ──
          lv_obj_set_style_bg_color(id(wifi_config_panel)->obj, dark ? lv_color_hex(0x242424) : lv_color_hex(0xFFFFFF), 0);
          lv_obj_set_style_border_color(id(wifi_config_panel)->obj, border, 0);
          lv_obj_set_style_text_color(id(wifi_panel_title)->obj, text_col, 0);
          lv_obj_set_style_text_color(id(wifi_ssid_title)->obj, text_col, 0);
          lv_obj_set_style_text_color(id(wifi_pwd_title)->obj, text_col, 0);
          lv_obj_set_style_bg_color(id(ta_wifi_ssid)->obj, input_bg, 0);
          lv_obj_set_style_text_color(id(ta_wifi_ssid)->obj, body_txt, 0);
          lv_obj_set_style_bg_color(id(ta_wifi_pass)->obj, input_bg, 0);
          lv_obj_set_style_text_color(id(ta_wifi_pass)->obj, body_txt, 0);

          // ── 9) 通知所有对象刷新共享样式 ──
          lv_obj_report_style_change(NULL);
