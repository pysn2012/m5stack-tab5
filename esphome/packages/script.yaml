# 脚本定义
script:
  # 扩展导航按钮点击区域脚本
  - id: expand_nav_btn_click_area
    then:
      - lambda: |-
          std::vector<lv_obj_t*> btns = {
            id(dash_panel_btn),
            id(socket_panel_btn),
            id(light_panel_btn)
          };
          for (auto* btn : btns) {
            lv_obj_set_ext_click_area(btn, 180);
          }

  # 更新导航栏 UI 脚本
  - id: nav_rail_update
    then:
      - lambda: |-
          const int active = id(page_num);
          lv_obj_t* buttons[] = {
              id(dash_panel_btn),
              id(socket_panel_btn),
              id(light_panel_btn),
          };
          lv_obj_t* icons[] = {
              id(dash_btn_icon),
              id(socket_btn_icon),
              id(light_btn_icon),
          };
          lv_obj_t* labels[] = {
              id(dash_btn_label),
              id(socket_btn_label),
              id(light_btn_label),
          };
          const char* icon_unchecked[] = {
              "\U000F02DC", // 客厅
              "\U000F0905", // 插座
              "\U000F08BB", // 齿轮（轮廓）
          };
          const char* icon_checked[] = {
              "\U000F02DC", // 客厅
              "\U000F0905", // 插座
              "\U000F0493", // 齿轮
          };

          const int count = sizeof(buttons) / sizeof(buttons[0]);

          for (int i = 0; i < count; i++) {
              bool selected = (i == active);
              
              // 切换按钮背景样式（激活/未激活）
              lv_obj_remove_style_all(buttons[i]);  // 清除所有样式
              lv_obj_add_style(buttons[i], selected ? id(nav_btn_activate) : id(nav_btn_inactivate), LV_PART_MAIN);
              
              // 切换标签颜色
              lv_obj_remove_style_all(labels[i]);
              lv_obj_add_style(labels[i], selected ? id(nav_label_activate) : id(nav_label_inactivate), LV_PART_MAIN);
              
              // 切换图标
              lv_label_set_text(icons[i], selected ? icon_checked[i] : icon_unchecked[i]);
          }

  # 同步 Home Assistant 状态脚本
  - id: sync_ha
    then:
      - logger.log: "与 Home Assistant 同步"

  # 更新室外信息标签
  - id: update_outdoor_label
    then:
      - lvgl.label.update:
          id: outdoor_label
          text: !lambda |-
            static char buf[128];
            snprintf(buf, sizeof(buf), "室外：温度%.1f℃  湿度%.1f%%  气压%.1fhPa  颗粒物%.0fppm",
              id(outdoor_temp_val), id(outdoor_humi_val),
              id(outdoor_pres_val), id(outdoor_pm25_val));
            return buf;

  # 更新室内信息标签
  - id: update_indoor_label
    then:
      - lvgl.label.update:
          id: indoor_label
          text: !lambda |-
            static char buf[64];
            snprintf(buf, sizeof(buf), "室内：温度%.1f℃  湿度%.1f%%",
              id(indoor_temp_val), id(indoor_humi_val));
            return buf;

  # 更新弱电功率标签
  - id: update_weak_power_label
    then:
      - lvgl.label.update:
          id: weak_power_label
          text: !lambda |-
            static char buf[64];
            snprintf(buf, sizeof(buf), "弱电：功率%.1fW  总电量%.0fWh",
              id(weak_power_val), id(weak_total_val));
            return buf;

  # 更新书桌功率标签
  - id: update_desk_power_label
    then:
      - lvgl.label.update:
          id: desk_power_label
          text: !lambda |-
            static char buf[64];
            snprintf(buf, sizeof(buf), "书桌：功率%.1fW  总电量%.0fWh",
              id(desk_power_val), id(desk_total_val));
            return buf;
