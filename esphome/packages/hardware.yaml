# ESP32主控配置
esp32:
  board: esp32-p4-evboard
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true
    sdkconfig_options:
      CONFIG_LWIP_TCP_WND_DEFAULT: "16384"        # TCP窗口16KB，确保OTA稳定
      CONFIG_SPI_FLASH_YIELD_DURING_ERASE: "y"   # OTA擦除时不阻塞CPU
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_360: "y"
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ: "360"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "15"         # 看门狗超时15秒（网络慢时启动可能较长）

# WiFi模块配置（ESP32-C6）
esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1

# 日志配置
logger:
  level: DEBUG
  baud_rate: 115200
  hardware_uart: USB_SERIAL_JTAG
  tx_buffer_size: 2048

# PSRAM配置
psram:
  mode: hex
  speed: 200MHz

# OTA远程更新
ota:

# 安全模式（启动失败时进入）
safe_mode:
  num_attempts: 10
  boot_is_good_after: 30s

# 外部组件
external_components:
  - source:
      type: local
      path: components

# I2C总线配置
i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz

# IO扩展芯片配置 PI4IOE5V6408 - 8通道IO扩展器，用于控制电源和外设
pi4ioe5v6408:
  - id: pi4ioe1
    address: 0x43
  - id: pi4ioe2
    address: 0x44

# LDO稳压器配置
esp_ldo:
  - voltage: 2.5V
    channel: 3

# 显示屏配置 MIPI DSI接口，720x1280分辨率
display:
  - platform: mipi_dsi
    dimensions:
      height: 1280
      width: 720
    model: M5STACK-TAB5-V2
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4
    pixel_mode: 16bit
    color_order: RGB
    update_interval: never
    auto_clear_enabled: false

# 触摸屏配置 ST7123触摸控制器，支持触摸唤醒屏幕
touchscreen:
  - platform: st7123
    interrupt_pin: GPIO23
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    update_interval: never
    calibration:
      x_min: 0
      x_max: 720
      y_min: 0
      y_max: 1280
    id: touch
    on_release:
      then:
        - if:
            condition:
              light.is_off: backlight
            then:
              - light.turn_on: backlight

# 背光PWM输出
output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz

# 显示屏背光控制
light:
  - platform: monochromatic
    output: backlight_pwm
    name: "显示屏背光"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms
    on_turn_on:
      - lvgl.resume:
    on_turn_off:
      - lvgl.pause:

# 按钮配置
button:
  - platform: restart
    id: btn_restart
    name: "系统重启"

# 调试信息
debug:
