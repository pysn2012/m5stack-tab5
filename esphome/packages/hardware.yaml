# ESP32-P4 主控芯片配置
esp32:
  variant: esp32p4
  flash_size: 16MB
  engineering_sample: true                 # P4芯片版本为V1.3,属于工程样机
  cpu_frequency: 360MHz                    # 工程样机最高频率为360
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true

# ESP32-C6 WiFi 协处理器配置
esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1

# PSRAM 配置
psram:
  mode: hex
  speed: 200MHz

# 外部组件配置
external_components:
  - source:
      type: local
      path: components/           # 自定义组件目录（相对于本文件位置）

# I2C总线配置
i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz

# PI4IOE5V6408 GPIO 扩展器配置
pi4ioe5v6408:
  - id: pi4ioe1
    address: 0x43
    # 0: 输出 - WiFi天线切换（内置/外置）
    # 1: 输出 - 扬声器使能
    # 2: 输出 - 外部5V电源
    # 3: 未连接
    # 4: 输出 - LCD复位
    # 5: 输出 - 触摸面板复位
    # 6: 输出 - 摄像头复位
    # 7: 输入 - 耳机检测
  - id: pi4ioe2
    address: 0x44
    # 0: 输出 - WiFi电源
    # 1: 未连接
    # 2: 未连接
    # 3: 输出 - USB 5V电源
    # 4: 输出 - 关机脉冲
    # 5: 输出 - 快充使能（低电平有效）
    # 6: 输入 - 充电状态
    # 7: 输出 - 充电使能

# GPIO 开关配置
switch:
  # WiFi电源
  - platform: gpio
    id: wifi_power
    name: "WiFi Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 0
    restore_mode: ALWAYS_ON
  # USB 5V电源
  - platform: gpio
    id: usb_5v_power
    name: "USB Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 3
  # 快充使能（低电平有效）
  - platform: gpio
    id: quick_charge
    name: "Quick Charge"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 5
      inverted: true
  # 充电使能
  - platform: gpio
    id: charge_enable
    name: "Charge Enable"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 7
    restore_mode: ALWAYS_ON
  # WiFi天线切换（内置/外置）
  - platform: gpio
    id: wifi_antenna_int_ext
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 0
  # 扬声器使能
  - platform: gpio
    id: speaker_enable
    name: "Speaker Enable"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 1
    restore_mode: ALWAYS_ON
  # 外部5V电源
  - platform: gpio
    id: external_5v_power
    name: "External 5V Power"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 2

# LDO 稳压器配置（为触摸屏等供电）
esp_ldo:
  - voltage: 2.5V
    channel: 3

# MIPI DSI 显示屏配置
display:
  - platform: mipi_dsi
    id: main_display
    dimensions:
      height: 1280
      width: 720
    model: M5STACK-TAB5-V2
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4
    show_test_card: false
    auto_clear_enabled: false
    update_interval: never

# 触摸屏配置
touchscreen:
  - platform: st7123
    id: my_touchscreen
    i2c_id: bsp_bus
    interrupt_pin: GPIO23
    update_interval: never
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    calibration:
      x_min: 0
      x_max: 720
      y_min: 0
      y_max: 1280
    on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "触摸亮屏"
            - script.execute: screen_wakeup
          else:

# 背光 PWM 输出配置
output:
  # 背光 PWM 输出配置
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz
  # 关机脉冲
  - platform: gpio
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 4
    id: shutdown_output

# 背光亮度控制配置
light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms
    initial_state:
      brightness: "60%"

# I2S 音频总线配置
i2s_audio:
  - id: mic_bus
    i2s_lrclk_pin: GPIO29
    i2s_bclk_pin: GPIO27
    i2s_mclk_pin: GPIO30

# ES7210 音频 ADC 配置（麦克风输入）
audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

# 麦克风配置
microphone:
  - platform: i2s_audio
    id: tab5_microphone
    i2s_audio_id: mic_bus
    i2s_din_pin: GPIO28
    sample_rate: 16000
    bits_per_sample: 16bit
    adc_type: external

# ES8388 音频 DAC 配置（扬声器输出）
audio_dac:
  - platform: es8388
    id: es8388_dac