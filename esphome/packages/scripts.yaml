script:
  # 扩展导航按钮点击区域脚本
  # 为导航按钮扩展可点击区域，使图标附近的触摸也能被识别
  # 提升侧边导航栏在小触摸目标上的可用性
  - id: expand_nav_btn_click_area
    then:
      - lambda: |-
          std::vector<lv_obj_t*> btns = {
            id(dash_panel_btn),
            id(light_panel_btn)
          };
          for (auto* btn : btns) {
            lv_obj_set_ext_click_area(btn, 180);
          }

  # 更新导航栏 UI 脚本
  # 根据当前页面选择更新导航栏状态：设置选中按钮的选中状态、
  # 更新图标为激活/未激活样式、应用相应的标签样式（激活/未激活颜色）
  - id: nav_rail_update
    then:
      - lambda: |-
          const int active = id(page_num);
          lv_obj_t* buttons[] = { 
              id(dash_panel_btn), 
              id(light_panel_btn), 
          };
          lv_obj_t* icons[] = { 
              id(dash_btn_icon), 
              id(light_btn_icon), 
          };
          lv_obj_t* labels[] = { 
              id(dash_btn_label), 
              id(light_btn_label), 
          };
          const char* icon_unchecked[] = {
              "\U000F0A1D", // 仪表盘（轮廓）
              "\U000F0336", // 灯泡（轮廓）
              "\U000F0F55", // 温度计
          };
          const char* icon_checked[] = {
              "\U000F056E", // 仪表盘
              "\U000F0335", // 灯泡
              "\U000F0F54", // 温度计
          };

          const int count = sizeof(buttons) / sizeof(buttons[0]);
          
          // 更新按钮 UI 状态
          for (int i = 0; i < count; i++) {
              if (i == id(page_num)) {
                lv_obj_add_state(buttons[i], LV_STATE_CHECKED);
              } else {
                lv_obj_clear_state(buttons[i], LV_STATE_CHECKED);
              }
              bool selected = (i == active);
              lv_obj_add_style(labels[i], selected ? id(nav_label_activate) : id(nav_label_inactivate), LV_PART_MAIN);
              lv_label_set_text(icons[i], selected ? icon_checked[i] : icon_unchecked[i]);
          }
    
  # 同步 Home Assistant 状态脚本
  # 当 UI 绘制在屏幕上时，同步 Home Assistant 实体状态到 LVGL UI
  - id: sync_ha
    then:
      - logger.log: "与 Home Assistant 同步"

  # 绘制调色板脚本
  # 在画布控件上绘制圆形 HSV 色轮
  # 此 lambda 从角度计算色相，从到中心的距离计算饱和度，
  # 将 HSV 转换为 RGB 并设置每个画布像素
  - id: draw_color_palette
    then:
      - lambda: |-
          const int W = 320;
          const int H = 320;
          const int cx = W / 2;
          const int cy = H / 2;
          const int radius = 160;

          auto canvas = id(color_palette_canvas);

          // HSV 转 RGB 辅助函数
          auto hsv_to_rgb = [](float h, float s, float v) -> lv_color_t {
            float r, g, b;

            int i = (int)(h / 60.0f) % 6;
            float f = h / 60.0f - i;
            float p = v * (1.0f - s);
            float q = v * (1.0f - f * s);
            float t = v * (1.0f - (1.0f - f) * s);

            switch (i) {
              case 0: r=v; g=t; b=p; break;
              case 1: r=q; g=v; b=p; break;
              case 2: r=p; g=v; b=t; break;
              case 3: r=p; g=q; b=v; break;
              case 4: r=t; g=p; b=v; break;
              case 5: r=v; g=p; b=q; break;
            }

            uint8_t R = (uint8_t)(r * 255);
            uint8_t G = (uint8_t)(g * 255);
            uint8_t B = (uint8_t)(b * 255);

            return lv_color_make(R, G, B);
          };

          // 绘制 HSV 色轮
          for (int y = 0; y < H; y++) {
            for (int x = 0; x < W; x++) {

              int dx = x - cx;
              int dy = y - cy;
              int dist2 = dx*dx + dy*dy;

              if (dist2 > radius * radius) continue;

              float angle = atan2f(dy, dx);  // -π ~ π
              float hue = fmodf((angle + M_PI) * 180.0f / M_PI + 180.0f, 360.0f);

              float dist = sqrtf(dist2);  // 0 ~ 160
              float sat = dist / radius;  // 0.0 ~ 1.0

              float val = 1.0f;  // 固定亮度

              lv_color_t c = hsv_to_rgb(hue, sat, val);
              lv_canvas_set_px(canvas, x, y, c, LV_OPA_COVER);
            }
          };

  # 绘制调色板指示器脚本
  # 使用对象控件在调色板上绘制自定义"指示器"
  # 根据位置计算选中的颜色，同时：
  # 1. 设置对象的背景颜色
  # 2. 将 r, g, b 值分别存储在全局变量中
  - id: draw_color_palette_indicator
    # 使小型可拖动指示器响应调色板上的触摸/移动事件
    # 回调计算指示器位置，将其限制在调色板半径内，
    # 将 (x,y) 位置转换为 HSV 颜色，再转换为 RGB，
    # 然后更新指示器背景和全局 RGB 变量，用于发送颜色到 Home Assistant
    then:
      - lambda: |-
          lv_obj_add_event_cb(id(color_palette_indicator), [](lv_event_t * e){
            lv_obj_t * obj = static_cast<lv_obj_t*>(lv_event_get_target(e));

            lv_indev_t * indev = lv_indev_get_act();
            if(indev == NULL)  return;

            lv_point_t vect;
            lv_indev_get_vect(indev, &vect);

            lv_coord_t x = lv_obj_get_x_aligned(obj) + vect.x;
            lv_coord_t y = lv_obj_get_y_aligned(obj) + vect.y;

            int radius = 160;

            float angle = atan2f(y, x);

            if( x * x + y * y > radius * radius ){
                x = cosf(angle) * radius;
                y = sinf(angle) * radius;
            }

            float hue, saturation, dist, value;

            hue = angle * 180.0f / M_PI;

            if (hue < 0) hue += 360.0f;

            dist = sqrtf( x * x + y * y );

            saturation = dist / radius;

            if (saturation > 1) saturation = 1;

            value = 1.0f;

            auto hsv_to_rgb888 = [](float h, float s, float v,
              uint8_t &r, uint8_t &g, uint8_t &b){
                float c = v * s;
                float h_prime = h / 60.0f;
                float x = c * (1 - fabsf(fmodf(h_prime, 2) - 1));
                float m = v - c;

                float r1=0, g1=0, b1=0;
                if(h_prime >=0 && h_prime <1){ r1=c; g1=x; b1=0; }
                else if(h_prime >=1 && h_prime <2){ r1=x; g1=c; b1=0; }
                else if(h_prime >=2 && h_prime <3){ r1=0; g1=c; b1=x; }
                else if(h_prime >=3 && h_prime <4){ r1=0; g1=x; b1=c; }
                else if(h_prime >=4 && h_prime <5){ r1=x; g1=0; b1=c; }
                else{ r1=c; g1=0; b1=x; }

                r = (uint8_t)((r1 + m) * 255);
                g = (uint8_t)((g1 + m) * 255);
                b = (uint8_t)((b1 + m) * 255);
            };

            uint8_t r, g, b;
            hsv_to_rgb888(hue, saturation, value, r, g, b);

            lv_color_t update_color = lv_color_make(r, g, b);

            lv_obj_set_pos(obj, x, y);

            // 设置指示器背景颜色
            lv_obj_set_style_bg_color(obj, update_color, LV_STATE_DEFAULT);

            // 为滑块设置合适的颜色（类似 Home Assistant 风格）
            float brightness = 0.299 * r + 0.587 * g + 0.114 * b;

            // 如果太接近白色，使用灰色替代
            if (brightness > 235) {
                lv_obj_set_style_bg_color(id(rgb_light_slider), lv_color_hex(0xE1E1E1), LV_PART_INDICATOR);
                lv_obj_set_style_bg_color(id(rgb_light_slider), lv_color_hex(0xF9F9F9), LV_PART_MAIN);
            } else {
              lv_obj_set_style_bg_color(id(rgb_light_slider), update_color, LV_PART_INDICATOR);
              // 渐变背景
              float factor = 0.85;
              uint8_t bg_r = r + (255 - r) * factor;
              uint8_t bg_g = g + (255 - g) * factor;
              uint8_t bg_b = b + (255 - b) * factor;
              lv_color_t bar_bg = lv_color_make(bg_r, bg_g, bg_b);
              lv_obj_set_style_bg_color(id(rgb_light_slider), bar_bg, LV_PART_MAIN);
            }

            // 设置当前灯光颜色
            id(light_r) = r;
            id(light_g) = g;
            id(light_b) = b;

          }, LV_EVENT_PRESSING, NULL);
    
  # 移动调色板指示器脚本
  # 此脚本读取当前输入设备的触摸坐标，计算相对于颜色画布的局部位置，
  # 将位置限制在圆形调色板半径内，将位置转换为 HSV（色相/饱和度）再转换为 RGB，
  # 更新指示器位置和背景颜色，并将结果 R/G/B 值存储到全局变量中，
  # 用于发送选中的颜色到 Home Assistant
  - id: move_color_palette_indicator
    then:
      - lambda: |-
          lv_indev_t * indev = lv_indev_get_act();
          if(indev == NULL)  return;

          lv_point_t p;
          lv_indev_get_point(indev, &p);

          lv_area_t area;
          lv_obj_get_coords(id(color_palette_canvas), &area);
          
          int radius = 160;

          int local_x = p.x - area.x1 - radius;
          int local_y = p.y - area.y1 - radius;

          float angle = atan2f(local_y, local_x);

          // 将点击区域限制在圆内
          if ( local_x * local_x + local_y * local_y > radius * radius ) {
              local_x = cosf(angle) * radius;
              local_y = sinf(angle) * radius;
          }

          float hue, saturation, dist, value;

          hue = angle * 180.0f / M_PI;

          if (hue < 0) hue += 360.0f;

          dist = sqrtf( local_x * local_x + local_y * local_y );

          saturation = dist / radius;

          if (saturation > 1) saturation = 1;

          value = 1.0f;

          auto hsv_to_rgb888 = [](float h, float s, float v,
            uint8_t &r, uint8_t &g, uint8_t &b){
              float c = v * s;
              float h_prime = h / 60.0f;
              float x = c * (1 - fabsf(fmodf(h_prime, 2) - 1));
              float m = v - c;

              float r1=0, g1=0, b1=0;
              if(h_prime >=0 && h_prime <1){ r1=c; g1=x; b1=0; }
              else if(h_prime >=1 && h_prime <2){ r1=x; g1=c; b1=0; }
              else if(h_prime >=2 && h_prime <3){ r1=0; g1=c; b1=x; }
              else if(h_prime >=3 && h_prime <4){ r1=0; g1=x; b1=c; }
              else if(h_prime >=4 && h_prime <5){ r1=x; g1=0; b1=c; }
              else{ r1=c; g1=0; b1=x; }

              r = (uint8_t)((r1 + m) * 255);
              g = (uint8_t)((g1 + m) * 255);
              b = (uint8_t)((b1 + m) * 255);
          };

          uint8_t r, g, b;
          hsv_to_rgb888(hue, saturation, value, r, g, b);

          lv_color_t update_color = lv_color_make(r, g, b);

          lv_obj_set_pos(id(color_palette_indicator), local_x, local_y);

          lv_obj_set_style_bg_color(id(color_palette_indicator), update_color, LV_STATE_DEFAULT);

          // 为滑块设置合适的颜色（类似 Home Assistant 风格）
          float brightness = 0.299 * r + 0.587 * g + 0.114 * b;

          // 如果太接近白色，使用灰色替代
          if (brightness > 235) {
              lv_obj_set_style_bg_color(id(rgb_light_slider), lv_color_hex(0xE1E1E1), LV_PART_INDICATOR);
              lv_obj_set_style_bg_color(id(rgb_light_slider), lv_color_hex(0xF9F9F9), LV_PART_MAIN);
          } else {
            lv_obj_set_style_bg_color(id(rgb_light_slider), update_color, LV_PART_INDICATOR);
            // 渐变背景
            float factor = 0.85;
            uint8_t bg_r = r + (255 - r) * factor;
            uint8_t bg_g = g + (255 - g) * factor;
            uint8_t bg_b = b + (255 - b) * factor;
            lv_color_t bar_bg = lv_color_make(bg_r, bg_g, bg_b);
            lv_obj_set_style_bg_color(id(rgb_light_slider), bar_bg, LV_PART_MAIN);
          }
          

          // 设置当前灯光颜色
          id(light_r) = r;
          id(light_g) = g;
          id(light_b) = b;

  # 同步调色板到 Home Assistant 脚本
  - id: sync_ha_palette
    parameters:
      color_str: string
    then:
      - lambda: |-
          ESP_LOGI("sync_ha_palette", "收到颜色: %s", color_str.c_str());
          
          if (color_str.empty() || color_str == "None" 
              || color_str == "null" || color_str == "unknown" 
              || color_str == "unavailable" ) {
            lv_obj_set_pos(id(color_palette_indicator), 0, 0);
            lv_obj_set_style_bg_color(id(color_palette_indicator), lv_color_hex(0xFFFFFF), LV_STATE_DEFAULT);
            lv_obj_set_style_bg_color(id(rgb_light_slider), lv_color_hex(0xECECEC), LV_PART_MAIN);
            return;
          }
          int r, g, b;
          // 移除字符串中的 '(' 和 ')'，获取 r, g, b 值
          color_str.erase(std::remove(color_str.begin(), color_str.end(), '('), color_str.end());
          color_str.erase(std::remove(color_str.begin(), color_str.end(), ')'), color_str.end());
          sscanf(color_str.c_str(), "%d,%d,%d", &r, &g, &b);
          lv_color_t update_color = lv_color_make(r, g, b);
          lv_color_hsv_t hsv = lv_color_rgb_to_hsv(r, g, b);
          int radius = 160;

          float rad = hsv.h * M_PI / 180.0f;
          float s = hsv.s / 100.0f;

          int x = (int)(cosf(rad) * s * radius);
          int y = (int)(sinf(rad) * s * radius);

          lv_obj_set_pos(id(color_palette_indicator), x, y);
          // 设置指示器背景颜色
          lv_obj_set_style_bg_color(id(color_palette_indicator), update_color, LV_STATE_DEFAULT);
          
          // 为滑块设置合适的颜色（类似 Home Assistant 风格）
          float brightness = 0.299 * r + 0.587 * g + 0.114 * b;

          // 如果太接近白色，使用灰色替代
          if (brightness > 235) {
              lv_obj_set_style_bg_color(id(rgb_light_slider), lv_color_hex(0xE1E1E1), LV_PART_INDICATOR);
              lv_obj_set_style_bg_color(id(rgb_light_slider), lv_color_hex(0xF9F9F9), LV_PART_MAIN);
          } else {
            lv_obj_set_style_bg_color(id(rgb_light_slider), update_color, LV_PART_INDICATOR);
            // 渐变背景
            float factor = 0.85;
            uint8_t bg_r = r + (255 - r) * factor;
            uint8_t bg_g = g + (255 - g) * factor;
            uint8_t bg_b = b + (255 - b) * factor;
            lv_color_t bar_bg = lv_color_make(bg_r, bg_g, bg_b);
            lv_obj_set_style_bg_color(id(rgb_light_slider), bar_bg, LV_PART_MAIN);
          }
          
          id(light_r) = r;
          id(light_g) = g;
          id(light_b) = b;