# ESPHOME 基础配置
esphome:
  name: tab5-ha-hmi-ew
  friendly_name: M5Stack Tab5
  min_version: 2025.12.0

# ESP32-P4 主控芯片配置
esp32:
  variant: esp32p4
  flash_size: 16MB
  engineering_sample: true                 # P4芯片版本为V1.3,属于工程样机
  cpu_frequency: 360MHz                    # 工程样机最高频率为360
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true

# ESP32-C6 WiFi 协处理器配置
esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1

# 日志配置
logger:
  hardware_uart: USB_SERIAL_JTAG
  level: DEBUG
  logs:
    sensor: INFO
    binary_sensor: INFO

# PSRAM 配置
psram:
  mode: hex
  speed: 200MHz

# Home Assistant API 配置
api:
  on_client_connected: 
    then:
      - lvgl.widget.show: api_icon_label
  on_client_disconnected: 
    then:
      - lvgl.widget.hide: api_icon_label

# 外部组件配置
external_components:
  - source:
      type: local
      path: components/           # 自定义组件目录（相对于本文件位置）
    
# OTA 远程更新配置
ota:
  platform: esphome

# WiFi 网络配置
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect: 
    then:
      - lvgl.widget.show: wifi_icon_label
  on_disconnect: 
    then:
      - lvgl.widget.hide: wifi_icon_label

# I2C 总线配置
i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz

# PI4IOE5V6408 GPIO 扩展器配置
pi4ioe5v6408:
  - id: pi4ioe1
    address: 0x43
    # 0: 输出 - WiFi天线切换（内置/外置）
    # 1: 输出 - 扬声器使能
    # 2: 输出 - 外部5V电源
    # 3: 未连接
    # 4: 输出 - LCD复位
    # 5: 输出 - 触摸面板复位
    # 6: 输出 - 摄像头复位
    # 7: 输入 - 耳机检测
  - id: pi4ioe2
    address: 0x44
    # 0: 输出 - WiFi电源
    # 1: 未连接
    # 2: 未连接
    # 3: 输出 - USB 5V电源
    # 4: 输出 - 关机脉冲
    # 5: 输出 - 快充使能（低电平有效）
    # 6: 输入 - 充电状态
    # 7: 输出 - 充电使能

# GPIO 开关配置
switch:
  # WiFi电源
  - platform: gpio
    id: wifi_power
    name: "WiFi Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 0
    restore_mode: ALWAYS_ON
  # USB 5V电源
  - platform: gpio
    id: usb_5v_power
    name: "USB Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 3
  # 快充使能（低电平有效）
  - platform: gpio
    id: quick_charge
    name: "Quick Charge"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 5
      inverted: true
  # 充电使能
  - platform: gpio
    id: charge_enable
    name: "Charge Enable"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 7
    restore_mode: ALWAYS_ON
  # WiFi天线切换（内置/外置）
  - platform: gpio
    id: wifi_antenna_int_ext
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 0
  # 扬声器使能
  - platform: gpio
    id: speaker_enable
    name: "Speaker Enable"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 1
    restore_mode: ALWAYS_ON
  # 外部5V电源
  - platform: gpio
    id: external_5v_power
    name: "External 5V Power"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 2

# 二进制传感器配置
binary_sensor:
  # 充电状态
  - platform: gpio
    id: charging
    name: "Charging Status"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 6
      mode: INPUT_PULLDOWN
    on_press:
      - lambda: id(battery_percent).update();
    on_release:
      - lambda: id(battery_percent).update();
  # 耳机检测
  - platform: gpio
    id: headphone_detect
    name: "Headphone Detect"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 7

# 选择器配置, DAC输出需要手动或通过自动化切换到 LINE1 以使用板载扬声器
select:
  # ES8388 音频编解码器配置，支持输出选择
  - platform: es8388
    dac_output:
      id: es8388_dac_output
      internal: true
  - platform: template
    name: "Tab5 DAC Output"
    id: tab5_dac_output_template
    options:
      - "LINE1"
      - "LINE2"
      - "BOTH"
    restore_value: true
    optimistic: true
    on_value:
      then:
        - select.set:
            id: es8388_dac_output
            option: !lambda "return x;"
  # WiFi 天线切换
  - platform: template
    id: wifi_antenna_select
    name: "WiFi Antenna"
    options:
      - "Internal"    # 内置天线
      - "External"    # 外置天线
    optimistic: true
    on_value:
      - if:
          condition:
            lambda: return i == 0;    # 如果选择了第0项（Internal）
          then:
            - switch.turn_off: wifi_antenna_int_ext   # 关闭外置天线开关
          else:
            - switch.turn_on: wifi_antenna_int_ext    # 打开外置天线开关

# 传感器配置
sensor:
  # INA226 电池电压电流传感器
  - platform: ina226
    address: 0x41
    adc_averaging: 16
    max_current: 8.192A
    shunt_resistance: 0.005ohm
    bus_voltage:
      id: battery_voltage
      name: Battery Voltage
    current:
      id: battery_current
      name: Battery Current
      # 正值表示放电，负值表示充电
  
  # Home Assistant 环境传感器
  - platform: homeassistant
    id: cur_temp
    entity_id: sensor.xiamen_temperature
    on_value:
      - lvgl.label.update:
          id: temp_label
          text:
            format: "%.1f °C"
            args: [ 'x' ]
  
  - platform: homeassistant
    id: cur_humi
    entity_id: sensor.xiamen_humidity
    on_value:
      - lvgl.label.update:
          id: humi_label
          text:
            format: "%.1f %%"
            args: [ 'x' ]

  - platform: homeassistant
    id: cur_pres
    entity_id: sensor.xiamen_atmospheric_pressure
    on_value:
      - lvgl.label.update:
          id: pres_label
          text:
            format: "%.2f hPa"
            args: [ 'x' ]
            
  - platform: homeassistant
    id: cur_co2
    entity_id: sensor.xiamen_pm25
    on_value:
      - lvgl.label.update:
          id: co2_label
          text:
            format: "%.0f ppm"
            args: [ 'x' ]

  # 电池电量百分比计算（基于电压）
  - platform: template
    id: battery_percent
    name: "Battery Percentage"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    lambda: |-
      float voltage = id(battery_voltage).state;
      float min_voltage = 6.0;
      float max_voltage = 8.4;
      
      if (voltage < 5.0) return 0.0;
      if (voltage <= min_voltage) return 0.0;
      if (voltage >= max_voltage) return 100.0;
      
      float percent = ((voltage - min_voltage) / (max_voltage - min_voltage)) * 100.0;
      return percent;
    update_interval: 30s
    on_value:
      - lvgl.label.update:
          id: pwr_bat_icon_label
          text: !lambda |-
            float voltage = id(battery_voltage).state;
            float current = id(battery_current).state;
            bool charging_pin = id(charging).state;
            int level = int(x);
            
            // 未检测到电池
            if (voltage < 5.0) {
              return "\U000F06A5";  // 电源插头图标
            }
            
            // 根据充电状态选择图标集
            bool is_charging = (current < -0.1 || charging_pin);
            
            // 使用 level/10 分档：0-9=0, 10-19=1, 20-29=2, 等等
            int bracket = level / 10;
            
            if (is_charging) {
              // 充电状态图标
              switch (bracket) {
                case 10:
                case 9:
                  return "\U000F0085";  // 充电-100%
                case 8:
                  return "\U000F008B";  // 充电-90%
                case 7:
                  return "\U000F008A";  // 充电-80%
                case 6:
                  return "\U000F089E";  // 充电-70%
                case 5:
                  return "\U000F0089";  // 充电-60%
                case 4:
                  return "\U000F089D";  // 充电-50%
                case 3:
                  return "\U000F0088";  // 充电-40%
                case 2:
                  return "\U000F0087";  // 充电-30%
                case 1:
                  return "\U000F0086";  // 充电-20%
                default:
                  return "\U000F089C";  // 充电-10%
              }
            } else {
              // 普通电池图标
              switch (bracket) {
                case 10:
                case 9:
                  return "\U000F0079";  // 电池-100%
                case 8:
                  return "\U000F0082";  // 电池-90%
                case 7:
                  return "\U000F0081";  // 电池-80%
                case 6:
                  return "\U000F0080";  // 电池-70%
                case 5:
                  return "\U000F007F";  // 电池-60%
                case 4:
                  return "\U000F007E";  // 电池-50%
                case 3:
                  return "\U000F007D";  // 电池-40%
                case 2:
                  return "\U000F007C";  // 电池-30%
                case 1:
                  return "\U000F007B";  // 电池-20%
                default:
                  return "\U000F007A";  // 电池-10%
              }
            }

# 触摸屏配置
touchscreen:
  - platform: st7123
    id: my_touchscreen
    i2c_id: bsp_bus
    interrupt_pin: GPIO23
    update_interval: never
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    calibration:
      x_min: 0
      x_max: 720
      y_min: 0
      y_max: 1280
    on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL 恢复中"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: backlight

# LDO 稳压器配置（为触摸屏等供电）
esp_ldo:
  - voltage: 2.5V
    channel: 3

# MIPI DSI 显示屏配置
display:
  - platform: mipi_dsi
    id: main_display
    dimensions:
      height: 1280
      width: 720
    model: M5STACK-TAB5-V2
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4
    show_test_card: false
    auto_clear_enabled: false
    update_interval: never
    #rotation: 270

# 背光 PWM 输出配置
output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz

# 背光亮度控制配置
light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms
    initial_state:
      brightness: "50%"

# I2S 音频总线配置
i2s_audio:
  - id: mic_bus
    i2s_lrclk_pin: GPIO29
    i2s_bclk_pin: GPIO27
    i2s_mclk_pin: GPIO30

# ES7210 音频 ADC 配置（麦克风输入）
audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

# 麦克风配置
microphone:
  - platform: i2s_audio
    id: tab5_microphone
    i2s_din_pin: GPIO28
    sample_rate: 16000
    bits_per_sample: 16bit
    adc_type: external

# ES8388 音频 DAC 配置（扬声器输出）
audio_dac:
  - platform: es8388
    id: es8388_dac

# 扬声器配置
speaker:
  - platform: i2s_audio
    id: tab5_speaker
    i2s_dout_pin: GPIO26
    audio_dac: es8388_dac
    dac_type: external
    channel: mono
    buffer_duration: 100ms
    bits_per_sample: 16bit
    sample_rate: 48000

# 媒体播放器配置
media_player:
  - platform: speaker
    name: tab5_media_player
    id: speaker_player
    announcement_pipeline:
      speaker: tab5_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1

# 时间同步配置（Home Assistant + RX8130 实时时钟）
time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        rx8130.write_time:
  - platform: rx8130
    id: rx8130_time
    update_interval: never
    on_time:
      # 就绪后每3秒更新一次
      - seconds: /3
        then:
          - lvgl.label.update:
              id: time_label
              text: !lambda |-
                auto t = id(ha_time).now();
                return t.strftime("%H:%M").c_str();

          - lvgl.label.update:
              id: date_label
              text: !lambda |-
                auto t = id(ha_time).now();
                return t.strftime("%Y-%m-%d %a").c_str();

# 文本传感器配置（同步 Home Assistant 设备状态）
text_sensor:
  # 背光亮度值同步（从 HA 获取当前亮度）
  - platform: homeassistant
    id: backlight_brightness
    entity_id: light.tab5_display_backlight
    attribute: brightness
    on_value:
      - lvgl.slider.update:
          id: backlight_slider
          value: !lambda |-
            if (x.empty() || x == "None" || x == "null" || x == "unknown" || x == "unavailable") 
                return 0;
            return std::stoi(x);
      - lvgl.label.update:
          id: backlight_bright_label
          text: !lambda |-
            if ( x.empty() || x == "None" || x == "null" ) return "off";
            else if ( x == "unknown" || x == "unavailable" ) return "unavailable";
            else {
              int percent = std::stoi(x) * 100 / 255;
              return std::to_string(percent) + " %";
            }

  # 设备端背光亮度值（用于同步到 HA）
  - platform: template
    id: device_backlight_brightness
    name: "Device Backlight Brightness"
    update_interval: never
    lambda: |-
      return std::to_string(id(backlight_brightness_val));

# 字体配置
font:
  # Material Design 图标字体（48px）
  - file: "https://raw.githubusercontent.com/Templarian/MaterialDesign-Webfont/master/fonts/materialdesignicons-webfont.ttf"
    id: extra_icon
    size: 48
    bpp: 4
    # 图标列表：https://pictogrammers.com/library/mdi/
    glyphs: [
      "\U000F050F", # 温度计
      "\U000F058E", # 湿度百分比
      "\U000F0F30", # 雾霾天气
      "\U000F056E", # 仪表盘
      "\U000F0A1D", # 仪表盘（轮廓）
      "\U000F0335", # 灯泡
      "\U000F0336", # 灯泡（轮廓）
      "\U000F0F54", # 室内温度计
      "\U000F0F55", # 室内温度计（轮廓）
      "\U000F001B", # 空调
      "\U000F0493", # 齿轮
      "\U000F08BB", # 齿轮（轮廓）
      "\U000F0142", # 右箭头
      "\U000F1805", # 荧光灯管（轮廓）
      "\U000F1804", # 荧光灯管
      "\U000F18DE", # 吸顶灯（轮廓）
      "\U000F18DD", # 吸顶灯
      "\U000F0425", # 电源
      "\U000F07E4", # CO2
      "\U000F029A", # 气压表（用于显示 hPa 气压）
      "\U000F05A9", # WiFi
      "\U000F007A", # 电池-10%
      "\U000F007B", # 电池-20%
      "\U000F007C", # 电池-30%
      "\U000F007D", # 电池-40%
      "\U000F007E", # 电池-50%
      "\U000F007F", # 电池-60%
      "\U000F0080", # 电池-70%
      "\U000F0081", # 电池-80%
      "\U000F0082", # 电池-90%
      "\U000F0079", # 电池-100%
      "\U000F089C", # 充电-10%
      "\U000F0086", # 充电-20%
      "\U000F0087", # 充电-30%
      "\U000F0088", # 充电-40%
      "\U000F089D", # 充电-50%
      "\U000F0089", # 充电-60%
      "\U000F089E", # 充电-70%
      "\U000F008A", # 充电-80%
      "\U000F008B", # 充电-90%
      "\U000F0085", # 充电-100%
      "\U000F06A5", # 电源插头（表示无电池，使用 USB-C 供电）
      "\U000F109B", # Home Assistant API
      "\U000F0064", # 助手
      "\U000F0004", # 账户
      "\U000F0156", # 关闭
      "\U000F0415", # 加号
      "\U000F0374", # 减号
      "\U000F00DF", # 亮度调节
      "\U000F03D8", # 调色板
    ]

  # Material Design 图标字体（64px，用于较大图标）
  - file: "https://raw.githubusercontent.com/Templarian/MaterialDesign-Webfont/master/fonts/materialdesignicons-webfont.ttf"
    id: extra_icon_64
    size: 64
    bpp: 4
    glyphs: [
      "\U000F0D80", # 楼层1
    ]
  
  # Montserrat 字体（96px，用于时间显示）
  - file: gfonts://Montserrat@600
    id: montserrat_96
    size: 96
    bpp: 4

  # Noto Sans SC 中文字体（32px）
  - file: gfonts://Noto+Sans+SC
    id: noto_sans_sc_32
    size: 32
    bpp: 4
    glyphs: "仪表盘亮度"
    ignore_missing_glyphs: true

  # Noto Sans SC 中文字体（48px）
  - file: gfonts://Noto+Sans+SC
    id: noto_sans_sc_48
    size: 48
    bpp: 4
    glyphs: "仪表盘亮度"
    ignore_missing_glyphs: true

# LVGL 图形库配置
lvgl:
  rotation: 270
  on_boot:
    - light.turn_on: backlight
    - rx8130.read_time:
    - script.execute: expand_nav_btn_click_area    # 扩展导航按钮点击区域
    - script.execute: nav_rail_update              # 更新导航栏 UI
    - script.execute: sync_ha                      # 同步 Home Assistant 状态

  byte_order: little_endian
  color_depth: 16
  
  # LVGL 样式定义  
  style_definitions:
    # 侧边栏样式
    - id: sidebar
      bg_color: 0xE9EFEE
      bg_opa: COVER
      border_opa: TRANSP
      pad_top: 30
      pad_left: 0
      pad_right: 0
      radius: 0
      width: 192
      height: 100%

    # 导航按钮容器样式
    - id: nav_btn_container
      bg_opa: TRANSP
      border_opa: TRANSP
      width: 180
      height: 150

    # 导航按钮未激活样式
    - id: nav_btn_inactivate
      bg_opa: TRANSP
      align: CENTER
      width: 112
      height: 64
      radius: 48
      border_opa: TRANSP
      shadow_opa: TRANSP

    # 导航图标激活样式
    - id: nav_icon_activate
      align: CENTER
      text_font: extra_icon
      text_color: 0x4A6363

    # 导航图标未激活样式
    - id: nav_icon_inactivate
      align: CENTER
      text_font: extra_icon
      text_color: 0x3F4948

    # 导航标签激活样式
    - id: nav_label_activate
      align: BOTTOM_MID
      text_color: 0x4A6363
      text_font: noto_sans_sc_32

    # 导航标签未激活样式
    - id: nav_label_inactivate
      align: BOTTOM_MID
      text_color: 0x3F4948
      text_font: noto_sans_sc_32

    # 内容容器样式
    - id: content_container
      align: CENTER
      bg_opa: COVER
      border_opa: TRANSP
      height: 100%
      width: 1080
      x: 96
      pad_top: 120
      pad_left: 30

    # 小型控制卡片样式（与 Home Assistant 风格匹配）
    - id: card_sm
      width: 400
      height: 112
      radius: 24

    # 小卡片图标按钮样式
    - id: card_sm_icon_btn
      width: 72
      height: 72
      radius: 50
      bg_color: 0xECECEC
      shadow_opa: TRANSP
      align: LEFT_MID

    # 小卡片主标签样式
    - id: card_sm_main_label
      text_font: montserrat_32
      align: TOP_LEFT
      x: 92
      y: 5
      
    # 小卡片副标签样式
    - id: card_sm_sub_label
      text_font: montserrat_24
      align: BOTTOM_LEFT
      x: 92
    
    # 中型卡片样式
    - id: card_md
      width: 400
      height: 240
      radius: 24

    # 中卡片图标按钮样式
    - id: card_md_icon_btn
      width: 72
      height: 72
      radius: 50
      bg_color: 0xECECEC
      shadow_opa: TRANSP
      align: TOP_LEFT

    # 中卡片主标签样式
    - id: card_md_main_label
      text_font: montserrat_32
      align: TOP_LEFT
      x: 92
      y: 5
      
    # 中卡片副标签样式
    - id: card_md_sub_label
      text_font: montserrat_24
      x: 92
      y: 60
    
    # 大卡片容器样式（用于模态框）
    - id: card_lg
      width: 800
      height: 600
      radius: 24
      align: CENTER
      opa: 1

    # 大卡片图标按钮样式
    - id: card_lg_icon_btn
      width: 72
      height: 72
      radius: 50
      bg_color: 0xECECEC
      shadow_opa: TRANSP
      align: TOP_LEFT
    
    # 大卡片透明图标按钮样式
    - id: card_lg_icon_btn_transp
      width: 72
      height: 72
      radius: 50
      bg_opa: TRANSP
      shadow_opa: TRANSP
      align: TOP_LEFT

    # 大卡片主标签样式
    - id: card_lg_main_label
      text_font: montserrat_32
      align: TOP_LEFT
      
    # 大卡片副标签样式
    - id: card_lg_sub_label
      text_font: montserrat_24
    
    # 模态框容器样式（全屏半透明遮罩）
    - id: modal_container
      width: 1280
      height: 720
      bg_color: 0xA9A9A9
      bg_opa: 0.7
      align: CENTER
  
  # 顶层导航栏和模态框  
  top_layer:
    widgets:
      # 侧边导航栏
      - obj:
          align: TOP_LEFT
          styles: sidebar
          id: sidebars
          layout:
            type: flex
            flex_flow: COLUMN
            pad_row: 12
            flex_align_main: start
            flex_align_cross: center
            flex_align_track: center
          widgets:
            # 仪表盘导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: dash_panel_btn
                      checkable: true
                      state:
                        checked: false
                      checked:
                        bg_color: 0xCCE8E7
                      widgets:
                        - label:
                            id: dash_btn_icon
                            align: CENTER
                            styles: nav_icon_inactivate
                            text: "\U000F056E" # 仪表盘图标
                      on_value:
                        - lambda: id(page_num) = 0;
                        - script.execute: nav_rail_update
                      on_press:
                        - lvgl.page.show: dashboard_page
                  - label:
                      styles: nav_label_inactivate
                      id: dash_btn_label
                      text: "仪表盘"

            # 屏幕背光控制导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: light_panel_btn
                      checkable: true
                      state:
                        checked: false
                      checked:
                        bg_color: 0xCCE8E7
                      widgets:
                        - label:
                            id: light_btn_icon
                            align: CENTER
                            styles: nav_icon_inactivate
                            text: "\U000F00DF"  # 亮度图标
                      on_value:
                        - lambda: id(page_num) = 1;
                        - script.execute: nav_rail_update
                      on_press:
                        - lvgl.page.show: light_page
                  - label:
                      styles: nav_label_inactivate
                      id: light_btn_label
                      text: "亮度"

      # 状态栏（显示电池/WiFi/API 状态图标）
      - obj:
          align: TOP_RIGHT
          id: status_bar
          width: 1280
          height: 90
          bg_opa: TRANSP
          border_opa: TRANSP
          layout:
            type: FLEX
            flex_flow: ROW_REVERSE
            flex_align_main: END
            flex_align_cross: CENTER
            flex_align_track: CENTER
            pad_column: 20
          widgets:
            - label:
                id: pwr_bat_icon_label
                text_font: extra_icon
                text: "\U000F06A5"
            - label:
                id: wifi_icon_label
                hidden: true
                text_font: extra_icon
                text: "\U000F05A9"
            - label:
                id: api_icon_label
                hidden: true
                text_font: extra_icon
                text: "\U000F109B"
  
  # LVGL 页面定义 
  pages:
    # 仪表盘页面（显示时间、日期和环境传感器数据）
    - id: dashboard_page
      widgets:
        - obj:
            align: TOP_LEFT
            x: 96
            y: 0
            width: 1080
            height: 1280
            bg_opa: TRANSP
            border_opa: TRANSP
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: START
              flex_align_cross: CENTER
              pad_row: 30
            widgets:
              # 页面标题
              - label:
                  text_font: noto_sans_sc_48
                  text: "仪表盘"
              # 时间显示
              - label:
                  id: time_label
                  text_font: montserrat_96
                  text: "14:07"
              # 日期显示
              - label:
                  id: date_label
                  text_font: montserrat_32
                  text: "2026-03-11 Thu"
              # 环境数据网格（温度/湿度/CO2/气压）
              - obj:
                  width: 800
                  height: 200
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  layout:
                    type: GRID
                    grid_columns: [FR(20), FR(30), FR(20), FR(30)]
                    grid_rows: [FR(1), FR(1)]
                    pad_row: 24
                    pad_column: 24
                  widgets:
                    # 温度图标
                    - label:
                        text_font: extra_icon
                        text: "\U000F050F"
                        grid_cell_column_pos: 0 
                        grid_cell_row_pos: 0 
                        grid_cell_x_align: CENTER
                        grid_cell_y_align: CENTER
                    # 温度值
                    - label:
                        id: temp_label
                        text_font: montserrat_32
                        text: "- °C"
                        grid_cell_column_pos: 1 
                        grid_cell_row_pos: 0 
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    # 湿度图标
                    - label:
                        text_font: extra_icon
                        text: "\U000F058E"
                        grid_cell_column_pos: 2 
                        grid_cell_row_pos: 0 
                        grid_cell_x_align: CENTER
                        grid_cell_y_align: CENTER
                    # 湿度值
                    - label:
                        text_font: montserrat_32
                        id: humi_label
                        text: "- %"
                        grid_cell_column_pos: 3 
                        grid_cell_row_pos: 0 
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    # CO2 图标
                    - label:
                        text_font: extra_icon
                        text: "\U000F07E4"
                        grid_cell_column_pos: 0 
                        grid_cell_row_pos: 1 
                        grid_cell_x_align: CENTER
                        grid_cell_y_align: CENTER
                    # CO2 值
                    - label:
                        text_font: montserrat_32
                        id: co2_label
                        text: "- ppm"
                        grid_cell_column_pos: 1 
                        grid_cell_row_pos: 1 
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    # 气压图标
                    - label:
                        text_font: extra_icon
                        text: "\U000F029A"
                        grid_cell_column_pos: 2 
                        grid_cell_row_pos: 1 
                        grid_cell_x_align: CENTER
                        grid_cell_y_align: CENTER
                    # 气压值
                    - label:
                        text_font: montserrat_32
                        id: pres_label
                        text: "- hPa"
                        grid_cell_column_pos: 3 
                        grid_cell_row_pos: 1 
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER

    # ========== 亮度控制页面 ==========
    - id: light_page
      widgets:
        - obj:
            align: TOP_LEFT
            x: 96
            y: 0
            width: 1080
            height: 1280
            bg_opa: TRANSP
            border_opa: TRANSP
            layout:
              type: flex
              flex_flow: ROW
              flex_align_main: CENTER
              flex_align_cross: CENTER
              pad_column: 60
            widgets:
              # 亮度调节滑块（垂直方向）
              - slider:
                  width: 130
                  height: 1000
                  radius: 42
                  min_value: 0
                  max_value: 255
                  id: backlight_slider
                  bg_color: 0xECECEC
                  bg_opa: COVER
                  indicator:
                    radius: 12
                    bg_color: 0xFFB90B
                  knob:
                    bg_opa: TRANSP
                  on_boot:
                    - lambda: |-
                        lv_obj_move_foreground(id(backlight_slider));
                  on_release:
                    - light.turn_on:
                        id: backlight
                        brightness: !lambda return x / 255.0;
                    - lambda: id(backlight_brightness_val) = int(x);
                    - lvgl.label.update:
                        id: backlight_bright_label
                        text: !lambda |-
                          int percent = int(x) * 100 / 255;
                          return std::to_string(percent) + " %";
                    - logger.log:
                        format: "屏幕亮度: %d%%"
                        args: [int((x*100)/255)]
                    - homeassistant.action:
                        action: light.turn_on
                        data:
                          entity_id: light.tab5_display_backlight
                          brightness: !lambda return int(x);
              # 百分比显示
              - label:
                  id: backlight_bright_label
                  text_font: montserrat_96
                  text: "50 %"

# 脚本定义
script:
  # 扩展导航按钮点击区域脚本
  # 为导航按钮扩展可点击区域，使图标附近的触摸也能被识别
  # 提升侧边导航栏在小触摸目标上的可用性
  - id: expand_nav_btn_click_area
    then:
      - lambda: |-
          std::vector<lv_obj_t*> btns = {
            id(dash_panel_btn),
            id(light_panel_btn)
          };
          for (auto* btn : btns) {
            lv_obj_set_ext_click_area(btn, 180);
          }

  # 更新导航栏 UI 脚本
  # 根据当前页面选择更新导航栏状态：设置选中按钮的选中状态、
  # 更新图标为激活/未激活样式、应用相应的标签样式（激活/未激活颜色）
  - id: nav_rail_update
    then:
      - lambda: |-
          const int active = id(page_num);
          lv_obj_t* buttons[] = { 
              id(dash_panel_btn), 
              id(light_panel_btn), 
          };
          lv_obj_t* icons[] = { 
              id(dash_btn_icon), 
              id(light_btn_icon), 
          };
          lv_obj_t* labels[] = { 
              id(dash_btn_label), 
              id(light_btn_label), 
          };
          const char* icon_unchecked[] = {
              "\U000F0A1D", // 仪表盘（轮廓）
              "\U000F0336", // 亮度（轮廓）
          };
          const char* icon_checked[] = {
              "\U000F056E", // 仪表盘
              "\U000F00DF", // 亮度
          };

          const int count = sizeof(buttons) / sizeof(buttons[0]);
          
          // 更新按钮 UI 状态
          for (int i = 0; i < count; i++) {
              if (i == id(page_num)) {
                lv_obj_add_state(buttons[i], LV_STATE_CHECKED);
              } else {
                lv_obj_clear_state(buttons[i], LV_STATE_CHECKED);
              }
              bool selected = (i == active);
              lv_obj_add_style(labels[i], selected ? id(nav_label_activate) : id(nav_label_inactivate), LV_PART_MAIN);
              lv_label_set_text(icons[i], selected ? icon_checked[i] : icon_unchecked[i]);
          }
    
  # 同步 Home Assistant 状态脚本
  # 当 UI 绘制在屏幕上时，同步 Home Assistant 实体状态到 LVGL UI
  - id: sync_ha
    then:
      - logger.log: "与 Home Assistant 同步"

# 全局变量定义
globals:
  # 当前页面编号（0=仪表盘, 1=亮度）
  - id: page_num
    type: int
    restore_value: no
    initial_value: '0'
  # 背光亮度值 (0-255)
  - id: backlight_brightness_val
    type: int
    restore_value: yes
    initial_value: '128'  # 默认 50%


