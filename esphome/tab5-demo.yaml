      align: CENTER
  
  # 顶层导航栏和模态框  
  top_layer:
    widgets:
      # 侧边导航栏
      - obj:
          align: TOP_LEFT
          styles: sidebar
          id: sidebars
          layout:
            type: flex
            flex_flow: COLUMN
            pad_row: 12
            flex_align_main: start
            flex_align_cross: center
            flex_align_track: center
          widgets:
            # 仪表盘导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: dash_panel_btn
                      checkable: true
                      state:
                        checked: false
                      checked:
                        bg_color: 0xCCE8E7
                      widgets:
                        - label:
                            id: dash_btn_icon
                            align: CENTER
                            styles: nav_icon_inactivate
                            text: "\U000F056E" # 仪表盘图标
                      on_value:
                        - lambda: id(page_num) = 0;
                        - script.execute: nav_rail_update
                      on_press:
                        - lvgl.page.show: dashboard_page
                  - label:
                      styles: nav_label_inactivate
                      id: dash_btn_label
                      text: "仪表盘"

            # 灯光控制导航按钮
            - obj:
                styles: nav_btn_container
                widgets:
                  - button:
                      align: center
                      styles: nav_btn_inactivate
                      id: light_panel_btn
                      checkable: true
                      state:
                        checked: false
                      checked:
                        bg_color: 0xCCE8E7
                      widgets:
                        - label:
                            id: light_btn_icon
                            align: CENTER
                            styles: nav_icon_inactivate
                            text: "\U000F0336" # 灯泡图标（轮廓）
                      on_value:
                        - lambda: id(page_num) = 1;
                        - script.execute: nav_rail_update
                      on_press:
                        - lvgl.page.show: light_page
                  - label:
                      styles: nav_label_inactivate
                      id: light_btn_label
                      text: "灯光"

      # RGB 彩灯控制模态框
      - obj:
          align: CENTER
          id: rgb_light_card_modal_container
          styles: modal_container
          clickable: true
          hidden: true
          on_press:
            - lvgl.widget.hide: rgb_light_card_modal_container
          widgets:
            - obj:
                styles: card_lg
                widgets:
                  # 关闭按钮
                  - button:
                      styles: card_lg_icon_btn_transp
                      align: TOP_LEFT
                      widgets:
