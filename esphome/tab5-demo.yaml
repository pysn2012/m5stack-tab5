      "\U000F0F30", # 雾霾天气
      "\U000F056E", # 仪表盘
      "\U000F0A1D", # 仪表盘（轮廓）
      "\U000F0335", # 灯泡
      "\U000F0336", # 灯泡（轮廓）
      "\U000F0F54", # 室内温度计
      "\U000F0F55", # 室内温度计（轮廓）
