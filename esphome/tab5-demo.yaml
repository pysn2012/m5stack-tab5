      "\U000F1804", # 荧光灯管
      "\U000F18DE", # 吸顶灯（轮廓）
      "\U000F18DD", # 吸顶灯
      "\U000F0425", # 电源
      "\U000F07E4", # CO2
      "\U000F029A", # 气压表（用于显示 hPa 气压）
      "\U000F05A9", # WiFi
      "\U000F007A", # 电池-10%
      "\U000F007B", # 电池-20%
      "\U000F007C", # 电池-30%
      "\U000F007D", # 电池-40%
      "\U000F007E", # 电池-50%
      "\U000F007F", # 电池-60%
      "\U000F0080", # 电池-70%
      "\U000F0081", # 电池-80%
      "\U000F0082", # 电池-90%
      "\U000F0079", # 电池-100%
      "\U000F089C", # 充电-10%
      "\U000F0086", # 充电-20%
      "\U000F0087", # 充电-30%
      "\U000F0088", # 充电-40%
      "\U000F089D", # 充电-50%
      "\U000F0089", # 充电-60%
      "\U000F089E", # 充电-70%
      "\U000F008A", # 充电-80%
      "\U000F008B", # 充电-90%
      "\U000F0085", # 充电-100%
      "\U000F06A5", # 电源插头（表示无电池，使用 USB-C 供电）
      "\U000F109B", # Home Assistant API
