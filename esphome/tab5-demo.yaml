# ESPHOME 基础配置
esphome:
  name: tab5-ha-hmi-ew
  friendly_name: M5Stack Tab5
  min_version: 2025.12.0

# ESP32-P4 主控芯片配置
esp32:
  variant: esp32p4
  flash_size: 16MB
  engineering_sample: true
  cpu_frequency: 360MHz
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true

# ESP32-C6 WiFi 协处理器配置
esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1

# 日志配置
logger:
  hardware_uart: USB_SERIAL_JTAG
  level: DEBUG
  logs:
    sensor: INFO
    binary_sensor: INFO

# PSRAM 配置
psram:
  mode: hex
  speed: 200MHz

# Home Assistant API 配置
api:
  on_client_connected: 
    then:
      - lvgl.widget.show: api_icon_label
  on_client_disconnected: 
    then:
      - lvgl.widget.hide: api_icon_label

# 外部组件配置
external_components:
  - source:
      type: local
      path: components/           # 自定义组件目录（相对于本 YAML 文件）
    
# OTA 远程更新配置
ota:
  platform: esphome

# WiFi 网络配置
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect: 
    then:
      - lvgl.widget.show: wifi_icon_label
  on_disconnect: 
    then:
      - lvgl.widget.hide: wifi_icon_label

# I2C 总线配置
i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz

# PI4IOE5V6408 GPIO 扩展器配置
pi4ioe5v6408:
  - id: pi4ioe1
    address: 0x43
    # 0: 输出 - WiFi天线切换（内置/外置）
    # 1: 输出 - 扬声器使能
    # 2: 输出 - 外部5V电源
    # 3: 未连接
    # 4: 输出 - LCD复位
    # 5: 输出 - 触摸面板复位
    # 6: 输出 - 摄像头复位
    # 7: 输入 - 耳机检测
  - id: pi4ioe2
    address: 0x44
    # 0: 输出 - WiFi电源
    # 1: 未连接
    # 2: 未连接
    # 3: 输出 - USB 5V电源
    # 4: 输出 - 关机脉冲
    # 5: 输出 - 快充使能（低电平有效）
    # 6: 输入 - 充电状态
    # 7: 输出 - 充电使能

# GPIO 开关配置
switch:
  - platform: gpio
    id: wifi_power
    name: "WiFi Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 0
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: usb_5v_power
    name: "USB Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 3
  - platform: gpio
    id: quick_charge
    name: "Quick Charge"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 5
      inverted: true
  - platform: gpio
    id: charge_enable
    name: "Charge Enable"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 7
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: wifi_antenna_int_ext
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 0
  - platform: gpio
    id: speaker_enable
    name: "Speaker Enable"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 1
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: external_5v_power
    name: "External 5V Power"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 2

# 二进制传感器配置
binary_sensor:
  - platform: gpio
    id: charging
    name: "Charging Status"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 6
      mode: INPUT_PULLDOWN
    on_press:
      - lambda: id(battery_percent).update();
    on_release:
      - lambda: id(battery_percent).update();

  - platform: gpio
    id: headphone_detect
    name: "Headphone Detect"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 7

# 选择器配置, DAC输出需要手动或通过自动化切换到 LINE1 以使用板载扬声器
select:
  - platform: es8388
    dac_output:
      name: DAC Output
    adc_input_mic:
      name: ADC Input Mic

  - platform: template
    id: wifi_antenna_select
    name: "WiFi Antenna"
    options:
      - "Internal"
      - "External"
    optimistic: true
    on_value:
      - if:
          condition:
            lambda: return i == 0;
          then:
            - switch.turn_off: wifi_antenna_int_ext
          else:
            - switch.turn_on: wifi_antenna_int_ext

# 传感器配置
sensor:
  # INA226 电池电压电流传感器
  - platform: ina226
    address: 0x41
    adc_averaging: 16
    max_current: 8.192A
    shunt_resistance: 0.005ohm
    bus_voltage:
      id: battery_voltage
      name: Battery Voltage
    current:
      id: battery_current
      name: Battery Current
      # 正值表示放电，负值表示充电
  
  # Home Assistant 环境传感器
  - platform: homeassistant
    id: cur_temp
    entity_id: sensor.bme668_temperature
    on_value:
      - lvgl.label.update:
          id: temp_label
          text:
            format: "%.1f °C"
            args: [ 'x' ]
  
  - platform: homeassistant
    id: cur_humi
    entity_id: sensor.bme668_humidity
    on_value:
      - lvgl.label.update:
          id: humi_label
          text:
            format: "%.1f %%"
            args: [ 'x' ]

  - platform: homeassistant
    id: cur_pres
    entity_id: sensor.bme668_pressure
    on_value:
      - lvgl.label.update:
          id: pres_label
          text:
            format: "%.2f hPa"
            args: [ 'x' ]
            
  - platform: homeassistant
    id: cur_co2
    entity_id: sensor.espressif_zigbeescd41_carbon_dioxide
    on_value:
      - lvgl.label.update:
          id: co2_label
          text:
            format: "%.0f ppm"
            args: [ 'x' ]

  # 电池电量百分比计算（基于电压）
  - platform: template
    id: battery_percent
    name: "Battery Percentage"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    lambda: |-
      float voltage = id(battery_voltage).state;
      float min_voltage = 6.0;
      float max_voltage = 8.4;
      
      if (voltage < 5.0) return 0.0;
      if (voltage <= min_voltage) return 0.0;
      if (voltage >= max_voltage) return 100.0;
      
      float percent = ((voltage - min_voltage) / (max_voltage - min_voltage)) * 100.0;
      return percent;
    update_interval: 30s
    on_value:
      - lvgl.label.update:
          id: pwr_bat_icon_label
          text: !lambda |-
            float voltage = id(battery_voltage).state;
            float current = id(battery_current).state;
            bool charging_pin = id(charging).state;
            int level = int(x);
            
            // 未检测到电池
            if (voltage < 5.0) {
              return "\U000F06A5";  // 电源插头图标
            }
            
            // 根据充电状态选择图标集
            bool is_charging = (current < -0.1 || charging_pin);
            
            // 使用 level/10 分档：0-9=0, 10-19=1, 20-29=2, 等等
            int bracket = level / 10;
            
            if (is_charging) {
              // 充电状态图标
              switch (bracket) {
                case 10:
                case 9:
                  return "\U000F0085";  // 充电-100%
                case 8:
                  return "\U000F008B";  // 充电-90%
                case 7:
                  return "\U000F008A";  // 充电-80%
                case 6:
                  return "\U000F089E";  // 充电-70%
                case 5:
                  return "\U000F0089";  // 充电-60%
                case 4:
                  return "\U000F089D";  // 充电-50%
                case 3:
                  return "\U000F0088";  // 充电-40%
                case 2:
                  return "\U000F0087";  // 充电-30%
                case 1:
                  return "\U000F0086";  // 充电-20%
                default:
                  return "\U000F089C";  // 充电-10%
              }
            } else {
              // 普通电池图标
              switch (bracket) {
                case 10:
                case 9:
                  return "\U000F0079";  // 电池-100%
                case 8:
                  return "\U000F0082";  // 电池-90%
                case 7:
                  return "\U000F0081";  // 电池-80%
                case 6:
                  return "\U000F0080";  // 电池-70%
                case 5:
                  return "\U000F007F";  // 电池-60%
                case 4:
                  return "\U000F007E";  // 电池-50%
                case 3:
                  return "\U000F007D";  // 电池-40%
                case 2:
                  return "\U000F007C";  // 电池-30%
                case 1:
                  return "\U000F007B";  // 电池-20%
                default:
                  return "\U000F007A";  // 电池-10%
              }
            }

# 触摸屏配置
touchscreen:
  - platform: st7123
    id: my_touchscreen
    i2c_id: bsp_bus
    interrupt_pin: GPIO23
    update_interval: never
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    calibration:
      x_min: 0
      x_max: 720
      y_min: 0
      y_max: 1280
    on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL 恢复中"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: backlight

# LDO 稳压器配置（为触摸屏等供电）
esp_ldo:
  - voltage: 2.5V
    channel: 3

# MIPI DSI 显示屏配置
display:
  - platform: mipi_dsi
    id: main_display
    dimensions:
      height: 1280
      width: 720
    model: M5STACK-TAB5-V2
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4
    show_test_card: false
    auto_clear_enabled: false
    update_interval: never
    #rotation: 270

# 背光 PWM 输出配置
output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz

# 背光亮度控制配置
light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms
    initial_state:
      brightness: "50%"

# I2S 音频总线配置
i2s_audio:
  - id: mic_bus
    i2s_lrclk_pin: GPIO29
    i2s_bclk_pin: GPIO27
    i2s_mclk_pin: GPIO30

# ES7210 音频 ADC 配置（麦克风输入）
audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

# 麦克风配置
microphone:
  - platform: i2s_audio
    id: tab5_microphone
    i2s_din_pin: GPIO28
    sample_rate: 16000
    bits_per_sample: 16bit
    adc_type: external

# ES8388 音频 DAC 配置（扬声器输出）
audio_dac:
  - platform: es8388
    id: es8388_dac

# 扬声器配置
speaker:
  - platform: i2s_audio
    id: tab5_speaker
    i2s_dout_pin: GPIO26
    audio_dac: es8388_dac
    dac_type: external
    channel: mono
    buffer_duration: 100ms
    bits_per_sample: 16bit
    sample_rate: 48000

# 媒体播放器配置
media_player:
  - platform: speaker
    name: tab5_media_player
    id: speaker_player
    announcement_pipeline:
      speaker: tab5_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1

# 时间同步配置（Home Assistant + RX8130 实时时钟）
time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        rx8130.write_time:
  - platform: rx8130
    id: rx8130_time
    update_interval: never
    on_time:
      # 就绪后每3秒更新一次
      - seconds: /3
        then:
          - lvgl.label.update:
              id: time_label
              text: !lambda |-
                auto t = id(ha_time).now();
                return t.strftime("%H:%M").c_str();

          - lvgl.label.update:
              id: date_label
              text: !lambda |-
                auto t = id(ha_time).now();
                return t.strftime("%Y-%m-%d %a").c_str();

# 文本传感器配置（同步 Home Assistant 设备状态）
text_sensor:
  # RGB 彩灯状态同步
  - platform: homeassistant
    id: demo_light
    entity_id: light.matter_rgb
    on_value:
      then:
        - lvgl.widget.update:
            id: demo_light_btn
            state:
              checked: !lambda return x == "on";
              disabled: !lambda return ( x == "unavailable" ) or ( x == "unknown" );
        - lvgl.widget.update:
            id: demo_light_click_area
            clickable: !lambda return !((x == "unavailable") || (x == "unknown"));
        - lvgl.label.update:
            id: demo_rgb_light_label
            text_color: !lambda |-
              if ( x == "on" ) {
                  return lv_color_hex(0xF5C23B);
              } else {
                  return lv_color_hex(0x9E9E9E);
              }
            text: !lambda |-
                static char buf[10];
                std::string icon;
                if ( x == "on" ) {
                    icon = "\U000F18DD";
                } else {
                    icon = "\U000F18DE";
                }
                snprintf(buf, sizeof(buf), "%s", icon.c_str());
                return buf;
        - lvgl.label.update:
            id: demo_rgb_light_status
            text: !lambda |-
                static char buf[10];
                std::string text;
                if ( x == "on" ) {
                    text = "ON";
                } 
                else if ( x == "unavailable" ||  x == "unknown" ) {
                    text = "UNKNOWN";
                }
                else {
                    text = "OFF";
                }
                snprintf(buf, sizeof(buf), "%s", text.c_str());
                return buf;

  # 手电筒状态同步
  - platform: homeassistant
    id: demo_flash_light
    entity_id: light.matter_flashlight
    on_value:
      then:
        - lvgl.widget.update:
            id: demo_light_btn2
            state:
              checked: !lambda return x == "on";
              disabled: !lambda return ( x == "unavailable" ) or ( x == "unknown" );
        - lvgl.widget.update:
            id: demo_light_click_area2
            clickable: !lambda return !((x == "unavailable") || (x == "unknown"));
        - lvgl.label.update:
            id: demo_flash_light_label
            text_color: !lambda |-
              if ( x == "on" ) {
                  return lv_color_hex(0xF5C23B);
              } else {
                  return lv_color_hex(0x9E9E9E);
              }
            text: !lambda |-
                static char buf[10];
                std::string icon;
                if ( x == "on" ) {
                    icon = "\U000F18DD";
                } else {
                    icon = "\U000F18DE";
                }
                snprintf(buf, sizeof(buf), "%s", icon.c_str());
                return buf;
        - lvgl.label.update:
            id: demo_flash_light_status
            text: !lambda |-
                static char buf[10];
                std::string text;
                if ( x == "on" ) {
                    text = "ON";
                } 
                else if ( x == "unavailable" ||  x == "unknown" ) {
                    text = "UNKNOWN";
                }
                else {
                    text = "OFF";
                }
                snprintf(buf, sizeof(buf), "%s", text.c_str());
                return buf;

  # RGB 彩灯亮度同步
  - platform: homeassistant
    id: demo_rgb_light_brightness
    entity_id: light.matter_rgb
    attribute: brightness
    on_value:
      - lvgl.slider.update:
          id: rgb_light_slider
          value: !lambda |-
            if (x.empty() || x == "None" || 
                x == "null" || x == "unknown" 
                || x == "unavailable") 
                return 0;

            return std::stoi(x);

      - lvgl.label.update:
          id: rgb_light_bright_label
          text: !lambda |-
            if ( x.empty() || x == "None" || x == "null" ) {
                return std::string("off");
            } 
            else if ( x == "unknown" || x == "unavailable" ) {
              return std::string("unavailable");
            }
            else {
              int percent = std::stoi(x) * 100 / 255;
              return std::to_string(percent) + " %";
            }
  
  # 手电筒亮度同步
  - platform: homeassistant
    id: demo_flash_light_brightness
    entity_id: light.matter_flashlight
    attribute: brightness
    on_value:
      - lvgl.slider.update:
          id: flash_light_slider
          value: !lambda |-
            if (x.empty() || x == "None" || 
                x == "null" || x == "unknown" 
                || x == "unavailable") 
                return 0;

            return std::stoi(x);

      - lvgl.label.update:
          id: flash_light_bright_label
          text: !lambda |-
            if ( x.empty() || x == "None" || x == "null" ) {
                return std::string("off");
            } 
            else if ( x == "unknown" || x == "unavailable" ) {
              return std::string("unavailable");
            }
            else {
              int percent = std::stoi(x) * 100 / 255;
              return std::to_string(percent) + " %";
            }
  
  # RGB 彩灯颜色同步
  - platform: homeassistant
    id: demo_light_color
    entity_id: light.matter_rgb
    attribute: rgb_color
    on_value:
      - lambda: id(sync_ha_palette)->execute(x);

  # 设备端 RGB 颜色值（用于同步到 HA）
  - platform: template
    id: device_rgb_color
    name: "Device RGB Color"
    update_interval: never
    lambda: |-
      char buf[32];
      snprintf(buf, sizeof(buf), "%d,%d,%d", id(light_r), id(light_g), id(light_b));
      return std::string(buf);

# 字体配置
font:
  # Material Design 图标字体（48px）
  - file: "https://raw.githubusercontent.com/Templarian/MaterialDesign-Webfont/master/fonts/materialdesignicons-webfont.ttf"
    id: extra_icon
    size: 48
    bpp: 4
    # 图标列表：https://pictogrammers.com/library/mdi/
