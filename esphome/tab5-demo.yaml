                  align: CENTER
                  y: -100
              # 日期显示
              - label:
                  id: date_label
                  text_font: montserrat_32
                  text: "2026-03-11 Thu"
                  align: CENTER
                  y: 30
              # 环境数据网格（温度/湿度/CO2/气压）
              - obj:
                  width: 800
                  height: 200
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  align: CENTER
                  y: 200
                  layout:
                    type: GRID
                    grid_columns: [FR(20), FR(30), FR(20), FR(30)]
                    grid_rows: [FR(1), FR(1)]
                    pad_row: 24
                    pad_column: 24
                  widgets:
                    # 温度图标
                    - label:
                        text_font: extra_icon
                        text: "\U000F050F"
                        grid_cell_column_pos: 0 
                        grid_cell_row_pos: 0 
                        grid_cell_x_align: CENTER
                        grid_cell_y_align: CENTER
                    # 温度值
                    - label:
                        id: temp_label
                        text_font: montserrat_32
                        text: "- °C"
                        grid_cell_column_pos: 1 
                        grid_cell_row_pos: 0 
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    # 湿度图标
                    - label:
                        text_font: extra_icon
                        text: "\U000F058E"
                        grid_cell_column_pos: 2 
                        grid_cell_row_pos: 0 
                        grid_cell_x_align: CENTER
                        grid_cell_y_align: CENTER
                    # 湿度值
                    - label:
                        text_font: montserrat_32
                        id: humi_label
                        text: "- %"
                        grid_cell_column_pos: 3 
                        grid_cell_row_pos: 0 
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    # CO2 图标
                    - label:
                        text_font: extra_icon
                        text: "\U000F07E4"
                        grid_cell_column_pos: 0 
                        grid_cell_row_pos: 1 
                        grid_cell_x_align: CENTER
                        grid_cell_y_align: CENTER
                    # CO2 值
                    - label:
                        text_font: montserrat_32
                        id: co2_label
