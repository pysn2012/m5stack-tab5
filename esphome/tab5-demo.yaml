            - label:
                id: api_icon_label
                hidden: true
                text_font: extra_icon
                text: "\U000F109B"
  
  # LVGL 页面定义 
  pages:
    # 仪表盘页面（显示时间、日期和环境传感器数据）
    - id: dashboard_page
      widgets:
        - obj:
            styles: content_container
            widgets:
              # 时间显示
              - label:
                  id: time_label
                  text_font: montserrat_96
