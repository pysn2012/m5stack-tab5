                      clickable: true
                      on_click:
                        - lvgl.widget.show: color_palette_indicator
                        - script.execute: move_color_palette_indicator
                        - text_sensor.template.publish:
                            id: device_rgb_color
                            state: !lambda |-
                              char buf[32];
                              snprintf(buf, sizeof(buf), "%d,%d,%d", id(light_r), id(light_g), id(light_b));
                              return std::string(buf);
                        - logger.log: 
                            format: "可点击调色板颜色变化 RGB: (%d, %d, %d)"
