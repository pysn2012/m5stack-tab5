                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 0
                  grid_cell_x_align: STRETCH
                  clickable: true
                  on_press:
                    - logger.log: "彩灯区域被点击!"
                    - lvgl.widget.show: rgb_light_card_modal_container
                    - lvgl.widget.hide: color_palette_canvas
                    - lvgl.widget.hide: color_palette_indicator
                    - lvgl.widget.show: rgb_light_slider
                  widgets:
                    # 灯光开关按钮
                    - button:
                        styles: card_sm_icon_btn
                        id: demo_light_btn
                        checkable: true
                        state:
                          checked: false
                        checked:
                          bg_color: 0xFDF3D8    # 暗黄色
                        widgets:
                          - label:
                              id: demo_rgb_light_label
                              text_font: extra_icon
                              text_color: 0X9E9E9E
                              text: "\U000F18DE"
                              align: CENTER
                        on_short_click:
                          - logger.log: "切换 RGB 彩灯!"
                          - homeassistant.action:
                              action: light.toggle
                              data:
                                entity_id: light.matter_rgb

                    # 灯光名称标签
                    - label:
                        styles: card_sm_main_label
                        text: "彩灯"
                    # 灯光状态标签
