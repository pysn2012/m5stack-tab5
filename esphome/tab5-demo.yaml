      "\U000F0374", # 减号
      "\U000F00DF", # 亮度调节
      "\U000F03D8", # 调色板
    ]

  # Material Design 图标字体（64px，用于较大图标）
  - file: "https://raw.githubusercontent.com/Templarian/MaterialDesign-Webfont/master/fonts/materialdesignicons-webfont.ttf"
    id: extra_icon_64
    size: 64
    bpp: 4
    glyphs: [
      "\U000F0D80", # 楼层1
    ]
  
  # Montserrat 字体（96px，用于时间显示）
  - file: gfonts://Montserrat@600
    id: montserrat_96
    size: 96
    bpp: 4

# LVGL 图形库配置
lvgl:
  rotation: 270
  on_boot:
    - light.turn_on: backlight
    - rx8130.read_time:
    - script.execute: expand_nav_btn_click_area    # 扩展导航按钮点击区域
    - script.execute: nav_rail_update              # 更新导航栏 UI
    - script.execute: sync_ha                      # 同步 Home Assistant 状态

  byte_order: little_endian
  color_depth: 16
  
  # LVGL 样式定义  
  style_definitions:
    # 侧边栏样式
    - id: sidebar
      bg_color: 0xE9EFEE
      bg_opa: COVER
      border_opa: TRANSP
      pad_top: 30
