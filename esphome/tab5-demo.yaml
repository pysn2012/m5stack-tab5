                      align: TOP_LEFT
                      widgets:
                        - label:
                            text_color: 0x3F4948
                            text_font: extra_icon
                            text: "\U000F0156"
                            align: CENTER
                      on_press:
                        - lvgl.widget.hide: flash_light_card_modal_container
                  # 亮度百分比标签
                  - label:
                      id: flash_light_bright_label
                      text_font: montserrat_48
                      align: TOP_MID
                      y: 30
                      text: "关闭"
                  # 亮度调节滑块
                  - slider:
                      align: CENTER
                      width: 130
                      height: 360
                      radius: 42
                      min_value: 0
                      max_value: 255
                      id: flash_light_slider
                      bg_color: 0xECECEC
                      bg_opa: COVER
                      indicator:
                        radius: 12
                        bg_color: 0xFFB90B
                      knob:
                        bg_opa: TRANSP
                      on_boot:
                        - lambda: |-
                            lv_obj_move_foreground(id(flash_light_slider));
                      on_release:
                        - homeassistant.action:
                            action: light.turn_on
                            data:
                              entity_id: light.matter_flashlight
                              brightness: !lambda return int(x);
                        - lvgl.label.update:
                            id: flash_light_bright_label
                            text: !lambda |-
                              int percent = int(x) * 100 / 255;
                              return std::to_string(percent) + " %";
                        - logger.log: 
                            format: "手电筒亮度: %d%%"
                            args: [int((x*100)/255)]
                  # 按钮组（电源开关）
                  - obj:
                      width: 280
                      height: 84
                      radius: 50
                      scrollable: false
                      align: BOTTOM_MID
                      bg_color: 0xF3F4F4
                      border_opa: TRANSP
                      layout:
                        type: flex
                        flex_align_main: CENTER
                        flex_align_cross: CENTER
                        flex_align_track: CENTER
                      widgets:
