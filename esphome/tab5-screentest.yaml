# ESPHOME 基础配置
esphome:
  name: tab5-ha-hmi-ew
  friendly_name: M5Stack Tab5
  min_version: 2025.12.0
  on_boot:
    priority: 600
    then:
      - light.turn_on: backlight
      - rx8130.read_time:
          id: rx8130_time
      - logger.log: "Boot: time read from RX8130 RTC"

# ESP32-P4 主控芯片配置
esp32:
  variant: esp32p4
  flash_size: 16MB
  engineering_sample: true
  cpu_frequency: 360MHz
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true

# ESP32-C6 WiFi 协处理器配置
esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1

# 日志配置
logger:
  hardware_uart: USB_SERIAL_JTAG
  level: DEBUG
  logs:
    sensor: INFO
    binary_sensor: INFO

# PSRAM 配置
psram:
  mode: hex
  speed: 200MHz

# Home Assistant API 配置
api:

# OTA 远程更新配置
ota:
  platform: esphome

# WiFi 网络配置
wifi:
  id: wifi_id
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# I2C 总线配置
i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz

# PI4IOE5V6408 GPIO 扩展器配置
pi4ioe5v6408:
  - id: pi4ioe1
    address: 0x43
    # 0: 输出 - WiFi天线切换（内置/外置）
    # 1: 输出 - 扬声器使能
    # 2: 输出 - 外部5V电源
    # 3: 未连接
    # 4: 输出 - LCD复位
    # 5: 输出 - 触摸面板复位
    # 6: 输出 - 摄像头复位
    # 7: 输入 - 耳机检测
  - id: pi4ioe2
    address: 0x44
    # 0: 输出 - WiFi电源
    # 1: 未连接
    # 2: 未连接
    # 3: 输出 - USB 5V电源
    # 4: 输出 - 关机脉冲
    # 5: 输出 - 快充使能（低电平有效）
    # 6: 输入 - 充电状态
    # 7: 输出 - 充电使能

# GPIO 开关配置
switch:
  - platform: gpio
    id: wifi_power
    name: "WiFi Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 0
    restore_mode: ALWAYS_ON

# 同步时间
time:
  - platform: rx8130
    id: rx8130_time
    address: 0x32
    update_interval: never
    timezone: Asia/Shanghai

  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - rx8130.write_time:
            id: rx8130_time
        - logger.log: "RTC synced from Home Assistant"

# LDO 稳压器配置（为触摸屏等供电）
esp_ldo:
  - voltage: 2.5V
    channel: 3

# ========== 字体配置（显示文字必需）==========
font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 36
  - file: "gfonts://Roboto"
    id: font_medium
    size: 48
  - file: "gfonts://Roboto"
    id: font_large
    size: 56

# ========== 颜色定义 ==========
color:
  - id: color_white
    red: 100%
    green: 100%
    blue: 100%
  - id: color_black
    red: 0%
    green: 0%
    blue: 0%
  - id: color_red
    red: 100%
    green: 0%
    blue: 0%
  - id: color_green
    red: 0%
    green: 100%
    blue: 0%
  - id: color_blue
    red: 0%
    green: 50%
    blue: 100%
  - id: color_gray
    red: 50%
    green: 50%
    blue: 50%

# ========== 传感器配置 ==========
sensor:
  # INA226 电池电压电流传感器
  - platform: ina226
    address: 0x41
    adc_averaging: 16
    max_current: 8.192A
    shunt_resistance: 0.005ohm
    bus_voltage:
      id: battery_voltage
      name: "Battery Voltage"
      unit_of_measurement: "V"
      accuracy_decimals: 2
    current:
      id: battery_current
      name: "Battery Current"
      unit_of_measurement: "A"
      accuracy_decimals: 3

  # 电池电量百分比
  - platform: template
    id: battery_percent
    name: "Battery Percentage"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    lambda: |-
      float voltage = id(battery_voltage).state;
      float min_voltage = 6.0;
      float max_voltage = 8.4;
      
      if (isnan(voltage) || voltage < 5.0) return 0.0;
      if (voltage <= min_voltage) return 0.0;
      if (voltage >= max_voltage) return 100.0;
      
      return ((voltage - min_voltage) / (max_voltage - min_voltage)) * 100.0;
    update_interval: 5s

  # WiFi 信号强度
  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi Signal"
    unit_of_measurement: "dBm"
    update_interval: 5s

  # 运行时间
  - platform: uptime
    id: device_uptime
    name: "Uptime"
    unit_of_measurement: "s"
    update_interval: 5s

# ========== 二进制传感器 ==========
binary_sensor:
  - platform: gpio
    id: charging
    name: "Charging Status"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 6
      mode: INPUT_PULLDOWN

# ========== 文本传感器 ==========
text_sensor:
  - platform: wifi_info
    ip_address:
      id: wifi_ip
      name: "WiFi IP"
    ssid:
      id: wifi_ssid_text
      name: "WiFi SSID"

# ========== MIPI DSI 显示屏配置 ==========
display:
  - platform: mipi_dsi
    id: main_display
    model: M5STACK-TAB5-V2
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4
    update_interval: 1s
    rotation: 270
    auto_clear_enabled: true
    lambda: |-
      // 背景
      it.fill(id(color_black));
      
      char buf[64];
      auto time_now = id(rx8130_time).now();
      
      // ========== 第1行：日期时间 ==========
      if (time_now.is_valid()) {
        it.strftime(640, 35, id(font_medium), id(color_white), TextAlign::TOP_CENTER,
                    "%Y-%m-%d  %H:%M", time_now);
      } else {
        it.print(640, 25, id(font_medium), id(color_red), TextAlign::TOP_CENTER, "RTC: NO TIME");
      }
      
      // ========== 第2行：星期 ==========
      if (time_now.is_valid()) {
        it.strftime(640, 100, id(font_medium), id(color_gray), TextAlign::TOP_CENTER,
                    "%A", time_now);
      }
      
      // ========== 分隔线 ==========
      it.rectangle(60, 165, 1160, 2, id(color_gray));
      
      // ========== 第3行：WIFI 信息（2列）==========
      // 左列：IP
      std::string ip = id(wifi_ip).state;
      snprintf(buf, sizeof(buf), "IP: %s", ip.c_str());
      it.print(80, 180, id(font_small), id(color_white), buf);
      
      // 右列：信号强度
      int rssi = id(wifi_rssi).state;
      if (isnan(rssi)) {
        snprintf(buf, sizeof(buf), "RSSI: -- dBm");
      } else {
        snprintf(buf, sizeof(buf), "RSSI: %d dBm", rssi);
      }
      it.print(720, 180, id(font_small), id(color_white), buf);
      
      // ========== 第4行：系统信息（2列）==========
      // 左列：芯片型号
      it.print(80, 240, id(font_small), id(color_white), "Chip: ESP32-P4 rev1.3");
      
      // 右列：ESPHome 版本
      it.print(720, 240, id(font_small), id(color_white), "ESPHome: 2026.6.2");
      
      // ========== 第5行：其他信息（2列）==========
      // 左列：uptime
      int uptime_sec = id(device_uptime).state;
      int hours = uptime_sec / 3600;
      int mins = (uptime_sec % 3600) / 60;
      int secs = uptime_sec % 60;
      snprintf(buf, sizeof(buf), "Uptime: %02d:%02d:%02d", hours, mins, secs);
      it.print(80, 300, id(font_small), id(color_white), buf);
      
      // 右列：电压
      float voltage = id(battery_voltage).state;
      if (isnan(voltage)) {
        snprintf(buf, sizeof(buf), "Voltage: -- V");
      } else {
        snprintf(buf, sizeof(buf), "Voltage: %.2f V", voltage);
      }
      it.print(720, 300, id(font_small), id(color_white), buf);
      
      // ========== 底部状态栏 ==========
      it.rectangle(0, 660, 1280, 2, id(color_gray));
      it.print(640, 670, id(font_small), id(color_gray), TextAlign::TOP_CENTER, 
               "M5Stack Tab5 - RX8130 RTC");

# ========== 背光 PWM 输出配置 ==========
output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz

# ========== 背光亮度控制 ==========
light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms
    initial_state:
      brightness: "80%"