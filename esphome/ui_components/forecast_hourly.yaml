            type: FLEX
            flex_flow: COLUMN
            flex_align_main: CENTER
            flex_align_cross: CENTER
          widgets:
            - label: { id: h3_time, text: "4小时后", text_font: roboto_32_b, text_color: color_text }
            - label: { id: h3_icon_layer1, text: "\U000F0725", text_font: mdi_font_64, text_color: color_text }
            - label: { id: h3_temp, text: "27°", text_font: roboto_32_b, text_color: color_temp_max }
