# ============================================================
# 系统控制台UI组件
# 显示Tab5系统信息：WiFi、内存、CPU、网络等
# 通过上滑手势或右上角按钮打开
# ============================================================

- obj:
    id: layer_console_sys
    x: 20
    y: 20
    width: 1240
    height: 760
    styles: style_meteo_card
    scrollbar_mode: "OFF"
    hidden: true
    layout:
      type: FLEX
      flex_flow: COLUMN
      flex_align_main: START
      flex_align_cross: START
      pad_column: 10
      pad_row: 10
    widgets:
      # ==================== 系统信息标题 ====================
      - label: { text: "系统信息", align: TOP_LEFT, x: 20, y: 20, text_font: roboto_45_b, text_color: color_text }
      
      # ==================== 网络信息 ====================
      # WiFi名称
      - label: { text: "WiFi:", align: TOP_LEFT, x: 20, y: 80, text_font: roboto_32, text_color: color_text }
      - label: { id: lbl_sys_ssid_val, text: "--", align: TOP_LEFT, x: 120, y: 80, text_font: roboto_32, text_color: color_text }
      
      # IP地址
      - label: { text: "IP:", align: TOP_LEFT, x: 20, y: 120, text_font: roboto_32, text_color: color_text }
      - label: { id: lbl_sys_ip_val, text: "--", align: TOP_LEFT, x: 120, y: 120, text_font: roboto_32, text_color: color_text }
      
      # 运行时间
      - label: { text: "运行时间:", align: TOP_LEFT, x: 20, y: 160, text_font: roboto_32, text_color: color_text }
      - label: { id: lbl_sys_uptime_val, text: "--", align: TOP_LEFT, x: 180, y: 160, text_font: roboto_32, text_color: color_text }
      
      # WiFi信号强度
      - label: { text: "信号:", align: TOP_LEFT, x: 20, y: 200, text_font: roboto_32, text_color: color_text }
      - label: { id: lbl_sys_rssi_val, text: "-- dBm", align: TOP_LEFT, x: 120, y: 200, text_font: roboto_32, text_color: color_text }
      
      # ESP32核心温度
      - label: { text: "温度:", align: TOP_LEFT, x: 20, y: 240, text_font: roboto_32, text_color: color_text }
      - label: { id: lbl_sys_temp_val, text: "-- °", align: TOP_LEFT, x: 120, y: 240, text_font: roboto_32, text_color: color_text }
      
      # ==================== 内存信息标题 ====================
      - label: { text: "内存信息", align: TOP_LEFT, x: 20, y: 300, text_font: roboto_45_b, text_color: color_text }
      
      # ==================== SRAM内存 ====================
      # SRAM使用率和已使用大小
      - label: { text: "SRAM:", align: TOP_LEFT, x: 20, y: 360, text_font: roboto_32, text_color: color_text }
      - label: { id: lbl_sys_sram_val, text: "--%", align: TOP_LEFT, x: 120, y: 360, text_font: roboto_32, text_color: color_text }
      - bar: { id: bar_sys_sram, align: TOP_LEFT, x: 300, y: 365, width: 200, height: 10, min_value: 0, max_value: 100, value: 0 }
      
      # ==================== PSRAM内存 ====================
      # PSRAM使用率和已使用大小
      - label: { text: "PSRAM:", align: TOP_LEFT, x: 20, y: 400, text_font: roboto_32, text_color: color_text }
      - label: { id: lbl_sys_psram_val, text: "--%", align: TOP_LEFT, x: 120, y: 400, text_font: roboto_32, text_color: color_text }
      - bar: { id: bar_sys_psram, align: TOP_LEFT, x: 300, y: 405, width: 200, height: 10, min_value: 0, max_value: 100, value: 0 }
      
      # ==================== 最大分配块 ====================
      # 内存碎片化程度指标
      - label: { text: "最大分配:", align: TOP_LEFT, x: 20, y: 440, text_font: roboto_32, text_color: color_text }
      - label: { id: lbl_sys_frag_val, text: "-- KB", align: TOP_LEFT, x: 180, y: 440, text_font: roboto_32, text_color: color_text }
      
      # ==================== Flash存储 ====================
      # Flash容量（固定16MB）
      - label: { text: "Flash:", align: TOP_LEFT, x: 20, y: 480, text_font: roboto_32, text_color: color_text }
      - label: { id: lbl_sys_flash_val, text: "16.0 MB", align: TOP_LEFT, x: 120, y: 480, text_font: roboto_32, text_color: color_text }
      
      # ==================== 性能信息标题 ====================
      - label: { text: "性能信息", align: TOP_LEFT, x: 20, y: 540, text_font: roboto_45_b, text_color: color_text }
      
      # ==================== 循环时间 ====================
      # 主循环执行时间（毫秒）
      - label: { text: "循环时间:", align: TOP_LEFT, x: 20, y: 600, text_font: roboto_32, text_color: color_text }
      - label: { id: lbl_sys_loop_val, text: "-- ms", align: TOP_LEFT, x: 180, y: 600, text_font: roboto_32, text_color: color_text }
      
      # ==================== 关闭按钮 ====================
      # 点击关闭系统控制台
      - button:
          id: btn_close_console
          align: BOTTOM_RIGHT
          x: -20
          y: -20
          width: 100
          height: 50
          styles: style_clim_btn
          on_short_click:
            - lambda: |-
                lv_obj_add_flag(id(layer_console_sys), LV_OBJ_FLAG_HIDDEN);
          widgets:
            - label: { text: "关闭", align: CENTER, text_font: roboto_32, text_color: color_text }
