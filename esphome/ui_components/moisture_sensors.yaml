# ============================================================
# 植物湿度传感器UI组件
# 显示4个花盆的土壤湿度，自动排序显示最缺水的植物
# ============================================================

- obj:
    id: moisture_sensors_container
    x: 20
    y: 440
    width: 1240
    height: 120
    styles: style_meteo_card
    scrollbar_mode: "OFF"
    layout:
      type: FLEX
      flex_flow: ROW
      flex_align_main: SPACE_EVENLY
      flex_align_cross: CENTER
      pad_column: 10
    widgets:
      # ==================== 花盆1（最缺水） ====================
      - obj:
          id: pot_slot_0
          width: 200
          height: 100
          styles: style_transparent
          layout:
            type: FLEX
            flex_flow: COLUMN
            flex_align_main: CENTER
            flex_align_cross: CENTER
          widgets:
            - label: { id: icon_pot_s0, text: "\U000F0E66", text_font: mdi_font_40, text_color: color_text }
            - label: { id: val_pot_s0, text: "--%", text_font: roboto_32_b, text_color: color_text }
      
      # ==================== 花盆2（第二缺水） ====================
      - obj:
          id: pot_slot_1
          width: 200
          height: 100
          styles: style_transparent
          layout:
            type: FLEX
            flex_flow: COLUMN
            flex_align_main: CENTER
            flex_align_cross: CENTER
          widgets:
            - label: { id: icon_pot_s1, text: "\U000F09F1", text_font: mdi_font_40, text_color: color_text }
            - label: { id: val_pot_s1, text: "--%", text_font: roboto_32_b, text_color: color_text }
      
      # ==================== 花盆3（第三缺水） ====================
      - obj:
          id: pot_slot_2
          width: 200
          height: 100
          styles: style_transparent
          layout:
            type: FLEX
            flex_flow: COLUMN
            flex_align_main: CENTER
            flex_align_cross: CENTER
          widgets:
            - label: { id: icon_pot_s2, text: "\U000F0D08", text_font: mdi_font_40, text_color: color_text }
            - label: { id: val_pot_s2, text: "--%", text_font: roboto_32_b, text_color: color_text }
      
      # ==================== 花盆4（第四缺水） ====================
      - obj:
          id: pot_slot_3
          width: 200
          height: 100
          styles: style_transparent
          layout:
            type: FLEX
            flex_flow: COLUMN
            flex_align_main: CENTER
            flex_align_cross: CENTER
          widgets:
            - label: { id: icon_pot_s3, text: "\U000F024A", text_font: mdi_font_40, text_color: color_text }
            - label: { id: val_pot_s3, text: "--%", text_font: roboto_32_b, text_color: color_text }
