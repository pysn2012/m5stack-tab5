# ============================================================
# 每日天气预报卡片UI组件
# 显示未来5天的天气预报（温度、图标）
# ============================================================

- obj:
    id: layer_forecast_daily
    x: 20
    y: 570
    width: 1240
    height: 200
    styles: style_meteo_card
    scrollbar_mode: "OFF"
    hidden: false
    layout:
      type: FLEX
      flex_flow: ROW
      flex_align_main: SPACE_EVENLY
      flex_align_cross: CENTER
      pad_column: 10
    widgets:
      # ==================== 今天天气预报 ====================
      - obj:
          id: forecast_day_0
          width: 200
          height: 180
          styles: style_transparent
          layout:
            type: FLEX
            flex_flow: COLUMN
            flex_align_main: CENTER
            flex_align_cross: CENTER
          widgets:
            - label: { id: j0_day, text: "今天", text_font: roboto_32_b, text_color: color_text }
            - label: { id: j0_icon_layer1, text: "\U000F0725", text_font: mdi_font_64, text_color: color_text }
            - label: { id: j0_max, text: "25°", text_font: roboto_32_b, text_color: color_temp_max }
            - label: { id: j0_min, text: "18°", text_font: roboto_32, text_color: color_temp_min }
      
      # ==================== 明天天气预报 ====================
      - obj:
          id: forecast_day_1
          width: 200
          height: 180
          styles: style_transparent
          layout:
            type: FLEX
            flex_flow: COLUMN
            flex_align_main: CENTER
            flex_align_cross: CENTER
          widgets:
            - label: { id: j1_day, text: "明天", text_font: roboto_32_b, text_color: color_text }
            - label: { id: j1_icon_layer1, text: "\U000F0725", text_font: mdi_font_64, text_color: color_text }
            - label: { id: j1_max, text: "26°", text_font: roboto_32_b, text_color: color_temp_max }
            - label: { id: j1_min, text: "19°", text_font: roboto_32, text_color: color_temp_min }
      
      # ==================== 后天天气预报 ====================
      - obj:
          id: forecast_day_2
          width: 200
          height: 180
          styles: style_transparent
          layout:
            type: FLEX
            flex_flow: COLUMN
            flex_align_main: CENTER
            flex_align_cross: CENTER
          widgets:
            - label: { id: j2_day, text: "后天", text_font: roboto_32_b, text_color: color_text }
            - label: { id: j2_icon_layer1, text: "\U000F0725", text_font: mdi_font_64, text_color: color_text }
            - label: { id: j2_max, text: "27°", text_font: roboto_32_b, text_color: color_temp_max }
            - label: { id: j2_min, text: "20°", text_font: roboto_32, text_color: color_temp_min }
      
      # ==================== 第4天天气预报 ====================
      - obj:
          id: forecast_day_3
          width: 200
          height: 180
          styles: style_transparent
          layout:
            type: FLEX
            flex_flow: COLUMN
            flex_align_main: CENTER
            flex_align_cross: CENTER
          widgets:
            - label: { id: j3_day, text: "第4天", text_font: roboto_32_b, text_color: color_text }
            - label: { id: j3_icon_layer1, text: "\U000F0725", text_font: mdi_font_64, text_color: color_text }
            - label: { id: j3_max, text: "28°", text_font: roboto_32_b, text_color: color_temp_max }
            - label: { id: j3_min, text: "21°", text_font: roboto_32, text_color: color_temp_min }
      
      # ==================== 第5天天气预报 ====================
      - obj:
          id: forecast_day_4
