# ============================================================
# 温湿度控制卡片UI组件
# 显示温室和客厅的温度、湿度信息
# ============================================================

- obj:
    id: climate_card
    x: 850
    y: 120
    width: 400
    height: 300
    styles: style_meteo_card
    scrollbar_mode: "OFF"
    widgets:
      # ==================== 温室温度显示 ====================
      # 显示植物温室的当前温度
      - obj:
          align: TOP_LEFT
          x: 20
          y: 20
          width: 180
          height: 80
          styles: style_transparent
          layout:
            type: FLEX
            flex_flow: COLUMN
            flex_align_main: CENTER
            flex_align_cross: CENTER
          widgets:
            - label: { text: "温室", text_font: roboto_22, text_color: color_text }
            - label: { id: current_serre, text: "-- °", text_font: roboto_45_b, text_color: color_text }
      
      # ==================== 客厅温度显示 ====================
      # 显示客厅的当前温度
      - obj:
          align: TOP_RIGHT
          x: 200
          y: 20
          width: 180
          height: 80
          styles: style_transparent
          layout:
            type: FLEX
            flex_flow: COLUMN
            flex_align_main: CENTER
            flex_align_cross: CENTER
          widgets:
            - label: { text: "客厅", text_font: roboto_22, text_color: color_text }
            - label: { id: val_temp_salon, text: "-- °", text_font: roboto_45_b, text_color: color_text }
      
      # ==================== 湿度图标 ====================
      # 显示客厅湿度状态图标
      - label: { id: icon_salon, text: "\U000F044D", align: CENTER, y: 100, text_font: mdi_font_40, text_color: color_text }
      
      # ==================== 空调控制按钮 ====================
      # 控制空调开关
      - button:
          id: btn_climate_power
          align: BOTTOM_LEFT
          x: 20
          y: -20
          width: 100
          height: 50
          styles: style_clim_btn
          on_short_click:
            - lambda: |-
                // TODO: 实现空调开关控制逻辑
          widgets:
            - label: { id: btn_light_power_icon, text: "\U000F0450", align: CENTER, text_font: mdi_font_32, text_color: color_text }
