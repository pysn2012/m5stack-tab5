# ============================================================
# M5Stack Tab5 家庭控制 - 主配置文件
# 版本：2025.9.3
# 功能：智能家居控制、语音助手、天气预报、植物监测
# ============================================================

esphome:
  name: tab5-homecontrol
  friendly_name: M5Stack Tab5 Home Control
  min_version: 2025.9.3

# ==================== 配置包引用 ====================
# hardware.yaml  - 硬件配置（ESP32、显示屏、音频、语音助手）
# sensors.yaml   - 传感器配置（WiFi、开关、温湿度、系统信息）
# scripts.yaml   - 脚本配置（LVGL界面逻辑）
# lvgl.yaml      - LVGL界面配置（UI布局和组件）
packages:
  hardware: !include packages/hardware.yaml
  sensors: !include packages/sensors.yaml
  scripts: !include packages/scripts.yaml
  lvgl: !include packages/lvgl.yaml
